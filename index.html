<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>ICE LOGIX</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0F172A; font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
    
    /* Стили статусов заказов */
    .status-badge { padding: 4px 12px; border-radius: 40px; font-size: 11px; font-weight: bold; display: inline-block; }
    .status-pending { background: #f59e0b; color: #000; }
    .status-paid { background: #10b981; color: #fff; }
    .status-bought { background: #3b82f6; color: #fff; }
    .status-on_sklad_cn { background: #8b5cf6; color: #fff; }
    .status-in_transit { background: #06b6d4; color: #fff; }
    .status-in_belarus { background: #14b8a6; color: #fff; }
    .status-delivered { background: #10b981; color: #fff; }
    .status-cancelled { background: #ef4444; color: #fff; }
    
    /* Карточки товаров */
    .product-card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
      transition: all 0.2s;
      cursor: pointer;
    }
    .product-card:hover { transform: translateY(-4px); background: rgba(255,255,255,0.12); }
    
    /* Сторис-квадратики */
    .story-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      transition: 0.2s;
      min-width: 70px;
    }
    .story-card:hover { transform: translateY(-2px); }
    .story-icon {
      width: 70px;
      height: 70px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .story-label { font-size: 11px; font-weight: 500; color: #8e9aaf; }
    
    /* Баннер-карусель */
    .banner-slide {
      background: linear-gradient(135deg, #007aff, #00c2ff);
      border-radius: 20px;
      padding: 16px;
      min-width: 280px;
      scroll-snap-align: start;
      cursor: pointer;
    }
    .banner-title { font-size: 18px; font-weight: bold; color: white; }
    .banner-desc { font-size: 12px; color: rgba(255,255,255,0.8); margin-top: 4px; }
    
    /* Нижнее меню */
    .tab-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(25px);
      border-top: 1px solid rgba(255,255,255,0.1);
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 8px 12px 16px;
      z-index: 100;
    }
    .tab-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: #8e9aaf;
      cursor: pointer;
      transition: color 0.2s;
    }
    .tab-item.active { color: #00c2ff; }
    .tab-icon { font-size: 22px; }
    .tab-label { font-size: 10px; font-weight: 600; }
    .tab-item.new-order {
      background: linear-gradient(135deg, #007aff, #00c2ff);
      color: white;
      padding: 8px 16px;
      border-radius: 40px;
      margin-top: -12px;
      box-shadow: 0 4px 12px rgba(0,122,255,0.4);
    }
    .tab-item.new-order .tab-label { font-size: 12px; font-weight: bold; }
    
    /* Верхняя панель */
    .app-header {
      position: sticky;
      top: 0;
      z-index: 90;
      background: rgba(15, 23, 42, 0.92);
      backdrop-filter: blur(25px);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .header-left { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .logo-img { height: 44px; cursor: pointer; transition: 0.2s; }
    .logo-img:hover { transform: scale(1.02); }
    .header-right { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .balance {
      background: rgba(0,194,255,0.15);
      padding: 5px 12px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .balance-add { background: none; border: none; color: #00c2ff; font-size: 16px; cursor: pointer; font-weight: bold; padding: 0; }
    .icon-btn { background: none; border: none; color: white; font-size: 20px; cursor: pointer; width: 32px; text-align: center; }
    
    /* Карточка пользователя (аватар + имя) */
    .user-card {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      padding: 5px 12px 5px 5px;
      border-radius: 40px;
      cursor: pointer;
      transition: 0.2s;
    }
    .user-card:hover { background: rgba(255,255,255,0.2); }
    .user-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #2d3748;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .user-name { font-size: 14px; font-weight: 600; color: white; }
    
    /* Отдельная кнопка "Назад" */
    .global-back-btn {
      background: rgba(255,255,255,0.15);
      border: none;
      color: white;
      font-size: 14px;
      font-weight: 600;
      padding: 8px 20px;
      border-radius: 40px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: 0.2s;
      margin-bottom: 16px;
    }
    .global-back-btn:hover { background: rgba(255,255,255,0.25); }
    
    .main-content { padding: 16px; padding-bottom: 80px; }
    
    /* Футер (юридическая информация) */
    .app-footer {
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255,255,255,0.1);
      padding: 20px 16px;
      margin-top: 30px;
      text-align: center;
    }
    .footer-links { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-bottom: 12px; }
    .footer-link { color: #8e9aaf; font-size: 12px; text-decoration: none; cursor: pointer; }
    .footer-link:hover { color: #00c2ff; }
    .social-icons { display: flex; justify-content: center; gap: 20px; margin-bottom: 12px; }
    .social-icon { font-size: 24px; cursor: pointer; }
    .copyright { font-size: 10px; color: #5a6e8a; }
    
    /* Карусели */
    .scroll-x { overflow-x: auto; display: flex; gap: 12px; scroll-snap-type: x mandatory; padding-bottom: 8px; }
    .scroll-x::-webkit-scrollbar { display: none; }
    
    /* Карточка отзыва */
    .review-card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 12px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .stars { color: #fbbf24; margin-bottom: 8px; }
  </style>
</head>
<body>
  <div id="app">
    <div class="app-header">
      <div class="header-left">
        <img id="logoImg" class="logo-img" src="https://i.ibb.co/9kJTjpjT/1-Logo.png" alt="ICE LOGIX">
      </div>
      <div class="header-right">
        <div class="balance"><span id="headerBalance">0 ❄️</span><button class="balance-add" id="addBalanceBtn">+</button></div>
        <button class="icon-btn" id="notificationsBtn">🔔</button>
        <button class="icon-btn" id="settingsBtn">⚙️</button>
        <div class="user-card" id="userCard">
          <div class="user-avatar" id="avatar"></div>
          <span class="user-name" id="userNameHeader">Гость</span>
        </div>
      </div>
    </div>
    <div id="content" class="main-content"><div class="text-center py-10">Загрузка...</div></div>
    <div class="tab-bar" id="tabBar">
      <div class="tab-item" data-tab="home"><span class="tab-icon">🏠</span><span class="tab-label">Главная</span></div>
      <div class="tab-item" data-tab="calculator"><span class="tab-icon">🧮</span><span class="tab-label">Калькулятор</span></div>
      <div class="tab-item new-order" data-tab="neworder"><span class="tab-icon">✨</span><span class="tab-label">Новый заказ</span></div>
      <div class="tab-item" data-tab="catalogs"><span class="tab-icon">📚</span><span class="tab-label">Каталоги</span></div>
      <div class="tab-item" data-tab="profile"><span class="tab-icon">👤</span><span class="tab-label">Профиль</span></div>
    </div>
  </div>
  <script>
    let tg = null, userId = null, userName = 'Гость', userAvatarUrl = null, isOwner = false, supabaseClient = null;
    let currentTab = 'home', previousTab = null, currentSubScreen = null;
    let balance = 0;
    let appliedPromo = null;

    async function init() {
      tg = window.Telegram.WebApp;
      tg.ready();
      tg.expand();
      const user = tg.initDataUnsafe?.user;
      userId = user ? user.id : null;
      userName = user ? (user.first_name || user.username) : 'Гость';
      userAvatarUrl = user?.photo_url || null;
      const SUPABASE_URL = 'https://vrvwdagjpttvfvjanbwq.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZydndkYWdqcHR0dmZ2amFuYndxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NTc4MzgsImV4cCI6MjA5MTIzMzgzOH0.P9GQSW6NLN1BhR66PX-LP4ysZBXFeWIXRYIRvhRjo1c';
      supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      await loadUserData();
      attachEventListeners();
      const avatarDiv = document.querySelector('#avatar');
      avatarDiv.innerHTML = userAvatarUrl ? `<img src="${userAvatarUrl}">` : userName.charAt(0).toUpperCase();
      document.querySelector('#userNameHeader').innerText = userName;
      document.getElementById('logoImg').onclick = () => switchTab('home');
      document.getElementById('userCard').onclick = () => switchTab('profile');
      document.getElementById('settingsBtn').onclick = () => alert('Настройки будут позже');
      document.getElementById('notificationsBtn').onclick = () => alert('Уведомлений пока нет');
      switchTab('home');
    }

    async function loadUserData() {
      if (!userId) return;
      const { data, error } = await supabaseClient.from('users').select('role, ices_balance').eq('user_id', userId).maybeSingle();
      if (!error && data) {
        isOwner = (data.role === 'owner');
        balance = data.ices_balance || 0;
        document.getElementById('headerBalance').innerText = balance + ' ❄️';
      }
    }

    function attachEventListeners() {
      document.getElementById('addBalanceBtn').onclick = () => alert('Пополнение баланса будет позже');
      document.querySelectorAll('.tab-item').forEach(tab => {
        tab.onclick = () => {
          const tabName = tab.getAttribute('data-tab');
          currentSubScreen = null;
          appliedPromo = null;
          switchTab(tabName);
        };
      });
    }

    function switchTab(tabName) {
      if (currentTab && currentTab !== tabName) previousTab = currentTab;
      currentTab = tabName;
      document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
      const activeTab = document.querySelector(`.tab-item[data-tab="${tabName}"]`);
      if (activeTab) activeTab.classList.add('active');
      renderCurrentScreen();
    }

    function renderFooter() {
      return `
        <div class="app-footer">
          <div class="social-icons"><span class="social-icon" data-social="tg">📱</span><span class="social-icon" data-social="ig">📷</span><span class="social-icon" data-social="vk">🎵</span></div>
          <div class="footer-links"><span class="footer-link" data-link="offer">Публичная оферта</span><span class="footer-link" data-link="privacy">Политика конфиденциальности</span><span class="footer-link" data-link="contacts">Контакты</span></div>
          <div class="copyright">ИП Иванов И.И., УНП 123456789<br>© 2025 ICE LOGIX. Все права защищены.</div>
        </div>
      `;
    }

        // ==================== РЕНДЕР ГЛАВНОЙ СТРАНИЦЫ ====================
        async function renderHome() {
      const products = [
        { id: 1, name: 'Nike Dunk Low', price: 520, url: 'https://nike.com' },
        { id: 2, name: 'Jordan 1 Retro', price: 780, url: 'https://nike.com' },
        { id: 3, name: 'Yeezy 350', price: 640, url: 'https://adidas.com' },
        { id: 4, name: 'Adidas Samba', price: 420, url: 'https://adidas.com' },
        { id: 5, name: 'New Balance 550', price: 560, url: 'https://newbalance.com' },
        { id: 6, name: 'Asics Gel Kayano', price: 680, url: 'https://asics.com' },
        { id: 7, name: 'Puma Suede', price: 380, url: 'https://puma.com' },
        { id: 8, name: 'Reebok Club C', price: 450, url: 'https://reebok.com' },
        { id: 9, name: 'Converse Chuck', price: 320, url: 'https://converse.com' },
        { id: 10, name: 'Vans Old Skool', price: 360, url: 'https://vans.com' }
      ];
      const marketplaces = [
        { id: 1, name: 'Poizon', url: 'https://poizon.com' },
        { id: 2, name: 'Taobao', url: 'https://taobao.com' },
        { id: 3, name: '1688', url: 'https://1688.com' },
        { id: 4, name: 'Zalando', url: 'https://zalando.de' },
        { id: 5, name: 'Nike', url: 'https://nike.com' }
      ];
      const banners = [
        { title: '🔥 Розыгрыш iPhone 15', desc: 'Участвуй до 30 апреля' },
        { title: '🎁 Скидка 10% на доставку', desc: 'Для новых клиентов' },
        { title: '✈️ Бесплатная консолидация', desc: 'При заказе от 3 товаров' }
      ];
      return `
        <div class="scroll-x mb-6">
          <div class="story-card" data-story="reports"><div class="story-icon">📸</div><span class="story-label">Отчёты</span></div>
          <div class="story-card" data-story="reviews"><div class="story-icon">⭐</div><span class="story-label">Отзывы</span></div>
          <div class="story-card" data-story="promo"><div class="story-icon">🎁</div><span class="story-label">Акции</span></div>
          <div class="story-card" data-story="academy"><div class="story-icon">🎓</div><span class="story-label">Обучение</span></div>
          <div class="story-card" data-story="drops"><div class="story-icon">📦</div><span class="story-label">Дропы</span></div>
        </div>
        <div class="scroll-x mb-6">${banners.map(b => `<div class="banner-slide"><div class="banner-title">${b.title}</div><div class="banner-desc">${b.desc}</div></div>`).join('')}</div>
        <div class="mb-6"><div class="flex justify-between items-center mb-3"><h3 class="text-white font-bold">🔥 Популярные площадки</h3><button id="moreMarketplacesBtn" class="text-cyan-400 text-sm">Больше →</button></div><div class="scroll-x">${marketplaces.map(mp => `<div class="story-card marketplace-story" data-url="${mp.url}" style="min-width: 70px;"><div class="story-icon text-2xl">🛍️</div><span class="story-label">${mp.name}</span></div>`).join('')}</div></div>
        <div class="mb-6"><div class="flex justify-between items-center mb-3"><h3 class="text-white font-bold">✨ Рекомендуем</h3><button id="moreProductsBtn" class="text-cyan-400 text-sm">Больше →</button></div><div class="grid grid-cols-2 gap-3">${products.map(p => `<div class="product-card" data-url="${p.url}"><div class="aspect-square bg-white/10 flex items-center justify-center"><div class="text-4xl">👟</div></div><div class="p-2"><p class="text-white font-bold text-sm truncate">${p.name}</p><p class="text-cyan-400 text-xs">${p.price} ❄️</p></div></div>`).join('')}</div></div>
        ${renderFooter()}
      `;
    }

    // ==================== РЕНДЕР КАЛЬКУЛЯТОРА ====================
    async function renderCalculator() {
      return `
        <div class="bg-white/10 backdrop-blur-md rounded-2xl p-5 shadow-lg">
          <h2 class="text-xl font-bold mb-4">🧮 Калькулятор стоимости</h2>
          <label class="text-white/70 text-sm">Ссылка на товар (необязательно)</label>
          <input type="text" id="calcUrl" class="w-full mt-1 p-3 rounded-xl bg-white/20 border border-white/30 mb-3" placeholder="https://poizon.com/...">
          <label class="text-white/70 text-sm block mt-2">Цена (¥)</label>
          <input type="number" id="calcPrice" class="w-full mt-1 p-3 rounded-xl bg-white/20 border border-white/30 mb-3" placeholder="Цена в юанях" value="520">
          <label class="text-white/70 text-sm block mt-2">Вес (кг)</label>
          <div class="flex items-center gap-3 mt-1"><input type="range" id="calcWeight" min="0.1" max="30" step="0.1" value="1" class="flex-1"><span id="weightVal" class="text-white/80 bg-white/10 px-3 py-1 rounded-full">1.0 кг</span></div>
          <button id="calcBtn" class="mt-5 w-full bg-cyan-500 hover:bg-cyan-600 py-3 rounded-xl font-bold transition">Рассчитать</button>
          <div id="calcResult" class="mt-5 hidden bg-white/5 p-4 rounded-xl"><p class="text-white">Примерная стоимость: <span id="totalPrice" class="font-bold text-cyan-400">0</span> ❄️</p><p class="text-white/70 text-xs mt-1">*Окончательная цена после взвешивания на складе</p><button id="toNewOrderBtn" class="mt-3 w-full bg-blue-600 hover:bg-blue-700 py-2 rounded-xl">Перенести в заказ</button></div>
        </div>
        ${renderFooter()}
      `;
    }

    function attachCalculatorHandlers() {
      const slider = document.getElementById('calcWeight');
      const valSpan = document.getElementById('weightVal');
      if (slider) slider.oninput = () => valSpan.innerText = parseFloat(slider.value).toFixed(1) + ' кг';
      const calcBtn = document.getElementById('calcBtn');
      if (calcBtn) calcBtn.onclick = () => {
        let price = parseFloat(document.getElementById('calcPrice')?.value || 520);
        let weight = parseFloat(slider?.value || 1);
        let total = (price * 0.45) + (weight * 12);
        document.getElementById('totalPrice').innerText = total.toFixed(2);
        document.getElementById('calcResult').classList.remove('hidden');
        window.tempOrder = { url: document.getElementById('calcUrl')?.value || '', price: price, weight: weight, total: total, discountAmount: 0, appliedPromo: null };
      };
      const toNewOrderBtn = document.getElementById('toNewOrderBtn');
      if (toNewOrderBtn) toNewOrderBtn.onclick = () => { if (window.tempOrder) switchTab('neworder'); else alert('Сначала рассчитайте стоимость'); };
    }

    // ==================== РЕНДЕР НОВОГО ЗАКАЗА (С ПРОМОКОДАМИ) ====================
    async function renderNewOrder() {
      const d = window.tempOrder || { url: '', price: 520, weight: 1, total: 0, discountAmount: 0, appliedPromo: null };
      const finalTotal = d.total - (d.discountAmount || 0);
      return `
        <div class="bg-white/10 backdrop-blur-md rounded-2xl p-5 shadow-lg">
          <h2 class="text-xl font-bold mb-4">✨ Новый заказ</h2>
          <label class="text-white/70 text-sm">Ссылка на товар</label>
          <input type="text" id="orderUrl" class="w-full mt-1 p-3 rounded-xl bg-white/20 border border-white/30 mb-3" value="${d.url}" placeholder="https://...">
          <label class="text-white/70 text-sm block mt-2">Цена (¥)</label>
          <input type="number" id="orderPrice" class="w-full mt-1 p-3 rounded-xl bg-white/20 border border-white/30 mb-3" value="${d.price}">
          <label class="text-white/70 text-sm block mt-2">Вес (кг)</label>
          <div class="flex items-center gap-3 mt-1"><input type="number" id="orderWeight" class="flex-1 p-3 rounded-xl bg-white/20 border border-white/30" value="${d.weight}" step="0.1"><span class="text-white/80 bg-white/10 px-3 py-1 rounded-full">кг</span></div>
          <div class="mt-3"><label class="text-white/70 text-sm">Промокод</label><div class="flex gap-2 mt-1"><input type="text" id="promoCode" class="flex-1 p-3 rounded-xl bg-white/20 border border-white/30" placeholder="Введите промокод"><button id="applyPromoBtn" class="bg-cyan-500 px-4 py-3 rounded-xl">Применить</button></div><p id="promoMessage" class="text-xs mt-1 hidden"></p></div>
          <p class="mt-4 text-lg">Итого: <span id="orderTotal" class="font-bold text-cyan-400">${(d.total - (d.discountAmount || 0)).toFixed(2)}</span> ❄️</p>
          ${d.discountAmount > 0 ? `<p class="text-green-400 text-sm mt-1">Скидка: -${d.discountAmount} ❄️</p>` : ''}
          <p class="text-white/70 text-xs mt-1">*Предоплата 75%: <span id="prepaymentAmount" class="font-bold text-cyan-300">${((d.total - (d.discountAmount || 0)) * 0.75).toFixed(2)}</span> ❄️</p>
          <button id="createOrderFinal" class="mt-5 w-full bg-green-600 hover:bg-green-700 py-3 rounded-xl font-bold">Оформить заказ</button>
        </div>
        ${renderFooter()}
      `;
    }

    function attachNewOrderHandlers() {
      const priceInp = document.getElementById('orderPrice');
      const weightInp = document.getElementById('orderWeight');
      const totalSpan = document.getElementById('orderTotal');
      const prepaymentSpan = document.getElementById('prepaymentAmount');
      const urlInp = document.getElementById('orderUrl');
      const promoInput = document.getElementById('promoCode');
      const promoMessage = document.getElementById('promoMessage');
      
      const update = () => {
        let price = parseFloat(priceInp?.value || 520);
        let weight = parseFloat(weightInp?.value || 1);
        let total = (price * 0.45) + (weight * 12);
        let discount = window.tempOrder?.discountAmount || 0;
        if (totalSpan) totalSpan.innerText = (total - discount).toFixed(2);
        if (prepaymentSpan) prepaymentSpan.innerText = ((total - discount) * 0.75).toFixed(2);
        window.tempOrder = { ...window.tempOrder, url: urlInp?.value || '', price: price, weight: weight, total: total, discountAmount: discount };
      };
      
      if (priceInp) priceInp.addEventListener('input', update);
      if (weightInp) weightInp.addEventListener('input', update);
      
      const applyPromoBtn = document.getElementById('applyPromoBtn');
      if (applyPromoBtn) {
        applyPromoBtn.onclick = async () => {
          const code = promoInput?.value.trim().toUpperCase();
          if (!code) { promoMessage.innerText = 'Введите код'; promoMessage.classList.remove('hidden'); return; }
          try {
            const { data, error } = await supabaseClient.from('promocodes').select('*').eq('code', code).eq('is_active', true).single();
            if (error || !data) { promoMessage.innerText = 'Неверный или просроченный код'; promoMessage.classList.remove('hidden'); return; }
            let discountAmount = 0;
            if (data.discount_type === 'percent') discountAmount = window.tempOrder.total * (data.discount_value / 100);
            else discountAmount = data.discount_value;
            if (discountAmount > window.tempOrder.total) discountAmount = window.tempOrder.total;
            window.tempOrder.discountAmount = discountAmount;
            window.tempOrder.appliedPromo = data;
            update();
            promoMessage.innerText = `Промокод применён! Скидка: ${discountAmount} ❄️`;
            promoMessage.classList.remove('hidden');
            promoMessage.style.color = '#4ade80';
          } catch (err) { promoMessage.innerText = 'Ошибка проверки кода'; promoMessage.classList.remove('hidden'); }
        };
      }
      
      const createBtn = document.getElementById('createOrderFinal');
      if (createBtn) {
        createBtn.onclick = async () => {
          if (!window.tempOrder || !userId) { alert('Ошибка: заполните все поля'); return; }
          try {
            const { data, error } = await supabaseClient.from('orders').insert({
              user_id: userId, source_url: window.tempOrder.url, weight_estimated: window.tempOrder.weight,
              price_original: window.tempOrder.price, price_byn: window.tempOrder.price * 0.45,
              delivery_cost_estimated: window.tempOrder.weight * 12, prepayment_amount: (window.tempOrder.total - window.tempOrder.discountAmount) * 0.75,
              status: 'pending', discount_applied: window.tempOrder.discountAmount || 0, promo_code: window.tempOrder.appliedPromo?.code || null
            }).select();
            if (error) throw error;
            alert(`Заказ создан! Номер: ${data[0].id}. Сумма предоплаты: ${((window.tempOrder.total - window.tempOrder.discountAmount) * 0.75).toFixed(2)} ❄️`);
            window.tempOrder = null;
            switchTab('home');
          } catch (err) { alert('Ошибка: ' + err.message); }
        };
      }
    }

        'on_sklad_cn': 'На складе в Китае',

        'in_belarus': 'В Беларуси',
        'delivered': 'Доставлен',
        'cancelled': 'Отменён'
      };
      return statuses[status] || status;
    }

    function getStatusClass(status) {
      const classes = {
        'pending': 'status-pending',
        'paid': 'status-paid',
        'bought': 'status-bought',
        'on_sklad_cn': 'status-on_sklad_cn',

        'in_belarus': 'status-in_belarus',
        'delivered': 'status-delivered',
        'cancelled': 'status-cancelled'
      };
      return classes[status] || 'status-pending';
    }

      });
      document.querySelectorAll('.footer-link').forEach(el => {
        el.addEventListener('click', () => alert(el.innerText + ' будет доступно позже'));
      });
    }

    // ==================== КНОПКА НАЗАД ====================
    function ensureBackButton() {
      const oldBtn = document.getElementById('globalBackBtn');
      if (oldBtn) oldBtn.remove();
      if (currentTab !== 'home' && currentTab !== 'catalogs' && currentTab !== 'reports' && currentTab !== 'reviews') {
        const contentDiv = document.getElementById('content');
        const btn = document.createElement('button');
        btn.id = 'globalBackBtn';
        btn.className = 'global-back-btn';
        btn.innerHTML = '← Назад';
        btn.onclick = () => {
          if (previousTab && previousTab !== currentTab) switchTab(previousTab);
          else if (currentTab !== 'home') switchTab('home');
          else tg.close();
        };
        if (contentDiv.firstChild) contentDiv.insertBefore(btn, contentDiv.firstChild);
        else contentDiv.appendChild(btn);
      }
    }

    // ==================== RENDER CURRENT SCREEN ====================
    async function renderCurrentScreen() {
      const contentDiv = document.getElementById('content');
      if (currentSubScreen === 'myOrders') {
        contentDiv.innerHTML = await renderMyOrders();
        const backBtn = document.getElementById('backToProfileBtn');
        if (backBtn) backBtn.onclick = () => { currentSubScreen = null; renderCurrentScreen(); };
        return;
      }
      if (currentTab === 'home') {
        contentDiv.innerHTML = await renderHome();
        attachHomeHandlers();
      } else if (currentTab === 'calculator') {
        contentDiv.innerHTML = await renderCalculator();
        attachCalculatorHandlers();
      } else if (currentTab === 'neworder') {
        contentDiv.innerHTML = await renderNewOrder();
        attachNewOrderHandlers();
      } else if (currentTab === 'catalogs') {
        contentDiv.innerHTML = await renderCatalogs();
        attachCatalogsHandlers();
      } else if (currentTab === 'profile') {
        contentDiv.innerHTML = await renderProfile();
        attachProfileHandlers();
      } else if (currentTab === 'admin' && isOwner) {
        contentDiv.innerHTML = await renderAdmin();
        attachAdminHandlers();
      } else if (currentTab === 'reports') {
        contentDiv.innerHTML = await renderReports();
        attachReportsHandlers();
      } else if (currentTab === 'reviews') {
        contentDiv.innerHTML = await renderReviews();
        attachReviewsHandlers();
      } else {
        contentDiv.innerHTML = '<div class="text-center py-10">Страница не найдена</div>';
      }
      if (currentTab !== 'home' && currentTab !== 'catalogs' && currentTab !== 'reports' && currentTab !== 'reviews' && !currentSubScreen) {
        ensureBackButton();
      }
    }

    // ==================== ЗАПУСК ====================
    init();
  </script>
</body>
</html>
