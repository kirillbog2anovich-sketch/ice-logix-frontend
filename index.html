<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>ICE LOGIX</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0F172A; font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
    .status-badge { padding: 4px 12px; border-radius: 40px; font-size: 11px; font-weight: bold; display: inline-block; }
    .status-pending { background: #f59e0b; color: #000; }
    .status-paid { background: #10b981; color: #fff; }
    .status-bought { background: #3b82f6; color: #fff; }
    .status-on_sklad_cn { background: #8b5cf6; color: #fff; }
    .status-in_transit { background: #06b6d4; color: #fff; }
    .status-in_belarus { background: #14b8a6; color: #fff; }
    .status-delivered { background: #10b981; color: #fff; }
    .status-cancelled { background: #ef4444; color: #fff; }
    .product-card { background: rgba(255,255,255,0.08); backdrop-filter: blur(12px); border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); transition: all 0.2s; cursor: pointer; }
    .product-card:hover { transform: translateY(-4px); background: rgba(255,255,255,0.12); }
    .story-card { display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; transition: 0.2s; min-width: 70px; }
    .story-card:hover { transform: translateY(-2px); }
    .story-icon { width: 70px; height: 70px; background: rgba(255,255,255,0.1); backdrop-filter: blur(12px); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 32px; border: 1px solid rgba(255,255,255,0.2); }
    .story-label { font-size: 11px; font-weight: 500; color: #8e9aaf; }
    .banner-slide {
    background: linear-gradient(135deg, #007aff, #00c2ff);
    border-radius: 20px;
    padding: 16px;
    min-width: 280px;
    scroll-snap-align: start;
    cursor: pointer;
    overflow: hidden;          /* ← важно! */
    background-size: cover;
    background-position: center;
    }
    .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(25px); border-top: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-around; align-items: center; padding: 8px 12px 16px; z-index: 100; }
    .tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #8e9aaf; cursor: pointer; transition: color 0.2s; }
    .tab-item.active { color: #00c2ff; }
    .tab-icon { font-size: 22px; }
    .tab-label { font-size: 10px; font-weight: 600; }
    .tab-item.new-order { background: linear-gradient(135deg, #007aff, #00c2ff); color: white; padding: 8px 16px; border-radius: 40px; margin-top: -12px; box-shadow: 0 4px 12px rgba(0,122,255,0.4); }
    .tab-item.new-order .tab-label { font-size: 12px; font-weight: bold; }
    .app-header { position: sticky; top: 0; z-index: 90; background: rgba(15, 23, 42, 0.92); backdrop-filter: blur(25px); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .header-left { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .logo-img { height: 44px; cursor: pointer; transition: 0.2s; }
    .logo-img:hover { transform: scale(1.02); }
    .header-right { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .balance { background: rgba(0,194,255,0.15); padding: 5px 12px; border-radius: 30px; font-size: 14px; font-weight: bold; display: flex; align-items: center; gap: 6px; }
    .balance-add { background: none; border: none; color: #00c2ff; font-size: 16px; cursor: pointer; font-weight: bold; padding: 0; }
    .icon-btn { background: none; border: none; color: white; font-size: 20px; cursor: pointer; width: 32px; text-align: center; }
    .user-card { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.1); backdrop-filter: blur(12px); padding: 5px 12px 5px 5px; border-radius: 40px; cursor: pointer; transition: 0.2s; }
    .user-card:hover { background: rgba(255,255,255,0.2); }
    .user-avatar { width: 40px; height: 40px; border-radius: 50%; background: #2d3748; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .user-name { font-size: 14px; font-weight: 600; color: white; }
    .global-back-btn { background: rgba(255,255,255,0.15); border: none; color: white; font-size: 14px; font-weight: 600; padding: 8px 20px; border-radius: 40px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: 0.2s; margin-bottom: 16px; }
    .global-back-btn:hover { background: rgba(255,255,255,0.25); }
    .main-content { padding: 16px; padding-bottom: 80px; }
    .app-footer { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.1); padding: 20px 16px; margin-top: 30px; text-align: center; }
    .footer-links { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-bottom: 12px; }
    .footer-link { color: #8e9aaf; font-size: 12px; text-decoration: none; cursor: pointer; }
    .footer-link:hover { color: #00c2ff; }
    .social-icons { display: flex; justify-content: center; gap: 20px; margin-bottom: 12px; }
    .social-icon { font-size: 24px; cursor: pointer; }
    .copyright { font-size: 10px; color: #5a6e8a; }
    .scroll-x { overflow-x: auto; display: flex; gap: 12px; scroll-snap-type: x mandatory; padding-bottom: 8px; }
    .scroll-x::-webkit-scrollbar { display: none; }
    .review-card { background: rgba(255,255,255,0.08); backdrop-filter: blur(12px); border-radius: 20px; padding: 16px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.1); }
    .stars { color: #fbbf24; margin-bottom: 8px; }
    .course-card { background: rgba(255,255,255,0.08); backdrop-filter: blur(12px); border-radius: 20px; padding: 16px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.2s; }
    .course-card:hover { transform: translateY(-2px); background: rgba(255,255,255,0.12); }
    .filter-chip { background: rgba(255,255,255,0.15); padding: 6px 12px; border-radius: 40px; font-size: 12px; cursor: pointer; transition: 0.2s; }
    .filter-chip.active { background: #00c2ff; color: #0F172A; }
    .wishlist-heart { color: #ff4d4d; cursor: pointer; }
  </style>
</head>
<body>
  <!-- Version: 2026.04.16.01 -->
  <div id="app">
    <div class="app-header">
      <div class="header-left">
        <img id="logoImg" class="logo-img" src="https://i.ibb.co/9kJTjpjT/1-Logo.png" alt="ICE LOGIX">
      </div>
      <div class="header-right">
        <div class="balance"><span id="headerBalance">0 ❄️</span><button class="balance-add" id="addBalanceBtn">+</button></div>
        <button class="icon-btn" id="notificationsBtn">🔔</button>
        <button class="icon-btn" id="settingsBtn">⚙️</button>
        <div class="user-card" id="userCard">
          <div class="user-avatar" id="avatar"></div>
          <span class="user-name" id="userNameHeader">Гость</span>
        </div>
      </div>
    </div>
    <div id="content" class="main-content"><div class="text-center py-10">Загрузка...</div></div>
    <div class="tab-bar" id="tabBar">
      <div class="tab-item" data-tab="home"><span class="tab-icon">🏠</span><span class="tab-label">Главная</span></div>
      <div class="tab-item" data-tab="calculator"><span class="tab-icon">🧮</span><span class="tab-label">Калькулятор</span></div>
      <div class="tab-item new-order" data-tab="neworder"><span class="tab-icon">✨</span><span class="tab-label">Новый заказ</span></div>
      <div class="tab-item" data-tab="catalogs"><span class="tab-icon">📚</span><span class="tab-label">Каталоги</span></div>
      <div class="tab-item" data-tab="profile"><span class="tab-icon">👤</span><span class="tab-label">Профиль</span></div>
    </div>
  </div>
  <script>
    let tg = null, userId = null, userName = 'Гость', userAvatarUrl = null, isOwner = false, supabaseClient = null;
    let currentTab = 'home', previousTab = null, currentSubScreen = null;
    let adminOrdersMode = 'active'; // 'active' или 'archived'
    let balance = 0;
    let adminOrdersPage = 1;
let adminOrdersFilter = 'all';
let adminOrdersTotalPages = 1;
    let userLimits = { dailyCount: 0, lastDate: null, isTrusted: false };
const MAX_REQUESTS_GUEST = 1;
const MAX_REQUESTS_NEW_USER = 3;
const MAX_REQUESTS_TRUSTED = 100;
    let appliedPromo = null;
    let userReferralCode = null;
    let wishlist = new Set();
    let productsPage = 1;
    let productsFilter = { category: 'all', brand: 'all', sort: 'new' };
    let productsTotalPages = 1;
    let reviewsPage = 1;
    let reviewsTotalPages = 1;

    async function init() {
      tg = window.Telegram.WebApp;
      tg.ready();
      tg.expand();
      const user = tg.initDataUnsafe?.user;
      userId = user ? user.id : null;
      userName = user ? (user.first_name || user.username) : 'Гость';
      userAvatarUrl = user?.photo_url || null;
      const SUPABASE_URL = 'https://vrvwdagjpttvfvjanbwq.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZydndkYWdqcHR0dmZ2amFuYndxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NTc4MzgsImV4cCI6MjA5MTIzMzgzOH0.P9GQSW6NLN1BhR66PX-LP4ysZBXFeWIXRYIRvhRjo1c';
      supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      await loadUserData();
      await initReferralCode();
      await loadWishlist();
      attachEventListeners();
      const avatarDiv = document.querySelector('#avatar');
      avatarDiv.innerHTML = userAvatarUrl ? `<img src="${userAvatarUrl}">` : userName.charAt(0).toUpperCase();
      document.querySelector('#userNameHeader').innerText = userName;
      document.getElementById('logoImg').onclick = () => switchTab('home');
      document.getElementById('userCard').onclick = () => switchTab('profile');
      document.getElementById('settingsBtn').onclick = () => alert('Настройки будут позже');
      document.getElementById('notificationsBtn').onclick = () => alert('Уведомлений пока нет');
      switchTab('home');
    }

    async function loadUserData() {
      if (!userId) return;
      const { data, error } = await supabaseClient.from('users').select('role, ices_balance, referral_code, referral_count, referral_bonus, daily_requests_count, last_request_date, is_trusted').eq('user_id', userId).maybeSingle();
      if (!error && data) {
  isOwner = (data.role === 'owner');
  balance = data.ices_balance || 0;
  userReferralCode = data.referral_code;
  userLimits.dailyCount = data.daily_requests_count || 0;
  userLimits.lastDate = data.last_request_date ? new Date(data.last_request_date).toDateString() : null;
  userLimits.isTrusted = data.is_trusted || false;
  document.getElementById('headerBalance').innerText = balance + ' ❄️';
      }
    }

    async function checkAndUpdateLimit() {
  const today = new Date().toDateString();
  
  // Если пользователь не авторизован (гость)
  if (!userId) {
    const guestKey = 'ice_guest_requests';
    let guestData = JSON.parse(localStorage.getItem(guestKey) || '{"count":0,"date":""}');
    if (guestData.date !== today) {
      guestData = { count: 0, date: today };
    }
    const allowed = guestData.count < MAX_REQUESTS_GUEST;
    return { allowed, currentCount: guestData.count, maxRequests: MAX_REQUESTS_GUEST, today, guestData };
  }
  
  // Авторизованный пользователь
  let currentCount = userLimits.dailyCount;
  let lastDate = userLimits.lastDate;
  
  // Сброс при новом дне
  if (lastDate !== today) {
    currentCount = 0;
    userLimits.dailyCount = 0;
    userLimits.lastDate = today;
    await supabaseClient.from('users').update({ daily_requests_count: 0, last_request_date: new Date().toISOString() }).eq('user_id', userId);
  }
  
  const maxRequests = userLimits.isTrusted ? MAX_REQUESTS_TRUSTED : MAX_REQUESTS_NEW_USER;
  const allowed = currentCount < maxRequests;
  return { allowed, currentCount, maxRequests, today };
}

    async function initReferralCode() {
      if (!userId) return;
      if (userReferralCode) return;
      const code = 'ICE' + userId.toString().slice(-6);
      try {
        await supabaseClient.from('users').update({ referral_code: code }).eq('user_id', userId);
        userReferralCode = code;
      } catch(e) { console.log(e); }
    }

    async function loadWishlist() {
      if (!userId) return;
      try {
        const { data } = await supabaseClient.from('wishlist').select('product_id').eq('user_id', userId);
        if (data) data.forEach(item => wishlist.add(item.product_id));
      } catch(e) {}
    }

    function attachEventListeners() {
      document.getElementById('addBalanceBtn').onclick = () => alert('Пополнение баланса будет позже');
      document.querySelectorAll('.tab-item').forEach(tab => {
        tab.onclick = () => {
          const tabName = tab.getAttribute('data-tab');
          currentSubScreen = null;
          appliedPromo = null;
          switchTab(tabName);
        };
      });
    }

    function switchTab(tabName) {
      if (currentTab && currentTab !== tabName) previousTab = currentTab;
      currentTab = tabName;
      document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
      const activeTab = document.querySelector(`.tab-item[data-tab="${tabName}"]`);
      if (activeTab) activeTab.classList.add('active');
      renderCurrentScreen();
    }

    function renderFooter() {
      return `
        <div class="app-footer">
          <div class="social-icons"><span class="social-icon" data-social="tg">📱</span><span class="social-icon" data-social="ig">📷</span><span class="social-icon" data-social="vk">🎵</span></div>
          <div class="footer-links"><span class="footer-link" data-link="offer">Публичная оферта</span><span class="footer-link" data-link="privacy">Политика конфиденциальности</span><span class="footer-link" data-link="contacts">Контакты</span></div>
          <div class="copyright">ИП Иванов И.И., УНП 123456789<br>© 2025 ICE LOGIX. Все права защищены.</div>
        </div>
      `;
    }

    async function renderPromoBanners() {
  try {
    const { data, error } = await supabaseClient
      .from('promotions')
      .select('*')
      .eq('is_active', true)
      .order('created_at', { ascending: false })
      .limit(5);
    if (error) throw error;
    if (!data || data.length === 0) return '';
    
    return data.map(p => `
      <div class="banner-slide" data-promotion-id="${p.id}" style="background-image: url('${p.banner_url}'); background-size: cover; background-position: center; min-width: 280px; height: 120px;">
      </div>
    `).join('');
  } catch (err) {
    console.error('Ошибка загрузки баннеров:', err);
    return '';
  }
}

        // ==================== РЕНДЕР ГЛАВНОЙ СТРАНИЦЫ ====================
        async function renderHome() {
  const marketplaces = [
    { id: 1, name: 'Poizon', url: 'https://poizon.com' },
    { id: 2, name: 'Taobao', url: 'https://taobao.com' },
    { id: 3, name: '1688', url: 'https://1688.com' },
    { id: 4, name: 'Zalando', url: 'https://zalando.de' },
    { id: 5, name: 'Nike', url: 'https://nike.com' }
  ];
  
  return `
    <div class="scroll-x mb-6">
      <div class="story-card" data-story="reports"><div class="story-icon">📸</div><span class="story-label">Отчёты</span></div>
      <div class="story-card" data-story="reviews"><div class="story-icon">⭐</div><span class="story-label">Отзывы</span></div>
      <div class="story-card" data-story="promo"><div class="story-icon">🎁</div><span class="story-label">Акции</span></div>
      <div class="story-card" data-story="academy"><div class="story-icon">🎓</div><span class="story-label">Обучение</span></div>
      <div class="story-card" data-story="drops"><div class="story-icon">📦</div><span class="story-label">Дропы</span></div>
      <div class="story-card" data-story="referral"><div class="story-icon">👥</div><span class="story-label">Рефералы</span></div>
    </div>
    
    <div class="scroll-x mb-6" id="promoBannersContainer">
      ${await renderPromoBanners()}
    </div>
    
    <div class="mb-6">
      <div class="flex justify-between items-center mb-3">
        <h3 class="text-white font-bold">🔥 Популярные площадки</h3>
        <button id="moreMarketplacesBtn" class="text-cyan-400 text-sm">Больше →</button>
      </div>
      <div class="scroll-x">
        ${marketplaces.map(mp => `<div class="story-card marketplace-story" data-url="${mp.url}" style="min-width: 70px;"><div class="story-icon text-2xl">🛍️</div><span class="story-label">${mp.name}</span></div>`).join('')}
      </div>
    </div>
    
    <div class="mb-6">
      <div class="flex justify-between items-center mb-3">
        <h3 class="text-white font-bold">✨ Рекомендуем</h3>
        <button id="moreProductsBtn" class="text-cyan-400 text-sm">Больше →</button>
      </div>
      <div class="grid grid-cols-2 gap-3" id="homeProductsGrid"></div>
    </div>
    
    ${renderFooter()}
  `;
}

// ==================== ОБРАБОТЧИК ГЛАВНОЙ ====================
function attachHomeHandlers() {
      document.querySelector('[data-story="reports"]')?.addEventListener('click', () => switchTab('reports'));
      document.querySelector('[data-story="reviews"]')?.addEventListener('click', () => switchTab('reviews'));
      document.querySelector('[data-story="promo"]')?.addEventListener('click', () => alert('Акции будут позже'));
      document.querySelector('[data-story="academy"]')?.addEventListener('click', () => switchTab('academy'));
      document.querySelector('[data-story="drops"]')?.addEventListener('click', () => alert('Дропы будут позже'));
      document.querySelector('[data-story="referral"]')?.addEventListener('click', () => switchTab('profile'));
      document.getElementById('moreMarketplacesBtn')?.addEventListener('click', () => switchTab('catalogs'));
      document.getElementById('moreProductsBtn')?.addEventListener('click', () => switchTab('products'));
      document.querySelectorAll('.marketplace-story').forEach(el => {
        el.addEventListener('click', () => {
          const url = el.getAttribute('data-url');
          if (url) window.open(url, '_blank');
          else alert('Ссылка на площадку будет добавлена позже');
        });
      });
      document.querySelectorAll('.banner-slide').forEach(el => {
        el.addEventListener('click', () => alert('Подробнее о акции будет позже'));
      });
      document.querySelectorAll('.social-icon').forEach(el => {
        el.addEventListener('click', () => alert('Соцсети будут подключены позже'));
      });
      document.querySelectorAll('.footer-link').forEach(el => {
        el.addEventListener('click', () => alert(el.innerText + ' будет доступно позже'));
      });
      loadHomeProducts();
      document.querySelectorAll('.banner-slide').forEach(el => {
  el.addEventListener('click', () => {
    const promoId = el.dataset.promotionId;
    if (promoId) {
      // При клике на баннер активируем акцию в калькуляторе
      window.activePromotionId = promoId;
      alert('Акция применена! Перейдите в калькулятор.');
    }
  });
});
    }

    async function loadHomeProducts() {
      try {
        const { data } = await supabaseClient.from('products').select('*').eq('is_active', true).limit(6);
        const grid = document.getElementById('homeProductsGrid');
        if (grid && data) {
          grid.innerHTML = data.map(p => `
            <div class="product-card" data-product-id="${p.id}">
              <div class="aspect-square bg-white/10 flex items-center justify-center"><img src="${p.image_url || 'https://via.placeholder.com/150'}" class="w-full h-full object-cover"></div>
              <div class="p-2"><p class="text-white font-bold text-sm truncate">${p.title}</p><p class="text-cyan-400 text-xs">${p.price} ${p.currency}</p><button class="addToCartBtn mt-2 w-full bg-cyan-500/50 py-1 rounded text-xs">В корзину</button></div>
            </div>
          `).join('');
          document.querySelectorAll('.addToCartBtn').forEach(btn => {
            btn.onclick = (e) => { e.stopPropagation(); alert('Товар добавлен в корзину (в разработке)'); };
          });
          document.querySelectorAll('.product-card').forEach(card => {
            card.onclick = () => { const url = card.getAttribute('data-url'); if (url) { window.tempOrder = { url, price: 520, weight: 1, total: 0, discountAmount: 0 }; switchTab('neworder'); } };
          });
        }
      } catch(e) {}
    }

    // ==================== РЕНДЕР КАЛЬКУЛЯТОРА ====================
    async function renderCalculator() {
      const limitInfo = await checkAndUpdateLimit();
  let limitMessage = '';
  if (!limitInfo.allowed) {
    limitMessage = `<div class="bg-red-500/20 border border-red-500/50 rounded-xl p-3 mb-4 text-center">
      <p class="text-red-400 font-bold">⚠️ Дневной лимит исчерпан (${limitInfo.currentCount}/${limitInfo.maxRequests})</p>
      <p class="text-white/70 text-sm mt-1">Оформите заказ, чтобы снять ограничение</p>
    </div>`;
  } else {
    const remaining = limitInfo.maxRequests - limitInfo.currentCount;
    limitMessage = `<div class="bg-white/5 rounded-xl p-3 mb-4 text-center">
      <p class="text-white/70 text-sm">Осталось расчётов сегодня: <span class="text-cyan-400 font-bold">${remaining}</span> из ${limitInfo.maxRequests}</p>
    </div>`;
  }

      return `
        <div class="bg-white/10 backdrop-blur-md rounded-2xl p-5 shadow-lg">
          <h2 class="text-xl font-bold mb-4">🧮 Калькулятор стоимости</h2>
          <div id="activePromoInfo" class="mb-3 p-3 bg-cyan-500/10 rounded-xl border border-cyan-500/30 hidden">
          <p class="text-cyan-400 font-bold">🎁 Акция: <span id="promoTitle"></span></p>
          <p class="text-white/70 text-sm" id="promoDesc"></p>
          <p class="text-green-400 text-sm mt-1" id="promoDiscount"></p>

    async function attachCalculatorHandlers() {
  // Проверяем, есть ли активированная акция (через баннер или сохранённую)
  if (window.activePromotionId) {
    const { data: promo } = await supabaseClient.from('promotions').select('*').eq('id', window.activePromotionId).single();
    if (promo) {
      const activePromoInfo = document.getElementById('activePromoInfo');
      if (activePromoInfo) {
        activePromoInfo.classList.remove('hidden');
        document.getElementById('promoTitle').innerText = promo.title;
        document.getElementById('promoDesc').innerText = promo.description || '';
        const discountText = promo.discount_type === 'percent' 
          ? `Скидка ${promo.discount_value}%` 
          : `Скидка ${promo.discount_value} BYN`;
        document.getElementById('promoDiscount').innerText = discountText;
        window.currentPromotion = promo;
      }
    }
  }

  const slider = document.getElementById('calcWeight');
  const valSpan = document.getElementById('weightVal');
  if (slider) slider.oninput = () => valSpan.innerText = parseFloat(slider.value).toFixed(1) + ' кг';
  
  const calcBtn = document.getElementById('calcBtn');
  if (calcBtn) calcBtn.onclick = async () => {
    const limitCheck = await checkAndUpdateLimit();
    if (!limitCheck.allowed) {
      alert(`Вы исчерпали лимит бесплатных расчётов (${limitCheck.currentCount}/${limitCheck.maxRequests}). Оформите заказ, чтобы продолжить.`);
      return;
    }
    
    // Увеличиваем счётчик
    if (userId) {
      const newCount = limitCheck.currentCount + 1;
      await supabaseClient.from('users').update({ daily_requests_count: newCount, last_request_date: new Date().toISOString() }).eq('user_id', userId);
      userLimits.dailyCount = newCount;
    } else {
      const guestKey = 'ice_guest_requests';
      let guestData = JSON.parse(localStorage.getItem(guestKey) || '{"count":0,"date":""}');
      const today = new Date().toDateString();
      if (guestData.date !== today) guestData = { count: 0, date: today };
      guestData.count++;
      localStorage.setItem(guestKey, JSON.stringify(guestData));
    }
    
    let price = parseFloat(document.getElementById('calcPrice')?.value) || 0
    let weight = parseFloat(slider?.value || 1);
    let total = (price * 0.45) + (weight * 12);
    
    // Применяем акцию, если есть
    let discountAmount = 0;
    let promotionId = null;
    if (window.currentPromotion) {
      const promo = window.currentPromotion;
      if (total >= (promo.min_order_amount || 0)) {
        if (promo.discount_type === 'percent') {
          discountAmount = total * (promo.discount_value / 100);
        } else {
          discountAmount = Math.min(promo.discount_value, total);
        }
        promotionId = promo.id;
      }
    }
    const finalTotal = total - discountAmount;
    
    document.getElementById('totalPrice').innerText = finalTotal.toFixed(2);
    document.getElementById('calcResult').classList.remove('hidden');
    window.tempOrder = { 
      url: document.getElementById('calcUrl')?.value || '', 
      price, weight, total, finalTotal, discountAmount, 
      promotionId 
    };
  };
  
  const toNewOrderBtn = document.getElementById('toNewOrderBtn');
  if (toNewOrderBtn) toNewOrderBtn.onclick = () => { 
    if (window.tempOrder) switchTab('neworder'); 
    else alert('Сначала рассчитайте стоимость'); 
  };
}

    async function renderDropshipper() {
      if (!userId) return '<p class="text-center mt-10 text-red-400">Авторизуйтесь</p>';
      
      let settings = { margin_type: 'fixed', margin_value: 0, payout_threshold: 50 };
      try {
        const { data, error } = await supabaseClient.from('dropshipper_settings').select('*').eq('user_id', userId).single();
        if (!error && data) settings = data;
      } catch(e) {}
      
      let referrals = [];
      try {
        const { data, error } = await supabaseClient.from('referrals').select('referred_id, created_at').eq('referrer_id', userId);
        if (!error && data) referrals = data;
      } catch(e) {}
      
      let referralOrders = [];
      if (referrals.length > 0) {
        const referredIds = referrals.map(r => r.referred_id);
        try {
          const { data, error } = await supabaseClient.from('orders').select('*').in('user_id', referredIds).order('created_at', { ascending: false });
          if (!error && data) referralOrders = data;
        } catch(e) {}
      }
      
      let payoutRequests = [];
      try {
        const { data, error } = await supabaseClient.from('payout_requests').select('*').eq('user_id', userId).order('created_at', { ascending: false });
        if (!error && data) payoutRequests = data;
      } catch(e) {}
      
      const totalEarned = referralOrders.reduce((sum, order) => sum + (order.drop_margin || 0), 0);
      const availableForPayout = totalEarned - payoutRequests.filter(r => r.status === 'approved' || r.status === 'completed').reduce((sum, r) => sum + r.amount, 0);
      
      return `
        <button id="backToProfileBtn" class="global-back-btn">← Назад</button>
        <div class="space-y-4">
          <div class="bg-white/10 backdrop-blur-md rounded-2xl p-4">
            <h3 class="text-white font-bold text-lg mb-3">📊 Статистика</h3>
            <div class="grid grid-cols-2 gap-3">
              <div class="bg-white/5 rounded-xl p-3 text-center"><p class="text-white/70 text-xs">Приведено клиентов</p><p class="text-white text-xl font-bold">${referrals.length}</p></div>
              <div class="bg-white/5 rounded-xl p-3 text-center"><p class="text-white/70 text-xs">Заработано</p><p class="text-green-400 text-xl font-bold">${totalEarned} ❄️</p></div>
              <div class="bg-white/5 rounded-xl p-3 text-center"><p class="text-white/70 text-xs">Доступно к выводу</p><p class="text-cyan-400 text-xl font-bold">${availableForPayout} ❄️</p></div>
              <div class="bg-white/5 rounded-xl p-3 text-center"><p class="text-white/70 text-xs">Порог вывода</p><p class="text-white text-xl font-bold">${settings.payout_threshold} ❄️</p></div>
            </div>
          </div>
          <div class="bg-white/10 backdrop-blur-md rounded-2xl p-4">
            <h3 class="text-white font-bold text-lg mb-3">⚙️ Настройки наценки</h3>
            <div class="flex gap-3 mb-3">
              <select id="marginType" class="flex-1 p-2 rounded-lg bg-white/20 border border-white/30">
                <option value="fixed" ${settings.margin_type === 'fixed' ? 'selected' : ''}>Фикс (BYN)</option>
                <option value="percent" ${settings.margin_type === 'percent' ? 'selected' : ''}>Процент (%)</option>
              </select>
              <input type="number" id="marginValue" class="flex-1 p-2 rounded-lg bg-white/20 border border-white/30" value="${settings.margin_value}" step="1" placeholder="Значение">
            </div>
            <input type="number" id="payoutThreshold" class="w-full p-2 rounded-lg bg-white/20 border border-white/30 mb-3" value="${settings.payout_threshold}" placeholder="Порог вывода (BYN)">
            <button id="saveDropshipperSettings" class="w-full bg-cyan-500 py-2 rounded-lg">Сохранить настройки</button>
          </div>
          ${availableForPayout >= settings.payout_threshold ? `<div class="bg-white/10 backdrop-blur-md rounded-2xl p-4"><button id="requestPayoutBtn" class="w-full bg-green-600 py-2 rounded-lg">💸 Запросить выплату (${availableForPayout} ❄️)</button></div>` : ''}
          <div class="bg-white/10 backdrop-blur-md rounded-2xl p-4">
            <h3 class="text-white font-bold text-lg mb-3">📋 История выплат</h3>
            ${payoutRequests.length === 0 ? '<p class="text-white/70 text-sm">Нет заявок</p>' : payoutRequests.map(req => `<div class="flex justify-between items-center p-2 border-b border-white/10"><span class="text-white/80 text-sm">${req.amount} ❄️</span><span class="text-xs ${req.status === 'pending' ? 'text-yellow-400' : req.status === 'approved' ? 'text-green-400' : 'text-red-400'}">${req.status === 'pending' ? 'В обработке' : req.status === 'approved' ? 'Одобрен' : 'Отклонён'}</span><span class="text-white/50 text-xs">${new Date(req.created_at).toLocaleDateString()}</span></div>`).join('')}
          </div>
          <div class="bg-white/10 backdrop-blur-md rounded-2xl p-4">
            <h3 class="text-white font-bold text-lg mb-3">👥 Приведённые клиенты</h3>
            ${referrals.length === 0 ? '<p class="text-white/70 text-sm">Пока нет приведённых клиентов</p>' : referrals.map(ref => `<div class="flex justify-between items-center p-2 border-b border-white/10"><span class="text-white/80 text-sm">ID: ${ref.referred_id}</span><span class="text-white/50 text-xs">${new Date(ref.created_at).toLocaleDateString()}</span></div>`).join('')}
          </div>
          <div class="bg-white/10 backdrop-blur-md rounded-2xl p-4">
            <h3 class="text-white font-bold text-lg mb-3">📦 Заказы клиентов</h3>
            ${referralOrders.length === 0 ? '<p class="text-white/70 text-sm">Нет заказов от приведённых клиентов</p>' : referralOrders.map(order => `<div class="flex justify-between items-center p-2 border-b border-white/10"><span class="text-white/80 text-sm">Заказ #${order.id.slice(0,8)}</span><span class="text-green-400 text-sm">+${order.drop_margin || 0} ❄️</span><span class="text-white/50 text-xs">${new Date(order.created_at).toLocaleDateString()}</span></div>`).join('')}
          </div>
        </div>
        ${renderFooter()}
      `;
    }

    function attachDropshipperHandlers() {
      const backBtn = document.getElementById('backToProfileBtn');
      if (backBtn) backBtn.addEventListener('click', () => switchTab('profile'));
      const saveBtn = document.getElementById('saveDropshipperSettings');
      if (saveBtn) {
        saveBtn.onclick = async () => {
          const marginType = document.getElementById('marginType').value;
          const marginValue = parseFloat(document.getElementById('marginValue').value);
          const payoutThreshold = parseFloat(document.getElementById('payoutThreshold').value);

            const { error } = await supabaseClient.from('dropshipper_settings').upsert({

            });
            if (error) throw error;
            alert('Настройки сохранены');
            renderCurrentScreen();
          } catch (err) { alert('Ошибка: ' + err.message); }
        };
      }

        payoutBtn.onclick = async () => {
          const amount = parseFloat(payoutBtn.innerText.match(/\d+/)?.[0] || 0);

        };
      }
    }

async function renderAcademy() {
  try {
    const { data: courses, error } = await supabaseClient.from('courses').select('*').eq('is_active', true).order('created_at', { ascending: true });

    if (!courses || courses.length === 0) {

        ${renderFooter()}
      `;
    }
        
        let userProgress = {};
        if (userId) {
          try {
            const { data } = await supabaseClient.from('user_lessons_progress').select('lesson_id, is_completed').eq('user_id', userId);
            if (data) data.forEach(p => { userProgress[p.lesson_id] = p.is_completed; });
          } catch(e) {}
        }
        
        const coursesWithLessons = await Promise.all(courses.map(async (course) => {
          const { data: lessons } = await supabaseClient.from('lessons').select('*').eq('course_id', course.id).order('order_index', { ascending: true });
          const completedCount = lessons?.filter(l => userProgress[l.id]).length || 0;
          const totalCount = lessons?.length || 0;
          return { ...course, lessons: lessons || [], progress: totalCount > 0 ? Math.round(completedCount / totalCount * 100) : 0 };
        }));
        
        return `
        <div class="space-y-4">
            <button id="backFromAcademyBtn" class="global-back-btn">← Назад</button>
            ${isOwner ? '<button id="addCourseBtn" class="global-back-btn mb-2">➕ Добавить курс</button>' : ''}

              <div class="course-card" data-course-id="${course.id}">
                <div class="flex justify-between items-start">
                  <div>
                    <h3 class="text-white font-bold text-lg">${course.title}</h3>
                    <p class="text-white/70 text-sm mt-1">${course.description || 'Описание отсутствует'}</p>
                    <div class="mt-2"><div class="w-32 h-1 bg-white/20 rounded-full overflow-hidden"><div class="h-full bg-cyan-400 rounded-full" style="width: ${course.progress}%"></div></div><p class="text-white/50 text-xs mt-1">Прогресс: ${course.progress}%</p></div>

                ${course.price_ice > 0 && course.progress === 0 && (!userId || balance < course.price_ice) ? 
                  `<button class="buyCourseBtn mt-3 w-full bg-green-600 py-2 rounded-lg" data-course-id="${course.id}" data-price="${course.price_ice}">Купить за ${course.price_ice} ❄️</button>` : ''}
                <div class="lessons-container hidden mt-3 space-y-2" data-course="${course.id}">
                  ${course.lessons.map(lesson => `
                    <div class="lesson-item bg-white/5 rounded-xl p-3 cursor-pointer" data-lesson-id="${lesson.id}" data-lesson-type="${lesson.content_type}">
                      <div class="flex justify-between items-center">
                        <div><span class="text-white font-medium">${lesson.title}</span><p class="text-white/50 text-xs">${lesson.content_type === 'video' ? '📹 Видео' : lesson.content_type === 'quiz' ? '📝 Тест' : '📄 Текст'}</p></div>
                        ${userProgress[lesson.id] ? '<span class="text-green-400">✅ Пройдено</span>' : lesson.is_locked ? '<span class="text-yellow-400">🔒 Заблокировано</span>' : '<span class="text-cyan-400">▶ Начать</span>'}
                      </div>
                    </div>
                  `).join('')}
                </div>
              </div>
            `).join('')}
          </div>
          ${renderFooter()}
        `;
      } catch (err) { return '<p class="text-center mt-10 text-red-400">Ошибка загрузки курсов</p>'; }
    }

      document.querySelectorAll('.buyCourseBtn').forEach(btn => {
        btn.onclick = async () => {
          const courseId = btn.getAttribute('data-course-id');
          const price = parseInt(btn.getAttribute('data-price'));
          if (balance < price) { alert('Недостаточно средств'); return; }
          try {

            if (updateError) throw updateError;
            balance -= price;
            document.getElementById('headerBalance').innerText = balance + ' ❄️';
            alert('Курс приобретён!');
            renderCurrentScreen();
          } catch (err) { alert('Ошибка: ' + err.message); }
        };
      });
      
      document.querySelectorAll('.course-card').forEach(card => {
        const header = card;
        header.onclick = (e) => {

          const lessonsContainer = card.querySelector('.lessons-container');
          if (lessonsContainer) lessonsContainer.classList.toggle('hidden');
        };
      });
      
      document.querySelectorAll('.lesson-item').forEach(lesson => {
        lesson.onclick = async () => {
          const lessonId = lesson.getAttribute('data-lesson-id');
          try {
            const { data, error } = await supabaseClient.from('lessons').select('*').eq('id', lessonId).single();
            if (error) throw error;
            let content = '';
            if (data.content_type === 'text') content = `<div class="prose prose-invert max-w-none"><p class="text-white/90">${data.content}</p></div>`;
            else if (data.content_type === 'video') content = `<video src="${data.content}" class="w-full rounded-xl" controls></video>`;
            else if (data.content_type === 'quiz') content = `<div class="space-y-3"><p class="text-white">${data.content}</p><input type="text" class="w-full p-2 rounded bg-white/20" placeholder="Ваш ответ"><button class="mt-2 bg-cyan-500 px-4 py-2 rounded">Проверить</button></div>`;

            const modal = document.createElement('div');
            modal.className = 'fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4';

            document.body.appendChild(modal);
            modal.querySelector('.close-modal').onclick = () => modal.remove();
            
            if (!lesson.querySelector('.text-green-400')) {
              await supabaseClient.from('user_lessons_progress').upsert({ user_id: userId, lesson_id: lessonId, is_completed: true, completed_at: new Date() });
              renderCurrentScreen();
            }
          } catch (err) { alert('Ошибка загрузки урока'); }
        };
      });
    }

      return !error && data && data.length > 0;

async function renderAdminOrdersList() {
  try {
    // Формируем запрос в зависимости от режима (активные / архив)
    let query = supabaseClient.from('orders').select('*', { count: 'exact' });
    
    if (adminOrdersMode === 'active') {
      query = query.is('archived_at', null);
    } else {
      query = query.not('archived_at', 'is', null);
    }
    
    if (adminOrdersFilter !== 'all') {
      query = query.eq('status', adminOrdersFilter);
    }
    
    query = query.order('created_at', { ascending: false });
    
    const from = (adminOrdersPage - 1) * 10;
    const to = from + 9;
    const { data: orders, count, error } = await query.range(from, to);
    if (error) throw error;
    
    adminOrdersTotalPages = Math.ceil((count || 0) / 10);
    
    if (!orders || orders.length === 0) return '<p class="text-white/70 text-center py-4">Нет заказов</p>';
    
    // Убираем дубликаты по id (если вдруг есть)
    const uniqueOrders = Array.from(new Map(orders.map(o => [o.id, o])).values());
    
    const userIds = [...new Set(uniqueOrders.map(o => o.user_id))];
    const { data: users, error: usersError } = await supabaseClient
      .from('users')
      .select('user_id, full_name, username')
      .in('user_id', userIds);
      
    if (usersError) {
      console.error('Ошибка загрузки пользователей:', usersError);
    }
    
    const userMap = {};
    if (users) {
      users.forEach(u => { userMap[u.user_id] = u; });
    }
    
    return orders.map(order => {
      const user = userMap[order.user_id] || {};
      const displayName = user.full_name || 'Без имени';
      const displayUsername = user.username ? '@' + user.username : '';
      
      // В зависимости от режима показываем либо кнопку архивации, либо восстановления
      const actionButton = adminOrdersMode === 'active'
        ? `<button class="archiveOrderBtn mt-2 text-xs bg-red-600/50 hover:bg-red-600 px-2 py-1 rounded" data-order-id="${order.id}">🗑️ Архив</button>`
        : `<button class="restoreOrderBtn mt-2 text-xs bg-green-600/50 hover:bg-green-600 px-2 py-1 rounded" data-order-id="${order.id}">↩️ Восстановить</button>`;
      
      // Селект изменения статуса показываем только для активных заказов
      const statusSelect = adminOrdersMode === 'active'
        ? `<select class="changeOrderStatus mt-2 text-xs p-1 rounded bg-white/20 border border-white/30" data-order-id="${order.id}" data-user-id="${order.user_id}" data-previous-status="${order.status}">
            <option value="">Изменить</option>
            <option value="paid">Оплачен</option>
            <option value="bought">Выкуплен</option>
            <option value="on_sklad_cn">Склад КН</option>
            <option value="in_transit">В пути</option>
            <option value="in_belarus">В РБ</option>
            <option value="delivered">Доставлен</option>
            <option value="cancelled">Отменён</option>
          </select>`
        : '';
      
      return `
        <div class="bg-white/5 rounded-lg p-3">
          <div class="flex justify-between items-start">
            <div>
              <p class="text-white font-mono text-sm">#${order.id.slice(0,8)}</p>
              <p class="text-white/50 text-xs">${new Date(new Date(order.created_at).getTime() + 3*60*60*1000).toLocaleString('ru-RU')}</p>
              <p class="text-white/70 text-xs mt-1">👤 ${displayName} ${displayUsername}</p>
              <p class="text-white/50 text-xs">ID: ${order.user_id}</p>
              <p class="text-cyan-400 text-sm mt-1">${Number(order.prepayment_amount || 0).toFixed(2)} ❄️</p>
            </div>
            <div class="text-right">
              <span class="status-badge ${getStatusClass(order.status)}">${getStatusText(order.status)}</span>
              ${statusSelect}
              ${actionButton}
            </div>
          </div>
          ${order.tracking_number_cn ? `<p class="text-white/50 text-xs mt-1">Трек: ${order.tracking_number_cn}</p>` : ''}
        </div>
      `;
    }).join('');
  } catch (err) {
    console.error('Ошибка в renderAdminOrdersList:', err);
    return '<p class="text-red-400 text-center py-4">Ошибка загрузки заказов</p>';
  }
}

// Рендер каталога товаров (почти как старый renderProducts, но с кнопкой Назад)
async function renderProductsCatalog() {
  try {
    let query = supabaseClient.from('products').select('*', { count: 'exact' }).eq('is_active', true);
    if (productsFilter.category !== 'all') query = query.eq('category', productsFilter.category);
    if (productsFilter.brand !== 'all') query = query.eq('brand', productsFilter.brand);
    if (productsFilter.sort === 'price_asc') query = query.order('price', { ascending: true });
    else if (productsFilter.sort === 'price_desc') query = query.order('price', { ascending: false });
    else query = query.order('created_at', { ascending: false });
    
    const from = (productsPage - 1) * 20;
    const to = from + 19;
    const { data, count, error } = await query.range(from, to);
    if (error) throw error;
    
    productsTotalPages = Math.ceil((count || 0) / 20);
    
    const categories = [...new Set(data.map(p => p.category).filter(Boolean))];
    const brands = [...new Set(data.map(p => p.brand).filter(Boolean))];
    
    return `
      <button id="backFromProductsCatalogBtn" class="global-back-btn">← Назад</button>
      <div class="mb-4 flex flex-wrap gap-2">
        <div class="flex-1"><select id="filterCategory" class="w-full p-2 rounded-lg bg-white/20 border border-white/30"><option value="all">Все категории</option>${categories.map(c => `<option value="${c}" ${productsFilter.category === c ? 'selected' : ''}>${c}</option>`).join('')}</select></div>
        <div class="flex-1"><select id="filterBrand" class="w-full p-2 rounded-lg bg-white/20 border border-white/30"><option value="all">Все бренды</option>${brands.map(b => `<option value="${b}" ${productsFilter.brand === b ? 'selected' : ''}>${b}</option>`).join('')}</select></div>
        <div><select id="filterSort" class="w-full p-2 rounded-lg bg-white/20 border border-white/30"><option value="new" ${productsFilter.sort === 'new' ? 'selected' : ''}>Новинки</option><option value="price_asc" ${productsFilter.sort === 'price_asc' ? 'selected' : ''}>Цена ↑</option><option value="price_desc" ${productsFilter.sort === 'price_desc' ? 'selected' : ''}>Цена ↓</option></select></div>
        <button id="applyProductsFilter" class="bg-cyan-500 px-4 py-2 rounded-lg">Применить</button>
      </div>
      <div class="grid grid-cols-2 gap-4" id="productsGrid">
        ${data.map(p => `
          <div class="product-card" data-product-id="${p.id}">
            <div class="aspect-square bg-white/10 flex items-center justify-center relative"><img src="${p.image_url || 'https://via.placeholder.com/150'}" class="w-full h-full object-cover"><span class="absolute top-2 right-2 wishlist-heart text-xl ${wishlist.has(p.id) ? 'text-red-500' : 'text-white/50'}" data-product-id="${p.id}">${wishlist.has(p.id) ? '❤️' : '🤍'}</span></div>
            <div class="p-2"><p class="text-white font-bold text-sm truncate">${p.title}</p><p class="text-cyan-400 text-xs">${p.price} ${p.currency}</p><p class="text-white/50 text-xs">${p.brand || ''} ${p.category || ''}</p><button class="buyNowBtn mt-2 w-full bg-cyan-500/50 py-1 rounded text-xs" data-url="${p.url}" data-price="${p.price}">Купить сейчас</button></div>
          </div>
        `).join('')}
      </div>
      <div class="flex justify-center gap-2 mt-4"><button id="prevPage" class="bg-white/20 px-4 py-2 rounded-lg" ${productsPage <= 1 ? 'disabled' : ''}>← Назад</button><span class="text-white/70 py-2">Страница ${productsPage} из ${productsTotalPages}</span><button id="nextPage" class="bg-white/20 px-4 py-2 rounded-lg" ${productsPage >= productsTotalPages ? 'disabled' : ''}>Вперёд →</button></div>
      ${renderFooter()}
    `;
  } catch (err) { return '<p class="text-center mt-10 text-red-400">Ошибка загрузки товаров</p>'; }
}

function attachProductsCatalogHandlers() {
  const applyBtn = document.getElementById('applyProductsFilter');
  if (applyBtn) {
    applyBtn.onclick = () => {
      productsFilter.category = document.getElementById('filterCategory').value;
      productsFilter.brand = document.getElementById('filterBrand').value;
      productsFilter.sort = document.getElementById('filterSort').value;
      productsPage = 1;
      renderCurrentScreen();
    };
  }
  const prevBtn = document.getElementById('prevPage');
  const nextBtn = document.getElementById('nextPage');
  if (prevBtn) prevBtn.onclick = () => { if (productsPage > 1) { productsPage--; renderCurrentScreen(); } };
  if (nextBtn) nextBtn.onclick = () => { if (productsPage < productsTotalPages) { productsPage++; renderCurrentScreen(); } };
  
  document.querySelectorAll('.wishlist-heart').forEach(heart => {
    heart.onclick = async (e) => {
      e.stopPropagation();
      const productId = heart.getAttribute('data-product-id');
      if (wishlist.has(productId)) {
        await supabaseClient.from('wishlist').delete().eq('user_id', userId).eq('product_id', productId);
        wishlist.delete(productId);
        heart.innerText = '🤍';
        heart.classList.remove('text-red-500');
      } else {
        await supabaseClient.from('wishlist').insert({ user_id: userId, product_id: productId });
        wishlist.add(productId);
        heart.innerText = '❤️';
        heart.classList.add('text-red-500');
      }
    };
  });
  
  document.querySelectorAll('.buyNowBtn').forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      const url = btn.getAttribute('data-url');
      const price = parseFloat(btn.getAttribute('data-price'));
      if (url) {
        window.tempOrder = { url: url, price: price, weight: 1, total: price * 0.45 + 12, discountAmount: 0, appliedPromo: null };
        switchTab('neworder');
      }
    };
  });
  
  document.querySelectorAll('.product-card').forEach(card => {
    card.onclick = () => {
      const url = card.querySelector('.buyNowBtn')?.getAttribute('data-url');
      const price = parseFloat(card.querySelector('.buyNowBtn')?.getAttribute('data-price'));
      if (url) {
        window.tempOrder = { url: url, price: price, weight: 1, total: price * 0.45 + 12, discountAmount: 0, appliedPromo: null };
        switchTab('neworder');
      }
    };
  });
  
  const backBtn = document.getElementById('backFromProductsCatalogBtn');
  if (backBtn) backBtn.onclick = () => { currentSubScreen = null; renderCurrentScreen(); };
}

async function addToCart(productId, quantity = 1) {
  if (!userId) { alert('Авторизуйтесь'); return; }
  // Проверяем, есть ли уже такой товар
  const { data: existing } = await supabaseClient.from('cart').select('id, quantity').eq('user_id', userId).eq('product_id', productId).maybeSingle();
  if (existing) {
    await supabaseClient.from('cart').update({ quantity: existing.quantity + quantity, updated_at: new Date() }).eq('id', existing.id);
  } else {
    await supabaseClient.from('cart').insert({ user_id: userId, product_id: productId, quantity });
  }
  updateCartBadge();
  alert('Товар добавлен в корзину');
}

// ==================== РЕНДЕР ПОДКАТАЛОГА ТОВАРОВ ====================
async function renderProductsCatalog() {
  try {
    let query = supabaseClient.from('products').select('*', { count: 'exact' }).eq('is_active', true);
    if (productsFilter.category !== 'all') query = query.eq('category', productsFilter.category);
    if (productsFilter.brand !== 'all') query = query.eq('brand', productsFilter.brand);
    if (productsFilter.sort === 'price_asc') query = query.order('price', { ascending: true });
    else if (productsFilter.sort === 'price_desc') query = query.order('price', { ascending: false });
    else query = query.order('created_at', { ascending: false });
    
    const from = (productsPage - 1) * 20;
    const to = from + 19;
    const { data, count, error } = await query.range(from, to);
    if (error) throw error;
    productsTotalPages = Math.ceil((count || 0) / 20);
    const categories = [...new Set(data.map(p => p.category).filter(Boolean))];
    const brands = [...new Set(data.map(p => p.brand).filter(Boolean))];
    
    return `
      <button id="backFromProductsCatalogBtn" class="global-back-btn">← Назад</button>
      <div class="mb-4 flex flex-wrap gap-2">
        <div class="flex-1"><select id="filterCategory" class="w-full p-2 rounded-lg bg-white/20 border border-white/30"><option value="all">Все категории</option>${categories.map(c => `<option value="${c}" ${productsFilter.category === c ? 'selected' : ''}>${c}</option>`).join('')}</select></div>
        <div class="flex-1"><select id="filterBrand" class="w-full p-2 rounded-lg bg-white/20 border border-white/30"><option value="all">Все бренды</option>${brands.map(b => `<option value="${b}" ${productsFilter.brand === b ? 'selected' : ''}>${b}</option>`).join('')}</select></div>
        <div><select id="filterSort" class="w-full p-2 rounded-lg bg-white/20 border border-white/30"><option value="new" ${productsFilter.sort === 'new' ? 'selected' : ''}>Новинки</option><option value="price_asc" ${productsFilter.sort === 'price_asc' ? 'selected' : ''}>Цена ↑</option><option value="price_desc" ${productsFilter.sort === 'price_desc' ? 'selected' : ''}>Цена ↓</option></select></div>
        <button id="applyProductsFilter" class="bg-cyan-500 px-4 py-2 rounded-lg">Применить</button>
      </div>
      <div class="grid grid-cols-2 gap-4" id="productsGrid">
        ${data.map(p => `
          <div class="product-card" data-product-id="${p.id}">
            <div class="aspect-square bg-white/10 flex items-center justify-center relative"><img src="${p.image_url || 'https://via.placeholder.com/150'}" class="w-full h-full object-cover"><span class="absolute top-2 right-2 wishlist-heart text-xl ${wishlist.has(p.id) ? 'text-red-500' : 'text-white/50'}" data-product-id="${p.id}">${wishlist.has(p.id) ? '❤️' : '🤍'}</span></div>
            <div class="p-2"><p class="text-white font-bold text-sm truncate">${p.title}</p><p class="text-cyan-400 text-xs">${p.price} ${p.currency}</p><p class="text-white/50 text-xs">${p.brand || ''} ${p.category || ''}</p><button class="buyNowBtn mt-2 w-full bg-cyan-500/50 py-1 rounded text-xs" data-url="${p.url}" data-price="${p.price}">Купить сейчас</button></div>
          </div>
        `).join('')}
      </div>
      <div class="flex justify-center gap-2 mt-4"><button id="prevPage" class="bg-white/20 px-4 py-2 rounded-lg" ${productsPage <= 1 ? 'disabled' : ''}>← Назад</button><span class="text-white/70 py-2">Страница ${productsPage} из ${productsTotalPages}</span><button id="nextPage" class="bg-white/20 px-4 py-2 rounded-lg" ${productsPage >= productsTotalPages ? 'disabled' : ''}>Вперёд →</button></div>
      ${renderFooter()}
    `;
  } catch (err) { return '<p class="text-center mt-10 text-red-400">Ошибка загрузки товаров</p>'; }
}

function attachProductsCatalogHandlers() {
  const applyBtn = document.getElementById('applyProductsFilter');
  if (applyBtn) applyBtn.onclick = () => {
    productsFilter.category = document.getElementById('filterCategory').value;
    productsFilter.brand = document.getElementById('filterBrand').value;
    productsFilter.sort = document.getElementById('filterSort').value;
    productsPage = 1;
    renderCurrentScreen();
  };
  document.getElementById('prevPage')?.addEventListener('click', () => { if (productsPage > 1) { productsPage--; renderCurrentScreen(); } });
  document.getElementById('nextPage')?.addEventListener('click', () => { if (productsPage < productsTotalPages) { productsPage++; renderCurrentScreen(); } });
  
  document.querySelectorAll('.wishlist-heart').forEach(heart => {
    heart.onclick = async (e) => {
      e.stopPropagation();
      const pid = heart.dataset.productId;
      if (wishlist.has(pid)) {
        await supabaseClient.from('wishlist').delete().eq('user_id', userId).eq('product_id', pid);
        wishlist.delete(pid);
        heart.innerText = '🤍';
        heart.classList.remove('text-red-500');
      } else {
        await supabaseClient.from('wishlist').insert({ user_id: userId, product_id: pid });
        wishlist.add(pid);
        heart.innerText = '❤️';
        heart.classList.add('text-red-500');
      }
    };
  });
  
  document.querySelectorAll('.buyNowBtn').forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      const url = btn.dataset.url;
      const price = parseFloat(btn.dataset.price);
      if (url) { window.tempOrder = { url, price, weight: 1, total: price * 0.45 + 12, discountAmount: 0, appliedPromo: null }; switchTab('neworder'); }
    };
  });
  
  document.querySelectorAll('.product-card').forEach(card => {
    card.onclick = () => {
      const btn = card.querySelector('.buyNowBtn');
      if (btn) { const url = btn.dataset.url; const price = parseFloat(btn.dataset.price); window.tempOrder = { url, price, weight: 1, total: price * 0.45 + 12, discountAmount: 0, appliedPromo: null }; switchTab('neworder'); }
    };
  });
  
  const backBtn = document.getElementById('backFromProductsCatalogBtn');
  if (backBtn) backBtn.onclick = () => { currentSubScreen = null; renderCurrentScreen(); };
}

// Подписание договора (генерирует PDF и сохраняет в Storage)
async function signAgreement() {
  if (!userId) return;
  try {
    // Проверяем, есть ли уже подписанный договор
    const { data: existing } = await supabaseClient.from('users').select('agreement_signed').eq('user_id', userId).single();
    if (existing?.agreement_signed) { alert('Договор уже подписан'); return; }
    
    // Генерируем PDF (заглушка – в будущем можно использовать Edge Function)
    const agreementText = `ДОГОВОР ОКАЗАНИЯ УСЛУГ\n\nКлиент: ${userName}\nID: ${userId}\nДата: ${new Date().toLocaleString('ru-RU')}\n\nУсловия: ...`;
    const blob = new Blob([agreementText], { type: 'application/pdf' });
    const file = new File([blob], `agreement_${userId}.pdf`);
    
    // Загружаем в Storage
    const { data: uploadData, error: uploadError } = await supabaseClient.storage
      .from('agreements')
      .upload(`${userId}/${Date.now()}.pdf`, file);
    if (uploadError) throw uploadError;
    
    const { data: publicUrl } = supabaseClient.storage.from('agreements').getPublicUrl(uploadData.path);
    
    // Обновляем пользователя
    await supabaseClient.from('users').update({
      agreement_signed: true,
      agreement_signed_at: new Date().toISOString()
    }).eq('user_id', userId);
    
    // Сохраняем запись в user_agreements
    await supabaseClient.from('user_agreements').insert({
      user_id: userId,
      agreement_url: publicUrl.publicUrl
    });
    
    alert('Договор подписан!');
  } catch (err) {
    alert('Ошибка: ' + err.message);
  }
}

async function showPhoneBinding() {
  // Проверяем, есть ли уже номер
  const { data } = await supabaseClient.from('users').select('phone').eq('user_id', userId).single();
  const currentPhone = data?.phone || '';
  
  const modal = document.createElement('div');
  modal.className = 'fixed inset-0 bg-black/80 flex items-center justify-center z-[110] p-4 overflow-y-auto pt-16 pb-20';
  modal.innerHTML = `
    <div class="bg-[#1e293b] rounded-2xl max-w-md w-full max-h-[90vh] flex flex-col border border-white/20">
      <div class="p-5 border-b border-white/20">
        <h3 class="text-white font-bold text-lg">📱 Привязка телефона</h3>
      </div>
      <div class="p-5 overflow-y-auto flex-1">
        <p class="text-white/70 text-sm mb-3">Номер телефона нужен для восстановления доступа и уведомлений.</p>
        <label class="text-white/70 text-sm">Номер телефона</label>
        <input type="tel" id="phoneInput" class="w-full p-3 rounded-xl bg-white/20 border border-white/30 mb-3" placeholder="+375XXXXXXXXX" value="${currentPhone}">
        <button id="sendCodeBtn" class="w-full bg-cyan-500 py-2 rounded-xl mb-3">📨 Отправить код подтверждения</button>
        <div id="codeSection" class="hidden">
          <label class="text-white/70 text-sm">Код из SMS</label>
          <input type="text" id="codeInput" class="w-full p-3 rounded-xl bg-white/20 border border-white/30 mb-3" placeholder="123456">
          <button id="verifyCodeBtn" class="w-full bg-green-500 py-2 rounded-xl">✅ Подтвердить</button>
        </div>
      </div>
      <div class="p-5 border-t border-white/20">
        <button id="closePhoneModal" class="w-full bg-white/20 py-2 rounded-xl">Закрыть</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
  
  const phoneInput = document.getElementById('phoneInput');
  const codeSection = document.getElementById('codeSection');
  let currentCode = null;
  
  modal.querySelector('#closePhoneModal').onclick = () => modal.remove();
  
  document.getElementById('sendCodeBtn').onclick = async () => {
    const phone = phoneInput.value.trim();
    if (!phone) { alert('Введите номер'); return; }
    // Генерируем код
    currentCode = Math.floor(100000 + Math.random() * 900000).toString();
    // Отправляем код через бота (сохраняем в базе временно)
    const expiresAt = new Date(Date.now() + 10 * 60 * 1000).toISOString();
    await supabaseClient.from('recovery_codes').insert({
      user_id: userId,
      code: currentCode,
      expires_at: expiresAt
    });
    // В будущем здесь будет вызов бота для отправки SMS, пока просто показываем код в alert для теста
    alert(`Ваш код подтверждения: ${currentCode}`);
    codeSection.classList.remove('hidden');
  };
  
  document.getElementById('verifyCodeBtn').onclick = async () => {
    const enteredCode = document.getElementById('codeInput').value.trim();
    if (!enteredCode) { alert('Введите код'); return; }
    const { data, error } = await supabaseClient.from('recovery_codes')
      .select('*')
      .eq('user_id', userId)
      .eq('code', enteredCode)
      .eq('used', false)
      .gte('expires_at', new Date().toISOString())
      .single();
    if (error || !data) { alert('Неверный или просроченный код'); return; }
    
    // Помечаем код использованным
    await supabaseClient.from('recovery_codes').update({ used: true }).eq('id', data.id);
    // Сохраняем номер
    await supabaseClient.from('users').update({ phone: phoneInput.value.trim() }).eq('user_id', userId);
    alert('Номер успешно привязан!');
    modal.remove();
  };
}

async function renderCart() {
  if (!userId) return '<p class="text-center mt-10 text-white/70">Авторизуйтесь</p>';
  try {
    const { data, error } = await supabaseClient
      .from('cart')
      .select('*, products(*)')
      .eq('user_id', userId)
      .order('added_at', { ascending: false });
    if (error) throw error;
    
    if (!data || data.length === 0) {
      return '<div class="text-center py-10"><p class="text-white/70 mb-4">🛒 Ваша корзина пуста</p><button id="goToCatalogBtn" class="bg-cyan-500 px-6 py-2 rounded-full">Перейти в каталог</button></div>' + renderFooter();
    }
    
    let totalPrice = 0;
    const itemsHtml = data.map(item => {
      const product = item.products;
      if (!product) return '';
      const itemTotal = product.price * item.quantity;
      totalPrice += itemTotal;
      return `
        <div class="bg-white/10 backdrop-blur-md rounded-xl p-3 flex items-center gap-3" data-cart-id="${item.id}">
          <img src="${product.image_url || 'https://via.placeholder.com/60'}" class="w-16 h-16 object-cover rounded-lg">
          <div class="flex-1">
            <p class="text-white font-bold">${product.title}</p>
            <p class="text-cyan-400 text-sm">${product.price} ${product.currency} × ${item.quantity}</p>
            <p class="text-white/70 text-xs">${itemTotal.toFixed(2)} BYN (примерно)</p>
          </div>
          <div class="flex items-center gap-2">
            <button class="cart-qty-btn bg-white/20 rounded-full w-8 h-8 flex items-center justify-center" data-action="decrease" data-id="${item.id}">−</button>
            <span class="text-white">${item.quantity}</span>
            <button class="cart-qty-btn bg-white/20 rounded-full w-8 h-8 flex items-center justify-center" data-action="increase" data-id="${item.id}">+</button>
            <button class="cart-remove-btn text-red-400 ml-2" data-id="${item.id}">🗑️</button>
          </div>
        </div>
      `;
    }).join('');
    
    return `
      <button id="backFromCartBtn" class="global-back-btn">← Назад</button>
      <div class="space-y-3">
        ${itemsHtml}
        <div class="bg-white/10 backdrop-blur-md rounded-xl p-4 mt-4">
          <div class="flex justify-between items-center">
            <span class="text-white font-bold text-lg">Итого:</span>
            <span class="text-cyan-400 font-bold text-xl">${totalPrice.toFixed(2)} BYN</span>
          </div>
          <p class="text-white/50 text-xs mt-1">*Примерная стоимость, точный расчёт в калькуляторе</p>
          <button id="clearCartBtn" class="w-full mt-3 bg-red-500/20 hover:bg-red-500/30 py-2 rounded-full text-sm">🗑️ Очистить корзину</button>
          <button id="checkoutCartBtn" class="w-full mt-2 bg-green-500 hover:bg-green-600 py-3 rounded-full font-bold">✨ Оформить заказ</button>
        </div>
      </div>
      ${renderFooter()}
    `;
  } catch (err) {
    console.error('Ошибка в renderCart:', err);
    return '<p class="text-center mt-10 text-red-400">Ошибка загрузки корзины</p>';
  }
}

function attachCartHandlers() {
  const backBtn = document.getElementById('backFromCartBtn');
  if (backBtn) backBtn.onclick = () => switchTab('home');
  
  const goToCatalogBtn = document.getElementById('goToCatalogBtn');
  if (goToCatalogBtn) goToCatalogBtn.onclick = () => switchTab('catalogs');
  
  // Обработчики изменения количества и удаления
  document.querySelectorAll('.cart-qty-btn').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const action = btn.dataset.action;
      const cartId = btn.dataset.id;
      const row = btn.closest('[data-cart-id]');
      const qtySpan = row.querySelector('span');
      let newQty = parseInt(qtySpan.innerText);
      
      if (action === 'increase') newQty++;
      else if (action === 'decrease') newQty = Math.max(1, newQty - 1);
      
      const { error } = await supabaseClient.from('cart').update({ quantity: newQty, updated_at: new Date() }).eq('id', cartId);
      if (!error) {
        qtySpan.innerText = newQty;
        renderCurrentScreen(); // Перерисовываем для обновления итого
      }
    });
  });
  
  document.querySelectorAll('.cart-remove-btn').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const cartId = btn.dataset.id;
      await supabaseClient.from('cart').delete().eq('id', cartId);
      renderCurrentScreen();
    });
  });
  
  const clearCartBtn = document.getElementById('clearCartBtn');
  if (clearCartBtn) clearCartBtn.onclick = async () => {
    if (!confirm('Удалить все товары из корзины?')) return;
    await supabaseClient.from('cart').delete().eq('user_id', userId);
    renderCurrentScreen();
  };
  
  const checkoutCartBtn = document.getElementById('checkoutCartBtn');
  if (checkoutCartBtn) checkoutCartBtn.onclick = async () => {
    // Получаем товары из корзины
    const { data: cartItems } = await supabaseClient.from('cart').select('*, products(*)').eq('user_id', userId);
    if (!cartItems || cartItems.length === 0) {
      alert('Корзина пуста');
      return;
    }
    // Формируем заказ из первого товара (для примера), в будущем можно сделать множественный заказ
    const firstItem = cartItems[0];
    const product = firstItem.products;
    window.tempOrder = {
      url: product.url,
      price: product.price,
      weight: 1, // временно
      total: product.price * 0.45 + 12,
      discountAmount: 0,
      appliedPromo: null
    };
    switchTab('neworder');
  };
}

async function updateCartBadge() {
  if (!userId) return;
  const { count } = await supabaseClient.from('cart').select('*', { count: 'exact', head: true }).eq('user_id', userId);
  const badge = document.getElementById('cartBadge');
  if (badge) {
    if (count > 0) {
      badge.innerText = count > 99 ? '99+' : count;
      badge.classList.remove('hidden');
    } else {
      badge.classList.add('hidden');
    }
  }
}
