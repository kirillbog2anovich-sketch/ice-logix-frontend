<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>ICE LOGIX</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0F172A; font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
    
    /* Стили статусов заказов */
    .status-badge { padding: 4px 12px; border-radius: 40px; font-size: 11px; font-weight: bold; display: inline-block; }
    .status-pending { background: #f59e0b; color: #000; }
    .status-paid { background: #10b981; color: #fff; }
    .status-bought { background: #3b82f6; color: #fff; }
    .status-on_sklad_cn { background: #8b5cf6; color: #fff; }
    .status-in_transit { background: #06b6d4; color: #fff; }
    .status-in_belarus { background: #14b8a6; color: #fff; }
    .status-delivered { background: #10b981; color: #fff; }
    .status-cancelled { background: #ef4444; color: #fff; }
    
    /* Карточки товаров */
    .product-card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
      transition: all 0.2s;
      cursor: pointer;
    }
    .product-card:hover { transform: translateY(-4px); background: rgba(255,255,255,0.12); }
    
    /* Сторис-квадратики */
    .story-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      transition: 0.2s;
      min-width: 70px;
    }
    .story-card:hover { transform: translateY(-2px); }
    .story-icon {
      width: 70px;
      height: 70px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .story-label { font-size: 11px; font-weight: 500; color: #8e9aaf; }
    
    /* Баннер-карусель */
    .banner-slide {
      background: linear-gradient(135deg, #007aff, #00c2ff);
      border-radius: 20px;
      padding: 16px;
      min-width: 280px;
      scroll-snap-align: start;
      cursor: pointer;
    }
    .banner-title { font-size: 18px; font-weight: bold; color: white; }
    .banner-desc { font-size: 12px; color: rgba(255,255,255,0.8); margin-top: 4px; }
    
    /* Нижнее меню */
    .tab-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(25px);
      border-top: 1px solid rgba(255,255,255,0.1);
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 8px 12px 16px;
      z-index: 100;
    }
    .tab-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: #8e9aaf;
      cursor: pointer;
      transition: color 0.2s;
    }
    .tab-item.active { color: #00c2ff; }
    .tab-icon { font-size: 22px; }
    .tab-label { font-size: 10px; font-weight: 600; }
    .tab-item.new-order {
      background: linear-gradient(135deg, #007aff, #00c2ff);
      color: white;
      padding: 8px 16px;
      border-radius: 40px;
      margin-top: -12px;
      box-shadow: 0 4px 12px rgba(0,122,255,0.4);
    }
    .tab-item.new-order .tab-label { font-size: 12px; font-weight: bold; }
    
    /* Верхняя панель */
    .app-header {
      position: sticky;
      top: 0;
      z-index: 90;
      background: rgba(15, 23, 42, 0.92);
      backdrop-filter: blur(25px);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .header-left { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .logo-img { height: 44px; cursor: pointer; transition: 0.2s; }
    .logo-img:hover { transform: scale(1.02); }
    .header-right { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .balance {
      background: rgba(0,194,255,0.15);
      padding: 5px 12px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .balance-add { background: none; border: none; color: #00c2ff; font-size: 16px; cursor: pointer; font-weight: bold; padding: 0; }
    .icon-btn { background: none; border: none; color: white; font-size: 20px; cursor: pointer; width: 32px; text-align: center; }
    
    /* Карточка пользователя (аватар + имя) */
    .user-card {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      padding: 5px 12px 5px 5px;
      border-radius: 40px;
      cursor: pointer;
      transition: 0.2s;
    }
    .user-card:hover { background: rgba(255,255,255,0.2); }
    .user-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #2d3748;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .user-name { font-size: 14px; font-weight: 600; color: white; }
    
    /* Отдельная кнопка "Назад" */
    .global-back-btn {
      background: rgba(255,255,255,0.15);
      border: none;
      color: white;
      font-size: 14px;
      font-weight: 600;
      padding: 8px 20px;
      border-radius: 40px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: 0.2s;
      margin-bottom: 16px;
    }
    .global-back-btn:hover { background: rgba(255,255,255,0.25); }
    
    .main-content { padding: 16px; padding-bottom: 80px; }
    
    /* Футер (юридическая информация) */
    .app-footer {
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255,255,255,0.1);
      padding: 20px 16px;
      margin-top: 30px;
      text-align: center;
    }
    .footer-links { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-bottom: 12px; }
    .footer-link { color: #8e9aaf; font-size: 12px; text-decoration: none; cursor: pointer; }
    .footer-link:hover { color: #00c2ff; }
    .social-icons { display: flex; justify-content: center; gap: 20px; margin-bottom: 12px; }
    .social-icon { font-size: 24px; cursor: pointer; }
    .copyright { font-size: 10px; color: #5a6e8a; }
    
    /* Карусели */
    .scroll-x { overflow-x: auto; display: flex; gap: 12px; scroll-snap-type: x mandatory; padding-bottom: 8px; }
    .scroll-x::-webkit-scrollbar { display: none; }
    
    /* Карточка отзыва */
    .review-card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 12px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .stars { color: #fbbf24; margin-bottom: 8px; }
  </style>
</head>
<body>
  <div id="app">
    <div class="app-header">
      <div class="header-left">
        <img id="logoImg" class="logo-img" src="https://i.ibb.co/9kJTjpjT/1-Logo.png" alt="ICE LOGIX">
      </div>
      <div class="header-right">
        <div class="balance"><span id="headerBalance">0 ❄️</span><button class="balance-add" id="addBalanceBtn">+</button></div>
        <button class="icon-btn" id="notificationsBtn">🔔</button>
        <button class="icon-btn" id="settingsBtn">⚙️</button>
        <div class="user-card" id="userCard">
          <div class="user-avatar" id="avatar"></div>
          <span class="user-name" id="userNameHeader">Гость</span>
        </div>
      </div>
    </div>
    <div id="content" class="main-content"><div class="text-center py-10">Загрузка...</div></div>
    <div class="tab-bar" id="tabBar">
      <div class="tab-item" data-tab="home"><span class="tab-icon">🏠</span><span class="tab-label">Главная</span></div>
      <div class="tab-item" data-tab="calculator"><span class="tab-icon">🧮</span><span class="tab-label">Калькулятор</span></div>
      <div class="tab-item new-order" data-tab="neworder"><span class="tab-icon">✨</span><span class="tab-label">Новый заказ</span></div>
      <div class="tab-item" data-tab="catalogs"><span class="tab-icon">📚</span><span class="tab-label">Каталоги</span></div>
      <div class="tab-item" data-tab="profile"><span class="tab-icon">👤</span><span class="tab-label">Профиль</span></div>
    </div>
  </div>
  <script>
    let tg = null, userId = null, userName = 'Гость', userAvatarUrl = null, isOwner = false, supabaseClient = null;
    let currentTab = 'home', previousTab = null, currentSubScreen = null;
    let balance = 0;

    async function init() {
      tg = window.Telegram.WebApp;
      tg.ready();
      tg.expand();
      const user = tg.initDataUnsafe?.user;
      userId = user ? user.id : null;
      userName = user ? (user.first_name || user.username) : 'Гость';
      userAvatarUrl = user?.photo_url || null;
      const SUPABASE_URL = 'https://vrvwdagjpttvfvjanbwq.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZydndkYWdqcHR0dmZ2amFuYndxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NTc4MzgsImV4cCI6MjA5MTIzMzgzOH0.P9GQSW6NLN1BhR66PX-LP4ysZBXFeWIXRYIRvhRjo1c';
      supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      await loadUserData();
      attachEventListeners();
      const avatarDiv = document.querySelector('#avatar');
      avatarDiv.innerHTML = userAvatarUrl ? `<img src="${userAvatarUrl}">` : userName.charAt(0).toUpperCase();
      document.querySelector('#userNameHeader').innerText = userName;
      document.getElementById('logoImg').onclick = () => switchTab('home');
      document.getElementById('userCard').onclick = () => switchTab('profile');
      document.getElementById('settingsBtn').onclick = () => alert('Настройки будут позже');
      document.getElementById('notificationsBtn').onclick = () => alert('Уведомлений пока нет');
      switchTab('home');
    }

    async function loadUserData() {
      if (!userId) return;
      const { data, error } = await supabaseClient.from('users').select('role, ices_balance').eq('user_id', userId).maybeSingle();
      if (!error && data) {
        isOwner = (data.role === 'owner');
        balance = data.ices_balance || 0;
        document.getElementById('headerBalance').innerText = balance + ' ❄️';
      }
    }

    function attachEventListeners() {
      document.getElementById('addBalanceBtn').onclick = () => alert('Пополнение баланса будет позже');
      document.querySelectorAll('.tab-item').forEach(tab => {
        tab.onclick = () => {
          const tabName = tab.getAttribute('data-tab');
          currentSubScreen = null;
          switchTab(tabName);
        };
      });
    }

    function switchTab(tabName) {
      if (currentTab && currentTab !== tabName) previousTab = currentTab;
      currentTab = tabName;
      document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
      const activeTab = document.querySelector(`.tab-item[data-tab="${tabName}"]`);
      if (activeTab) activeTab.classList.add('active');
      renderCurrentScreen();
    }

        // --- РЕНДЕР ГЛАВНОЙ СТРАНИЦЫ ---
        async function renderHome() {
      // Загружаем публичные отчёты для сторис
      let reports = [];
      try {
        const { data } = await supabaseClient
          .from('public_reports')
          .select('*')
          .eq('is_active', true)
          .limit(10);
        if (data) reports = data;
      } catch(e) { console.log(e); }
      
      // Мок-данные для подборки товаров (10 товаров, 2 ряда по 5)
      const products = [
        { id: 1, name: 'Nike Dunk Low', price: 520, image: 'https://via.placeholder.com/150', url: 'https://nike.com' },
        { id: 2, name: 'Jordan 1 Retro', price: 780, image: 'https://via.placeholder.com/150', url: 'https://nike.com' },
        { id: 3, name: 'Yeezy 350', price: 640, image: 'https://via.placeholder.com/150', url: 'https://adidas.com' },
        { id: 4, name: 'Adidas Samba', price: 420, image: 'https://via.placeholder.com/150', url: 'https://adidas.com' },
        { id: 5, name: 'New Balance 550', price: 560, image: 'https://via.placeholder.com/150', url: 'https://newbalance.com' },
        { id: 6, name: 'Asics Gel Kayano', price: 680, image: 'https://via.placeholder.com/150', url: 'https://asics.com' },
        { id: 7, name: 'Puma Suede', price: 380, image: 'https://via.placeholder.com/150', url: 'https://puma.com' },
        { id: 8, name: 'Reebok Club C', price: 450, image: 'https://via.placeholder.com/150', url: 'https://reebok.com' },
        { id: 9, name: 'Converse Chuck', price: 320, image: 'https://via.placeholder.com/150', url: 'https://converse.com' },
        { id: 10, name: 'Vans Old Skool', price: 360, image: 'https://via.placeholder.com/150', url: 'https://vans.com' }
      ];
      
      // Мок-данные для площадок (с ссылками)
      const marketplaces = [
        { id: 1, name: 'Poizon', logo: 'https://via.placeholder.com/60', url: 'https://poizon.com' },
        { id: 2, name: 'Taobao', logo: 'https://via.placeholder.com/60', url: 'https://taobao.com' },
        { id: 3, name: '1688', logo: 'https://via.placeholder.com/60', url: 'https://1688.com' },
        { id: 4, name: 'Zalando', logo: 'https://via.placeholder.com/60', url: 'https://zalando.de' },
        { id: 5, name: 'Nike', logo: 'https://via.placeholder.com/60', url: 'https://nike.com' }
      ];
      
      // Баннеры (карусель)
      const banners = [
        { title: '🔥 Розыгрыш iPhone 15', desc: 'Участвуй до 30 апреля', action: 'promo' },
        { title: '🎁 Скидка 10% на доставку', desc: 'Для новых клиентов', action: 'promo' },
        { title: '✈️ Бесплатная консолидация', desc: 'При заказе от 3 товаров', action: 'promo' }
      ];
      
      return `
        <!-- Верхние квадратики-сторис -->
        <div class="scroll-x mb-6">
          <div class="story-card" data-story="reports">
            <div class="story-icon">📸</div>
            <span class="story-label">Отчёты</span>
          </div>
          <div class="story-card" data-story="reviews">
            <div class="story-icon">⭐</div>
            <span class="story-label">Отзывы</span>
          </div>
          <div class="story-card" data-story="promo">
            <div class="story-icon">🎁</div>
            <span class="story-label">Акции</span>
          </div>
          <div class="story-card" data-story="academy">
            <div class="story-icon">🎓</div>
            <span class="story-label">Обучение</span>
          </div>
          <div class="story-card" data-story="drops">
            <div class="story-icon">📦</div>
            <span class="story-label">Дропы</span>
          </div>
        </div>
        
        <!-- Баннеры (карусель) -->
        <div class="scroll-x mb-6">
          ${banners.map(banner => `
            <div class="banner-slide" data-action="${banner.action}">
              <div class="banner-title">${banner.title}</div>
              <div class="banner-desc">${banner.desc}</div>
            </div>
          `).join('')}
        </div>
        
        <!-- Популярные площадки -->
        <div class="mb-6">
          <div class="flex justify-between items-center mb-3">
            <h3 class="text-white font-bold">🔥 Популярные площадки</h3>
            <button id="moreMarketplacesBtn" class="text-cyan-400 text-sm">Больше →</button>
          </div>
          <div class="scroll-x">
            ${marketplaces.map(mp => `
              <div class="story-card marketplace-story" data-url="${mp.url}" style="min-width: 70px;">
                <div class="story-icon text-2xl">🛍️</div>
                <span class="story-label">${mp.name}</span>
              </div>
            `).join('')}
          </div>
        </div>
        
        <!-- Подборка товаров -->
        <div class="mb-6">
          <div class="flex justify-between items-center mb-3">
            <h3 class="text-white font-bold">✨ Рекомендуем</h3>
            <button id="moreProductsBtn" class="text-cyan-400 text-sm">Больше →</button>
          </div>
          <div class="grid grid-cols-2 gap-3">
            ${products.map(product => `
              <div class="product-card" data-url="${product.url}">
                <div class="aspect-square bg-white/10 flex items-center justify-center">
                  <div class="text-4xl">👟</div>
                </div>
                <div class="p-2">
                  <p class="text-white font-bold text-sm truncate">${product.name}</p>
                  <p class="text-cyan-400 text-xs">${product.price} ❄️</p>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
        
        <!-- Футер -->
        <div class="app-footer">
          <div class="social-icons">
            <span class="social-icon" data-social="tg">📱</span>
            <span class="social-icon" data-social="ig">📷</span>
            <span class="social-icon" data-social="vk">🎵</span>
          </div>
          <div class="footer-links">
            <span class="footer-link" data-link="offer">Публичная оферта</span>
            <span class="footer-link" data-link="privacy">Политика конфиденциальности</span>
            <span class="footer-link" data-link="contacts">Контакты</span>
          </div>
          <div class="copyright">
            ИП Иванов И.И., УНП 123456789<br>
            © 2025 ICE LOGIX. Все права защищены.
          </div>
        </div>
      `;
    }

        // --- РЕНДЕР КАЛЬКУЛЯТОРА ---
        async function renderCalculator() {
      return `
        <div class="bg-white/10 backdrop-blur-md rounded-2xl p-5 shadow-lg">
          <h2 class="text-xl font-bold mb-4">🧮 Калькулятор стоимости</h2>
          <label class="text-white/70 text-sm">Ссылка на товар (необязательно)</label>
          <input type="text" id="calcUrl" class="w-full mt-1 p-3 rounded-xl bg-white/20 border border-white/30 mb-3" placeholder="https://poizon.com/...">
          <label class="text-white/70 text-sm block mt-2">Цена (¥)</label>
          <input type="number" id="calcPrice" class="w-full mt-1 p-3 rounded-xl bg-white/20 border border-white/30 mb-3" placeholder="Цена в юанях" value="520">
          <label class="text-white/70 text-sm block mt-2">Вес (кг)</label>
          <div class="flex items-center gap-3 mt-1">
            <input type="range" id="calcWeight" min="0.1" max="30" step="0.1" value="1" class="flex-1">
            <span id="weightVal" class="text-white/80 bg-white/10 px-3 py-1 rounded-full">1.0 кг</span>
          </div>
          <button id="calcBtn" class="mt-5 w-full bg-cyan-500 hover:bg-cyan-600 py-3 rounded-xl font-bold transition">Рассчитать</button>
          <div id="calcResult" class="mt-5 hidden bg-white/5 p-4 rounded-xl">
            <p class="text-white">Примерная стоимость: <span id="totalPrice" class="font-bold text-cyan-400">0</span> ❄️</p>
            <p class="text-white/70 text-xs mt-1">*Окончательная цена после взвешивания на складе</p>
            <button id="toNewOrderBtn" class="mt-3 w-full bg-blue-600 hover:bg-blue-700 py-2 rounded-xl">Перенести в заказ</button>
          </div>
        </div>
      `;
    }

    function attachCalculatorHandlers() {
      const slider = document.getElementById('calcWeight');
      const valSpan = document.getElementById('weightVal');
      if (slider) {
        slider.oninput = () => {
          valSpan.innerText = parseFloat(slider.value).toFixed(1) + ' кг';
        };
      }
      const calcBtn = document.getElementById('calcBtn');
      if (calcBtn) {
        calcBtn.onclick = () => {
          let price = parseFloat(document.getElementById('calcPrice')?.value || 520);
          let weight = parseFloat(slider?.value || 1);
          let total = (price * 0.45) + (weight * 12);
          document.getElementById('totalPrice').innerText = total.toFixed(2);
          document.getElementById('calcResult').classList.remove('hidden');
          window.tempOrder = {
            url: document.getElementById('calcUrl')?.value || '',
            price: price,
            weight: weight,
            total: total
          };
        };
      }
      const toNewOrderBtn = document.getElementById('toNewOrderBtn');
      if (toNewOrderBtn) {
        toNewOrderBtn.onclick = () => {
          if (window.tempOrder) {
            switchTab('neworder');
          } else {
            alert('Сначала рассчитайте стоимость');
          }
        };
      }
    }

    // --- РЕНДЕР НОВОГО ЗАКАЗА ---
    async function renderNewOrder() {
      const d = window.tempOrder || { url: '', price: 520, weight: 1, total: 0 };
      return `
        <div class="bg-white/10 backdrop-blur-md rounded-2xl p-5 shadow-lg">
          <h2 class="text-xl font-bold mb-4">✨ Новый заказ</h2>
          <label class="text-white/70 text-sm">Ссылка на товар</label>
          <input type="text" id="orderUrl" class="w-full mt-1 p-3 rounded-xl bg-white/20 border border-white/30 mb-3" value="${d.url}" placeholder="https://...">
          <label class="text-white/70 text-sm block mt-2">Цена (¥)</label>
          <input type="number" id="orderPrice" class="w-full mt-1 p-3 rounded-xl bg-white/20 border border-white/30 mb-3" value="${d.price}">
          <label class="text-white/70 text-sm block mt-2">Вес (кг)</label>
          <div class="flex items-center gap-3 mt-1">

    function attachNewOrderHandlers() {
      const priceInp = document.getElementById('orderPrice');
      const weightInp = document.getElementById('orderWeight');
      const totalSpan = document.getElementById('orderTotal');
      const prepaymentSpan = document.getElementById('prepaymentAmount');
      const urlInp = document.getElementById('orderUrl');
      const update = () => {
        let price = parseFloat(priceInp?.value || 520);
        let weight = parseFloat(weightInp?.value || 1);
        let total = (price * 0.45) + (weight * 12);
        if (totalSpan) totalSpan.innerText = total.toFixed(2);
        if (prepaymentSpan) prepaymentSpan.innerText = (total * 0.75).toFixed(2);
        window.tempOrder = { url: urlInp?.value || '', price, weight, total };
      };
      if (priceInp) priceInp.addEventListener('input', update);
      if (weightInp) weightInp.addEventListener('input', update);
      const createBtn = document.getElementById('createOrderFinal');
      if (createBtn) {
        createBtn.onclick = async () => {
          if (!window.tempOrder || !userId) {
            alert('Ошибка: заполните все поля');
            return;
          }
          try {
            const { data, error } = await supabaseClient.from('orders').insert({
              user_id: userId,
              source_url: window.tempOrder.url,
              weight_estimated: window.tempOrder.weight,
              price_original: window.tempOrder.price,
              price_byn: window.tempOrder.price * 0.45,
              delivery_cost_estimated: window.tempOrder.weight * 12,
              prepayment_amount: window.tempOrder.total * 0.75,
              status: 'pending'
            }).select();
            if (error) throw error;
            alert(`Заказ создан! Номер: ${data[0].id}. Сумма предоплаты: ${(window.tempOrder.total * 0.75).toFixed(2)} ❄️`);
            window.tempOrder = null;
            switchTab('home');
          } catch (err) {
            alert('Ошибка: ' + err.message);
          }
        };
      }
    }

    // --- ГЛОБАЛЬНАЯ КНОПКА "НАЗАД" ---
    function ensureBackButton() {
      const oldBtn = document.getElementById('globalBackBtn');
      if (oldBtn) oldBtn.remove();
      
      if (currentTab !== 'home' && currentTab !== 'catalogs' && currentTab !== 'reports' && currentTab !== 'reviews') {
        const contentDiv = document.getElementById('content');
        const btn = document.createElement('button');
        btn.id = 'globalBackBtn';
        btn.className = 'global-back-btn';
        btn.innerHTML = '← Назад';
        btn.onclick = () => {
          if (previousTab && previousTab !== currentTab) {
            switchTab(previousTab);
          } else if (currentTab !== 'home') {
            switchTab('home');
          } else {
            tg.close();
          }
        };
        if (contentDiv.firstChild) {
          contentDiv.insertBefore(btn, contentDiv.firstChild);
        } else {
          contentDiv.appendChild(btn);
        }
      }
    }

    // --- ОБРАБОТЧИКИ ДЛЯ КАТАЛОГА ПЛОЩАДОК ---
    function attachCatalogsHandlers() {
      // Фильтр по странам
      const filterBtns = document.querySelectorAll('.filter-country');
      const cards = document.querySelectorAll('#marketplaces-grid > div');
      filterBtns.forEach(btn => {
        btn.onclick = () => {
          const country = btn.getAttribute('data-country');
          filterBtns.forEach(b => b.classList.remove('active', 'bg-cyan-500', 'text-white'));
          btn.classList.add('active', 'bg-cyan-500', 'text-white');
          cards.forEach(card => {
            if (country === 'all' || card.getAttribute('data-country') === country) {
              card.style.display = '';
            } else {
              card.style.display = 'none';
            }
          });
        };
      });
      
      // Кнопка расширенного фильтра
      const filterModalBtn = document.getElementById('openFilterModalBtn');
      if (filterModalBtn) {
        filterModalBtn.onclick = () => {
          const modal = document.createElement('div');
          modal.className = 'fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4';
          modal.innerHTML = `
            <div class="bg-white/10 backdrop-blur-md rounded-2xl max-w-sm w-full p-5">
              <div class="flex justify-between items-center mb-4">
                <h3 class="text-white font-bold text-lg">🔍 Расширенный фильтр</h3>

              <div class="space-y-4">

                  <select id="filterCountrySelect" class="w-full p-2 rounded-lg bg-white/20 text-white border border-white/30">
                    <option value="all">Все</option>
                    <option value="Китай">Китай</option>
                    <option value="Европа">Европа</option>
                    <option value="Россия">Россия</option>
                  </select>
                </div>
                <div>
                  <label class="text-white/80 text-sm block mb-1">Тип площадки</label>
                  <select id="filterTypeSelect" class="w-full p-2 rounded-lg bg-white/20 text-white border border-white/30">
                    <option value="all">Все</option>
                    <option value="marketplace">Маркетплейс</option>
                    <option value="brand">Бренд</option>
                    <option value="special">Специальный</option>
                  </select>
                </div>
                <div class="flex gap-2 mt-4">
                  <button id="applyFiltersBtn" class="flex-1 bg-cyan-500 py-2 rounded-lg">Применить</button>
                  <button id="resetFiltersBtn" class="flex-1 bg-white/20 py-2 rounded-lg">Сбросить</button>
                </div>
              </div>
            </div>
          `;
          document.body.appendChild(modal);
          const closeModal = () => modal.remove();
          modal.querySelector('.close-modal').addEventListener('click', closeModal);
          modal.querySelector('#applyFiltersBtn').addEventListener('click', () => {
            const country = modal.querySelector('#filterCountrySelect').value;
            filterBtns.forEach(btn => {
              if (btn.getAttribute('data-country') === country) {
                btn.click();
              } else if (country === 'all' && btn.getAttribute('data-country') === 'all') {
                btn.click();
              }
            });
            closeModal();
          });
          modal.querySelector('#resetFiltersBtn').addEventListener('click', () => {
            document.querySelector('.filter-country[data-country="all"]').click();
            closeModal();
          });
        };
      }
      
      // Кнопки "Подробнее" на карточках
      document.querySelectorAll('.detail-btn').forEach(btn => {
        btn.onclick = () => {
          const name = btn.getAttribute('data-name');
          const desc = btn.getAttribute('data-desc');
          alert(`${name}\n\n${desc || 'Описание отсутствует'}`);
        };
      });
    }

    // --- ОБРАБОТЧИКИ ДЛЯ ЭКРАНА ОТЧЁТОВ ---
    function attachReportsHandlers() {
      const addBtn = document.getElementById('addReportBtn');
      if (addBtn) {
        addBtn.onclick = () => {
          const modal = document.createElement('div');
          modal.className = 'fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4';
          modal.innerHTML = `
            <div class="bg-white/10 backdrop-blur-md rounded-2xl max-w-md w-full p-5">
              <h3 class="text-white font-bold text-lg mb-4">➕ Новый отчёт</h3>
              <input type="text" id="reportTitle" class="w-full p-3 rounded-xl bg-white/20 border border-white/30 mb-3" placeholder="Заголовок">
              <textarea id="reportDesc" class="w-full p-3 rounded-xl bg-white/20 border border-white/30 mb-3" placeholder="Описание" rows="2"></textarea>
              <select id="reportType" class="w-full p-3 rounded-xl bg-white/20 border border-white/30 mb-3">
                <option value="photo">Фото</option>
                <option value="video">Видео</option>
              </select>
              <input type="url" id="reportUrl" class="w-full p-3 rounded-xl bg-white/20 border border-white/30 mb-3" placeholder="Ссылка на фото/видео">
              <input type="url" id="reportProductUrl" class="w-full p-3 rounded-xl bg-white/20 border border-white/30 mb-3" placeholder="Ссылка на товар (для кнопки)">
              <div class="flex gap-3 mt-4">
                <button id="saveReportBtn" class="flex-1 bg-cyan-500 py-2 rounded-xl">Сохранить</button>
                <button id="cancelReportBtn" class="flex-1 bg-white/20 py-2 rounded-xl">Отмена</button>
              </div>
            </div>
          `;
          document.body.appendChild(modal);
          modal.querySelector('#cancelReportBtn').onclick = () => modal.remove();
          modal.querySelector('#saveReportBtn').onclick = async () => {
            const title = modal.querySelector('#reportTitle').value.trim();
            const description = modal.querySelector('#reportDesc').value.trim();
            const type = modal.querySelector('#reportType').value;
            const image_url = modal.querySelector('#reportUrl').value.trim();
            const product_url = modal.querySelector('#reportProductUrl').value.trim();
            if (!title || !image_url) {
              alert('Заполните заголовок и ссылку на фото/видео');
              return;
            }
            try {
              const { error } = await supabaseClient.from('public_reports').insert({
                title: title,
                description: description,
                type: type,
                image_url: image_url,
                product_url: product_url,
                is_active: true,
                created_at: new Date().toISOString()
              });
              if (error) throw error;
              alert('Отчёт добавлен');
              modal.remove();
              renderCurrentScreen();
            } catch (err) {
              alert('Ошибка: ' + err.message);
            }
          };
        };
      }
      document.querySelectorAll('.orderFromReportBtn').forEach(btn => {
        btn.onclick = () => {
          const url = btn.getAttribute('data-url');
          window.tempOrder = { url: url, price: 520, weight: 1, total: 0 };
          switchTab('neworder');
        };
      });
    }

        // --- ПЕРЕОПРЕДЕЛЯЕМ RENDER CURRENT SCREEN ---
        const originalRender = renderCurrentScreen;
    renderCurrentScreen = async function() {
      await originalRender();
      
      // Добавляем футер на все страницы (кроме тех, где он уже есть)
      const contentDiv = document.getElementById('content');
      const existingFooter = contentDiv.querySelector('.app-footer');
      if (!existingFooter && currentTab !== 'catalogs' && currentTab !== 'reports' && currentTab !== 'reviews') {
        contentDiv.innerHTML += renderFooter();
      }
      
      // Добавляем обработчики для главной страницы
      if (currentTab === 'home') {
        attachHomeHandlers();
        // Футер на главной уже есть в renderHome, не добавляем повторно
      }
      
      // Добавляем обработчики для каталога
      if (currentTab === 'catalogs') {
        attachCatalogsHandlers();
        // Добавляем футер для каталога, если его нет
        if (!contentDiv.querySelector('.app-footer')) {
          contentDiv.innerHTML += renderFooter();
          // Перепривязываем обработчики футера
          document.querySelectorAll('.social-icon').forEach(icon => {
            icon.onclick = () => alert('Соцсети будут подключены позже');
          });
          document.querySelectorAll('.footer-link').forEach(link => {
            link.onclick = () => alert(link.innerText + ' будет доступно позже');
          });
        }
      }
      
      // Добавляем обработчики для отчётов
      if (currentTab === 'reports') {
        attachReportsHandlers();
        if (!contentDiv.querySelector('.app-footer')) {
          contentDiv.innerHTML += renderFooter();
          document.querySelectorAll('.social-icon').forEach(icon => {
            icon.onclick = () => alert('Соцсети будут подключены позже');
          });
          document.querySelectorAll('.footer-link').forEach(link => {
            link.onclick = () => alert(link.innerText + ' будет доступно позже');
          });
        }
      }
      
      // Добавляем обработчики для отзывов
      if (currentTab === 'reviews') {
        attachReviewsHandlers();
        if (!contentDiv.querySelector('.app-footer')) {
          contentDiv.innerHTML += renderFooter();
          document.querySelectorAll('.social-icon').forEach(icon => {
            icon.onclick = () => alert('Соцсети будут подключены позже');
          });
          document.querySelectorAll('.footer-link').forEach(link => {
            link.onclick = () => alert(link.innerText + ' будет доступно позже');
          });
        }
      }
      
      // Для подэкрана моих заказов
      if (currentSubScreen === 'myOrders') {
        const backBtn = document.getElementById('backToProfileBtn');
        if (backBtn) {
          backBtn.onclick = () => {
            currentSubScreen = null;
            renderCurrentScreen();
          };
        }
        // Добавляем футер
        if (!contentDiv.querySelector('.app-footer')) {
          contentDiv.innerHTML += renderFooter();
        }
      }
      
      // Кнопка "Назад" для остальных экранов
      if (currentTab !== 'home' && currentTab !== 'catalogs' && currentTab !== 'reports' && currentTab !== 'reviews' && !currentSubScreen) {
        ensureBackButton();
      }
    };

    // --- ЗАПУСК ПРИЛОЖЕНИЯ ---
    init();
  </script>
