<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>ICE LOGIX</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
<!-- Подключаем Supabase JS клиент -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { background: #0F172A; }
  </style>
</head>
<body class="text-white">
  <div class="min-h-screen p-4 pb-20 bg-gradient-to-b from-slate-900 to-black">
    <div class="bg-white/10 backdrop-blur-md rounded-2xl p-4">
      <div class="flex justify-between items-center">
        <div>
          <p class="text-sm text-white/70">Привет,</p>
          <h1 class="text-xl font-bold" id="userName">Гость</h1>
        </div>
        <div class="text-right">
          <p class="text-sm text-white/70">Баланс</p>
          <p class="text-xl font-bold text-cyan-400" id="balance">0 ❄️</p>
        </div>
      </div>
    </div>

    <div class="mt-4">
      <h2 class="text-white text-lg font-bold mb-2">❄️ Находки дня</h2>
      <div class="flex gap-3 overflow-x-auto pb-2">
        <div class="bg-white/10 backdrop-blur-md rounded-xl p-3 w-40 shrink-0">
          <div class="w-full h-32 bg-slate-700 rounded-lg"></div>
          <p class="text-white font-bold mt-2">Nike Dunk Low</p>
          <p class="text-cyan-400 text-sm">520 ❄️</p>
          <button class="mt-2 w-full bg-cyan-500 text-white py-1 rounded-lg text-sm">Хочу!</button>
        </div>
        <div class="bg-white/10 backdrop-blur-md rounded-xl p-3 w-40 shrink-0">
          <div class="w-full h-32 bg-slate-700 rounded-lg"></div>
          <p class="text-white font-bold mt-2">Jordan 1 Retro</p>
          <p class="text-cyan-400 text-sm">780 ❄️</p>
          <button class="mt-2 w-full bg-cyan-500 text-white py-1 rounded-lg text-sm">Хочу!</button>
        </div>
      </div>
    </div>

    <div class="grid grid-cols-2 gap-3 mt-4">
      <div class="bg-white/10 backdrop-blur-md rounded-xl p-3">
        <p class="text-white/70 text-xs">Курс ¥</p>
        <p class="text-white text-xl font-bold">0.45 BYN</p>
      </div>
      <div class="bg-white/10 backdrop-blur-md rounded-xl p-3">
        <p class="text-white/70 text-xs">Поставка</p>
        <p class="text-white text-xl font-bold">8 дн</p>
      </div>
    </div>

    <div class="mt-6">
      <button id="orderBtn" class="w-full bg-gradient-to-r from-blue-600 to-cyan-500 text-white py-4 rounded-xl font-bold text-lg shadow-lg">
<!-- Блок калькулятора -->
<div id="calculatorBlock" class="mt-6 p-4 bg-white/10 backdrop-blur-md rounded-xl">
  <h2 class="text-white text-lg font-bold mb-3">🧮 Калькулятор стоимости</h2>
  <label class="text-white/70 text-sm">Ссылка на товар</label>
  <input type="text" id="productUrl" class="w-full mt-1 p-2 rounded-lg bg-white/20 text-white border border-white/30" placeholder="https://poizon.com/...">
  
  <label class="text-white/70 text-sm block mt-3">Вес (кг)</label>
  <input type="range" id="weightSlider" min="0.1" max="30" step="0.1" value="1" class="w-full mt-1">
  <div class="flex justify-between text-white/70 text-sm mt-1">
    <span>0.1 кг</span>
    <span id="weightValue">1.0 кг</span>
    <span>30 кг</span>
  </div>
  
  <button id="calcBtn" class="mt-4 w-full bg-cyan-500 text-white py-2 rounded-lg">Рассчитать</button>
  
  <div id="calcResult" class="mt-4 hidden">
    <p class="text-white">Примерная стоимость: <span id="totalPrice" class="font-bold text-cyan-400">0</span> ❄️</p>
    <p class="text-white/70 text-xs mt-1">*Окончательная цена после взвешивания на складе</p>
    <button id="createOrderBtn" class="mt-3 w-full bg-blue-600 text-white py-2 rounded-lg">Оформить заказ (75% предоплата)</button>
  </div>
</div>
        ✨ Создать заказ
      </button>
    </div>
  </div>

  <script>
  // Инициализация Telegram WebApp
  const tg = window.Telegram.WebApp;
  tg.ready();
  tg.expand();

  const user = tg.initDataUnsafe?.user;
  const userId = user ? user.id : null;
  const userName = user ? (user.first_name || user.username) : 'Гость';

  // Отображаем имя
  document.getElementById('userName').innerText = userName;

  // --- Подключение к Supabase ---
  const SUPABASE_URL = 'https://vrvwdagjpttvfvjanbwq.supabase.co';   // твой URL
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZydndkYWdqcHR0dmZ2amFuYndxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NTc4MzgsImV4cCI6MjA5MTIzMzgzOH0.P9GQSW6NLN1BhR66PX-LP4ysZBXFeWIXRYIRvhRjo1c';  // твой anon ключ

  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  async function loadBalance() {
    if (!userId) {
      document.getElementById('balance').innerText = '0 ❄️';
      return;
    }
    try {
      const { data, error } = await supabase
        .from('users')
        .select('ices_balance')
        .eq('user_id', userId)
        .maybeSingle();

      if (error) {
        console.error('Ошибка Supabase:', error);
        document.getElementById('balance').innerText = '0 ❄️';
        return;
      }
      const balance = data ? data.ices_balance : 0;
      document.getElementById('balance').innerText = balance + ' ❄️';
    } catch (err) {
      console.error('Ошибка:', err);
      document.getElementById('balance').innerText = '0 ❄️';
    }
  }

  loadBalance();

  // Кнопка "Создать заказ" (позже заменим на настоящий переход)
  document.getElementById('orderBtn').addEventListener('click', () => {
    tg.showAlert('Калькулятор будет добавлен позже');
  });
// --- Калькулятор и создание заказа ---
const weightSlider = document.getElementById('weightSlider');
const weightValue = document.getElementById('weightValue');
const calcBtn = document.getElementById('calcBtn');
const calcResultDiv = document.getElementById('calcResult');
const totalPriceSpan = document.getElementById('totalPrice');
const createOrderBtn = document.getElementById('createOrderBtn');
const productUrlInput = document.getElementById('productUrl');

// Показываем текущий вес
weightSlider.addEventListener('input', () => {
  const val = parseFloat(weightSlider.value);
  weightValue.innerText = val.toFixed(1) + ' кг';
});

// Мок-расчёт (позже заменим на реальный парсинг)
calcBtn.addEventListener('click', async () => {
  const url = productUrlInput.value.trim();
  if (!url) {
    tg.showAlert('Вставьте ссылку на товар');
    return;
  }
  const weight = parseFloat(weightSlider.value);
  // Пока используем заглушку: цена товара 520 юаней (пример)
  const priceCNY = 520;
  const rate = 0.45; // курс юаня к BYN
  const deliveryTariff = 12; // BYN за кг
  const total = (priceCNY * rate) + (weight * deliveryTariff);
  totalPriceSpan.innerText = total.toFixed(2);
  calcResultDiv.classList.remove('hidden');
  // Сохраняем данные в глобальные переменные для последующего создания заказа
  window.tempOrder = { url, weight, priceCNY, total };
});

// Создание заказа в Supabase
createOrderBtn.addEventListener('click', async () => {
  if (!window.tempOrder) {
    tg.showAlert('Сначала рассчитайте стоимость');
    return;
  }
  const { url, weight, priceCNY, total } = window.tempOrder;
  const user = tg.initDataUnsafe?.user;
  if (!user) {
    tg.showAlert('Ошибка авторизации');
    return;
  }
  try {
    // Вставляем заказ в таблицу orders
    const { data, error } = await supabase
      .from('orders')
      .insert({
        user_id: user.id,
        source_url: url,
        weight_estimated: weight,
        price_original: priceCNY,
        price_byn: priceCNY * 0.45,
        delivery_cost_estimated: weight * 12,
        prepayment_amount: total * 0.75, // 75% предоплата
        status: 'pending'
      })
      .select();
    if (error) throw error;
    tg.showAlert(`Заказ создан! Номер: ${data[0].id}. Сумма предоплаты: ${(total * 0.75).toFixed(2)} ❄️`);
    // Очистить форму и результат
    productUrlInput.value = '';
    weightSlider.value = 1;
    weightValue.innerText = '1.0 кг';
    calcResultDiv.classList.add('hidden');
    window.tempOrder = null;
  } catch (err) {
    console.error(err);
    tg.showAlert('Ошибка при создании заказа');
  }
});
</script>
</body>
</html>
