<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>ICE LOGIX</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0F172A; font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
    .status-badge { padding: 4px 12px; border-radius: 40px; font-size: 11px; font-weight: bold; display: inline-block; }
    .status-pending { background: #f59e0b; color: #000; }
    .status-paid { background: #10b981; color: #fff; }
    .status-bought { background: #3b82f6; color: #fff; }
    .status-on_sklad_cn { background: #8b5cf6; color: #fff; }
    .status-in_transit { background: #06b6d4; color: #fff; }
    .status-in_belarus { background: #14b8a6; color: #fff; }
    .status-delivered { background: #10b981; color: #fff; }
    .status-cancelled { background: #ef4444; color: #fff; }
    .product-card { background: rgba(255,255,255,0.08); backdrop-filter: blur(12px); border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); transition: all 0.2s; cursor: pointer; }
    .product-card:hover { transform: translateY(-4px); background: rgba(255,255,255,0.12); }
    .story-card { display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; transition: 0.2s; min-width: 70px; }
    .story-card:hover { transform: translateY(-2px); }
    .story-icon { width: 70px; height: 70px; background: rgba(255,255,255,0.1); backdrop-filter: blur(12px); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 32px; border: 1px solid rgba(255,255,255,0.2); }
    .story-label { font-size: 11px; font-weight: 500; color: #8e9aaf; }
    .banner-slide { background: linear-gradient(135deg, #007aff, #00c2ff); border-radius: 20px; padding: 16px; min-width: 280px; scroll-snap-align: start; cursor: pointer; }
    .banner-title { font-size: 18px; font-weight: bold; color: white; }
    .banner-desc { font-size: 12px; color: rgba(255,255,255,0.8); margin-top: 4px; }
    .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(25px); border-top: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-around; align-items: center; padding: 8px 12px 16px; z-index: 100; }
    .tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #8e9aaf; cursor: pointer; transition: color 0.2s; }
    .tab-item.active { color: #00c2ff; }
    .tab-icon { font-size: 22px; }
    .tab-label { font-size: 10px; font-weight: 600; }
    .tab-item.new-order { background: linear-gradient(135deg, #007aff, #00c2ff); color: white; padding: 8px 16px; border-radius: 40px; margin-top: -12px; box-shadow: 0 4px 12px rgba(0,122,255,0.4); }
    .tab-item.new-order .tab-label { font-size: 12px; font-weight: bold; }
    .app-header { position: sticky; top: 0; z-index: 90; background: rgba(15, 23, 42, 0.92); backdrop-filter: blur(25px); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .header-left { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .logo-img { height: 44px; cursor: pointer; transition: 0.2s; }
    .logo-img:hover { transform: scale(1.02); }
    .header-right { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .balance { background: rgba(0,194,255,0.15); padding: 5px 12px; border-radius: 30px; font-size: 14px; font-weight: bold; display: flex; align-items: center; gap: 6px; }
    .balance-add { background: none; border: none; color: #00c2ff; font-size: 16px; cursor: pointer; font-weight: bold; padding: 0; }
    .icon-btn { background: none; border: none; color: white; font-size: 20px; cursor: pointer; width: 32px; text-align: center; }
    .user-card { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.1); backdrop-filter: blur(12px); padding: 5px 12px 5px 5px; border-radius: 40px; cursor: pointer; transition: 0.2s; }
    .user-card:hover { background: rgba(255,255,255,0.2); }
    .user-avatar { width: 40px; height: 40px; border-radius: 50%; background: #2d3748; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .user-name { font-size: 14px; font-weight: 600; color: white; }
    .global-back-btn { background: rgba(255,255,255,0.15); border: none; color: white; font-size: 14px; font-weight: 600; padding: 8px 20px; border-radius: 40px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: 0.2s; margin-bottom: 16px; }
    .global-back-btn:hover { background: rgba(255,255,255,0.25); }
    .main-content { padding: 16px; padding-bottom: 80px; }
    .app-footer { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.1); padding: 20px 16px; margin-top: 30px; text-align: center; }
    .footer-links { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-bottom: 12px; }
    .footer-link { color: #8e9aaf; font-size: 12px; text-decoration: none; cursor: pointer; }
    .footer-link:hover { color: #00c2ff; }
    .social-icons { display: flex; justify-content: center; gap: 20px; margin-bottom: 12px; }
    .social-icon { font-size: 24px; cursor: pointer; }
    .copyright { font-size: 10px; color: #5a6e8a; }
    .scroll-x { overflow-x: auto; display: flex; gap: 12px; scroll-snap-type: x mandatory; padding-bottom: 8px; }
    .scroll-x::-webkit-scrollbar { display: none; }
    .review-card { background: rgba(255,255,255,0.08); backdrop-filter: blur(12px); border-radius: 20px; padding: 16px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.1); }
    .stars { color: #fbbf24; margin-bottom: 8px; }
    .course-card { background: rgba(255,255,255,0.08); backdrop-filter: blur(12px); border-radius: 20px; padding: 16px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.2s; }
    .course-card:hover { transform: translateY(-2px); background: rgba(255,255,255,0.12); }
    .filter-chip { background: rgba(255,255,255,0.15); padding: 6px 12px; border-radius: 40px; font-size: 12px; cursor: pointer; transition: 0.2s; }
    .filter-chip.active { background: #00c2ff; color: #0F172A; }
    .wishlist-heart { color: #ff4d4d; cursor: pointer; }
  </style>
</head>
<body>
  <!-- Version: 2026.04.16.01 -->
  <div id="app">
    <div class="app-header">
      <div class="header-left">
        <img id="logoImg" class="logo-img" src="https://i.ibb.co/9kJTjpjT/1-Logo.png" alt="ICE LOGIX">
      </div>
      <div class="header-right">
        <div class="balance"><span id="headerBalance">0 ❄️</span><button class="balance-add" id="addBalanceBtn">+</button></div>
        <button class="icon-btn" id="notificationsBtn">🔔</button>
        <button class="icon-btn" id="settingsBtn">⚙️</button>
        <div class="user-card" id="userCard">
          <div class="user-avatar" id="avatar"></div>
          <span class="user-name" id="userNameHeader">Гость</span>
        </div>
      </div>
    </div>
    <div id="content" class="main-content"><div class="text-center py-10">Загрузка...</div></div>
    <div class="tab-bar" id="tabBar">
      <div class="tab-item" data-tab="home"><span class="tab-icon">🏠</span><span class="tab-label">Главная</span></div>
      <div class="tab-item" data-tab="calculator"><span class="tab-icon">🧮</span><span class="tab-label">Калькулятор</span></div>
      <div class="tab-item new-order" data-tab="neworder"><span class="tab-icon">✨</span><span class="tab-label">Новый заказ</span></div>
      <div class="tab-item" data-tab="catalogs"><span class="tab-icon">📚</span><span class="tab-label">Каталоги</span></div>
      <div class="tab-item" data-tab="profile"><span class="tab-icon">👤</span><span class="tab-label">Профиль</span></div>
    </div>
  </div>
  <script>
    let tg = null, userId = null, userName = 'Гость', userAvatarUrl = null, isOwner = false, supabaseClient = null;
    let currentTab = 'home', previousTab = null, currentSubScreen = null;
    let balance = 0;
    let adminOrdersPage = 1;
let adminOrdersFilter = 'all';
let adminOrdersTotalPages = 1;
    let userLimits = { dailyCount: 0, lastDate: null, isTrusted: false };
const MAX_REQUESTS_GUEST = 1;
const MAX_REQUESTS_NEW_USER = 3;
const MAX_REQUESTS_TRUSTED = 100;
    let appliedPromo = null;
    let userReferralCode = null;
    let wishlist = new Set();
    let productsPage = 1;
    let productsFilter = { category: 'all', brand: 'all', sort: 'new' };
    let productsTotalPages = 1;
    let reviewsPage = 1;
    let reviewsTotalPages = 1;

    async function init() {
      tg = window.Telegram.WebApp;
      tg.ready();
      tg.expand();
      const user = tg.initDataUnsafe?.user;
      userId = user ? user.id : null;
      userName = user ? (user.first_name || user.username) : 'Гость';
      userAvatarUrl = user?.photo_url || null;
      const SUPABASE_URL = 'https://vrvwdagjpttvfvjanbwq.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZydndkYWdqcHR0dmZ2amFuYndxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NTc4MzgsImV4cCI6MjA5MTIzMzgzOH0.P9GQSW6NLN1BhR66PX-LP4ysZBXFeWIXRYIRvhRjo1c';
      supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      await loadUserData();
      await initReferralCode();
      await loadWishlist();
      attachEventListeners();
      const avatarDiv = document.querySelector('#avatar');
      avatarDiv.innerHTML = userAvatarUrl ? `<img src="${userAvatarUrl}">` : userName.charAt(0).toUpperCase();
      document.querySelector('#userNameHeader').innerText = userName;
      document.getElementById('logoImg').onclick = () => switchTab('home');
      document.getElementById('userCard').onclick = () => switchTab('profile');
      document.getElementById('settingsBtn').onclick = () => alert('Настройки будут позже');
      document.getElementById('notificationsBtn').onclick = () => alert('Уведомлений пока нет');
      switchTab('home');
    }

    async function loadUserData() {
      if (!userId) return;
      const { data, error } = await supabaseClient.from('users').select('role, ices_balance, referral_code, referral_count, referral_bonus, daily_requests_count, last_request_date, is_trusted').eq('user_id', userId).maybeSingle();
      if (!error && data) {
  isOwner = (data.role === 'owner');
  balance = data.ices_balance || 0;
  userReferralCode = data.referral_code;
  userLimits.dailyCount = data.daily_requests_count || 0;
  userLimits.lastDate = data.last_request_date ? new Date(data.last_request_date).toDateString() : null;
  userLimits.isTrusted = data.is_trusted || false;
  document.getElementById('headerBalance').innerText = balance + ' ❄️';
      }
    }

    async function checkAndUpdateLimit() {
  const today = new Date().toDateString();
  
  // Если пользователь не авторизован (гость)
  if (!userId) {
    const guestKey = 'ice_guest_requests';
    let guestData = JSON.parse(localStorage.getItem(guestKey) || '{"count":0,"date":""}');
    if (guestData.date !== today) {
      guestData = { count: 0, date: today };
    }
    const allowed = guestData.count < MAX_REQUESTS_GUEST;
    return { allowed, currentCount: guestData.count, maxRequests: MAX_REQUESTS_GUEST, today, guestData };
  }
  
  // Авторизованный пользователь
  let currentCount = userLimits.dailyCount;
  let lastDate = userLimits.lastDate;
  
  // Сброс при новом дне
  if (lastDate !== today) {
    currentCount = 0;
    userLimits.dailyCount = 0;
    userLimits.lastDate = today;
    await supabaseClient.from('users').update({ daily_requests_count: 0, last_request_date: new Date().toISOString() }).eq('user_id', userId);
  }
  
  const maxRequests = userLimits.isTrusted ? MAX_REQUESTS_TRUSTED : MAX_REQUESTS_NEW_USER;
  const allowed = currentCount < maxRequests;
  return { allowed, currentCount, maxRequests, today };
}

    async function initReferralCode() {
      if (!userId) return;
      if (userReferralCode) return;
      const code = 'ICE' + userId.toString().slice(-6);
      try {
        await supabaseClient.from('users').update({ referral_code: code }).eq('user_id', userId);
        userReferralCode = code;
      } catch(e) { console.log(e); }
    }

    async function loadWishlist() {
      if (!userId) return;
      try {
        const { data } = await supabaseClient.from('wishlist').select('product_id').eq('user_id', userId);
        if (data) data.forEach(item => wishlist.add(item.product_id));
      } catch(e) {}
    }

    function attachEventListeners() {
      document.getElementById('addBalanceBtn').onclick = () => alert('Пополнение баланса будет позже');
      document.querySelectorAll('.tab-item').forEach(tab => {
        tab.onclick = () => {
          const tabName = tab.getAttribute('data-tab');
          currentSubScreen = null;
          appliedPromo = null;
          switchTab(tabName);
        };
      });
    }

    function switchTab(tabName) {
      if (currentTab && currentTab !== tabName) previousTab = currentTab;
      currentTab = tabName;
      document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
      const activeTab = document.querySelector(`.tab-item[data-tab="${tabName}"]`);
      if (activeTab) activeTab.classList.add('active');
      renderCurrentScreen();
    }

    function renderFooter() {
      return `
        <div class="app-footer">
          <div class="social-icons"><span class="social-icon" data-social="tg">📱</span><span class="social-icon" data-social="ig">📷</span><span class="social-icon" data-social="vk">🎵</span></div>
          <div class="footer-links"><span class="footer-link" data-link="offer">Публичная оферта</span><span class="footer-link" data-link="privacy">Политика конфиденциальности</span><span class="footer-link" data-link="contacts">Контакты</span></div>
          <div class="copyright">ИП Иванов И.И., УНП 123456789<br>© 2025 ICE LOGIX. Все права защищены.</div>
        </div>
      `;
    }

        // ==================== РЕНДЕР ГЛАВНОЙ СТРАНИЦЫ ====================
        async function renderHome() {
      const marketplaces = [
        { id: 1, name: 'Poizon', url: 'https://poizon.com' },
        { id: 2, name: 'Taobao', url: 'https://taobao.com' },
        { id: 3, name: '1688', url: 'https://1688.com' },
        { id: 4, name: 'Zalando', url: 'https://zalando.de' },
        { id: 5, name: 'Nike', url: 'https://nike.com' }
      ];
      const banners = [
        { title: '🔥 Розыгрыш iPhone 15', desc: 'Участвуй до 30 апреля' },
        { title: '🎁 Скидка 10% на доставку', desc: 'Для новых клиентов' },
        { title: '✈️ Бесплатная консолидация', desc: 'При заказе от 3 товаров' }
      ];
      return `
        <div class="scroll-x mb-6">
          <div class="story-card" data-story="reports"><div class="story-icon">📸</div><span class="story-label">Отчёты</span></div>
          <div class="story-card" data-story="reviews"><div class="story-icon">⭐</div><span class="story-label">Отзывы</span></div>
          <div class="story-card" data-story="promo"><div class="story-icon">🎁</div><span class="story-label">Акции</span></div>
          <div class="story-card" data-story="academy"><div class="story-icon">🎓</div><span class="story-label">Обучение</span></div>
          <div class="story-card" data-story="drops"><div class="story-icon">📦</div><span class="story-label">Дропы</span></div>
          <div class="story-card" data-story="referral"><div class="story-icon">👥</div><span class="story-label">Рефералы</span></div>
        </div>
        <div class="scroll-x mb-6">${banners.map(b => `<div class="banner-slide"><div class="banner-title">${b.title}</div><div class="banner-desc">${b.desc}</div></div>`).join('')}</div>
        <div class="mb-6"><div class="flex justify-between items-center mb-3"><h3 class="text-white font-bold">🔥 Популярные площадки</h3><button id="moreMarketplacesBtn" class="text-cyan-400 text-sm">Больше →</button></div><div class="scroll-x">${marketplaces.map(mp => `<div class="story-card marketplace-story" data-url="${mp.url}" style="min-width: 70px;"><div class="story-icon text-2xl">🛍️</div><span class="story-label">${mp.name}</span></div>`).join('')}</div></div>
        <div class="mb-6"><div class="flex justify-between items-center mb-3"><h3 class="text-white font-bold">✨ Рекомендуем</h3><button id="moreProductsBtn" class="text-cyan-400 text-sm">Больше →</button></div><div class="grid grid-cols-2 gap-3" id="homeProductsGrid"></div></div>
        ${renderFooter()}
      `;
    }

    async function loadHomeProducts() {
      try {
        const { data } = await supabaseClient.from('products').select('*').eq('is_active', true).limit(6);
        const grid = document.getElementById('homeProductsGrid');
        if (grid && data) {
          grid.innerHTML = data.map(p => `
            <div class="product-card" data-product-id="${p.id}">
              <div class="aspect-square bg-white/10 flex items-center justify-center"><img src="${p.image_url || 'https://via.placeholder.com/150'}" class="w-full h-full object-cover"></div>
              <div class="p-2"><p class="text-white font-bold text-sm truncate">${p.title}</p><p class="text-cyan-400 text-xs">${p.price} ${p.currency}</p><button class="addToCartBtn mt-2 w-full bg-cyan-500/50 py-1 rounded text-xs">В корзину</button></div>
            </div>
          `).join('');
          document.querySelectorAll('.addToCartBtn').forEach(btn => {
            btn.onclick = (e) => { e.stopPropagation(); alert('Товар добавлен в корзину (в разработке)'); };
          });
          document.querySelectorAll('.product-card').forEach(card => {
            card.onclick = () => { const url = card.getAttribute('data-url'); if (url) { window.tempOrder = { url, price: 520, weight: 1, total: 0, discountAmount: 0 }; switchTab('neworder'); } };
          });
        }
      } catch(e) {}
    }

    // ==================== РЕНДЕР КАЛЬКУЛЯТОРА ====================
    async function renderCalculator() {
      const limitInfo = await checkAndUpdateLimit();
  let limitMessage = '';
  if (!limitInfo.allowed) {
    limitMessage = `<div class="bg-red-500/20 border border-red-500/50 rounded-xl p-3 mb-4 text-center">
      <p class="text-red-400 font-bold">⚠️ Дневной лимит исчерпан (${limitInfo.currentCount}/${limitInfo.maxRequests})</p>
      <p class="text-white/70 text-sm mt-1">Оформите заказ, чтобы снять ограничение</p>
    </div>`;
  } else {
    const remaining = limitInfo.maxRequests - limitInfo.currentCount;
    limitMessage = `<div class="bg-white/5 rounded-xl p-3 mb-4 text-center">
      <p class="text-white/70 text-sm">Осталось расчётов сегодня: <span class="text-cyan-400 font-bold">${remaining}</span> из ${limitInfo.maxRequests}</p>
    </div>`;
  }

      return `
        <div class="bg-white/10 backdrop-blur-md rounded-2xl p-5 shadow-lg">
          <h2 class="text-xl font-bold mb-4">🧮 Калькулятор стоимости</h2>
          <label class="text-white/70 text-sm">Ссылка на товар (необязательно)</label>
          <input type="text" id="calcUrl" class="w-full mt-1 p-3 rounded-xl bg-white/20 border border-white/30 mb-3" placeholder="https://poizon.com/...">
          <label class="text-white/70 text-sm block mt-2">Цена (¥)</label>
          <input type="number" id="calcPrice" class="w-full mt-1 p-3 rounded-xl bg-white/20 border border-white/30 mb-3" placeholder="Цена в юанях" value="520">
          <label class="text-white/70 text-sm block mt-2">Вес (кг)</label>
          <div class="flex items-center gap-3 mt-1"><input type="range" id="calcWeight" min="0.1" max="30" step="0.1" value="1" class="flex-1"><span id="weightVal" class="text-white/80 bg-white/10 px-3 py-1 rounded-full">1.0 кг</span></div>
          <button id="calcBtn" class="mt-5 w-full bg-cyan-500 hover:bg-cyan-600 py-3 rounded-xl font-bold transition">Рассчитать</button>
          <div id="calcResult" class="mt-5 hidden bg-white/5 p-4 rounded-xl"><p class="text-white">Примерная стоимость: <span id="totalPrice" class="font-bold text-cyan-400">0</span> ❄️</p><p class="text-white/70 text-xs mt-1">*Окончательная цена после взвешивания на складе</p><button id="toNewOrderBtn" class="mt-3 w-full bg-blue-600 hover:bg-blue-700 py-2 rounded-xl">Перенести в заказ</button></div>
        </div>
        ${renderFooter()}
      `;
    }

    function attachCalculatorHandlers() {
      const slider = document.getElementById('calcWeight');
      const valSpan = document.getElementById('weightVal');
      if (slider) slider.oninput = () => valSpan.innerText = parseFloat(slider.value).toFixed(1) + ' кг';
      const calcBtn = document.getElementById('calcBtn');
      if (calcBtn) calcBtn.onclick = async () => {
  const limitCheck = await checkAndUpdateLimit();
  if (!limitCheck.allowed) {
    alert(`Вы исчерпали лимит бесплатных расчётов (${limitCheck.currentCount}/${limitCheck.maxRequests}). Оформите заказ, чтобы продолжить.`);
    return;
  }
  
  // Увеличиваем счётчик
  if (userId) {
    const newCount = limitCheck.currentCount + 1;
    await supabaseClient.from('users').update({ daily_requests_count: newCount, last_request_date: new Date().toISOString() }).eq('user_id', userId);
    userLimits.dailyCount = newCount;
  } else {
    // Гость – сохраняем в localStorage
    const guestKey = 'ice_guest_requests';
    let guestData = JSON.parse(localStorage.getItem(guestKey) || '{"count":0,"date":""}');
    const today = new Date().toDateString();
    if (guestData.date !== today) guestData = { count: 0, date: today };
    guestData.count++;
    localStorage.setItem(guestKey, JSON.stringify(guestData));
  }
  
  // Оригинальный код расчёта (не трогаем!)
  let price = parseFloat(document.getElementById('calcPrice')?.value || 520);

        let price = parseFloat(priceInp?.value || 520);

        let discount = window.tempOrder?.discountAmount || 0;

        if (prepaymentSpan) prepaymentSpan.innerText = ((total - discount) * 0.75).toFixed(2);
        window.tempOrder = { ...window.tempOrder, url: urlInp?.value || '', price: price, weight: weight, total: total, discountAmount: discount };
      };
      
      if (priceInp) priceInp.addEventListener('input', update);
      if (weightInp) weightInp.addEventListener('input', update);
      
      const applyPromoBtn = document.getElementById('applyPromoBtn');

              status: 'pending', discount_applied: window.tempOrder.discountAmount || 0, promo_code: window.tempOrder.appliedPromo?.code || null
            }).select();

            alert(`Заказ создан! Номер: ${data[0].id}. Сумма предоплаты: ${((window.tempOrder.total - window.tempOrder.discountAmount) * 0.75).toFixed(2)} ❄️`);
            // Снятие лимита после первого заказа
if (!userLimits.isTrusted) {

}

            switchTab('home');

      if (!userId) return false;
      const { data, error } = await supabaseClient.from('orders').select('id').eq('user_id', userId).eq('status', 'delivered').limit(1);
      return !error && data && data.length > 0;
    }

async function openMarketplaceForm(marketplace = null) {
  const isEdit = !!marketplace;
  const modal = document.createElement('div');
  modal.className = 'fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4 overflow-y-auto';
  modal.innerHTML = `
    <div class="bg-[#1e293b] rounded-2xl max-w-md w-full p-5 border border-white/20">
      <h3 class="text-white font-bold text-lg mb-4">${isEdit ? '✏️ Редактировать' : '➕ Новая площадка'}</h3>
      <div class="space-y-3">
        <input type="text" id="mpName" class="w-full p-3 rounded-xl bg-white/20 border border-white/30" placeholder="Название *" value="${marketplace?.name || ''}">
        <input type="url" id="mpUrl" class="w-full p-3 rounded-xl bg-white/20 border border-white/30" placeholder="Ссылка на сайт *" value="${marketplace?.website_url || ''}">
        <input type="text" id="mpCountry" class="w-full p-3 rounded-xl bg-white/20 border border-white/30" placeholder="Страна *" value="${marketplace?.country || ''}">
        <textarea id="mpDescription" class="w-full p-3 rounded-xl bg-white/20 border border-white/30" placeholder="Описание">${marketplace?.description || ''}</textarea>
        <textarea id="mpInstruction" class="w-full p-3 rounded-xl bg-white/20 border border-white/30" placeholder="Инструкция">${marketplace?.instruction || ''}</textarea>
        <div>
          <label class="text-white/70 text-sm">Категории (можно несколько)</label>
          <div class="flex flex-wrap gap-2 mt-1" id="mpCategories">
            ${['Обувь', 'Одежда', 'Аксессуары'].map(cat => {
              const checked = marketplace?.categories?.includes(cat) ? 'checked' : '';
              return `<label class="text-white/80"><input type="checkbox" value="${cat}" ${checked}> ${cat}</label>`;
            }).join('')}
          </div>
        </div>
        <div>
          <label class="text-white/70 text-sm">Пол (можно несколько)</label>
          <div class="flex flex-wrap gap-2 mt-1" id="mpGender">
            ${['Муж', 'Жен', 'Унисекс'].map(g => {
              const checked = marketplace?.gender?.includes(g) ? 'checked' : '';
              return `<label class="text-white/80"><input type="checkbox" value="${g}" ${checked}> ${g}</label>`;
            }).join('')}
          </div>
        </div>
        <div class="flex items-center gap-2">
          <input type="checkbox" id="mpVpn" ${marketplace?.requires_vpn ? 'checked' : ''}>
          <label class="text-white/80">Требуется VPN</label>
        </div>
        <div>
          <label class="text-white/70 text-sm block mb-1">Логотип (URL или загрузить)</label>
          <input type="text" id="mpLogoUrl" class="w-full p-3 rounded-xl bg-white/20 border border-white/30 mb-2" placeholder="https://..." value="${marketplace?.logo_url || ''}">
          <input type="file" id="mpLogoFile" accept="image/*" class="text-white/70 text-sm">
        </div>
        <input type="number" id="mpSortOrder" class="w-full p-3 rounded-xl bg-white/20 border border-white/30" placeholder="Порядок сортировки" value="${marketplace?.sort_order || 0}">
        <label class="flex items-center gap-2 text-white/80"><input type="checkbox" id="mpActive" ${marketplace?.is_active !== false ? 'checked' : ''}> Активна</label>
      </div>
      <div class="flex gap-3 mt-5">
        <button id="saveMarketplaceBtn" class="flex-1 bg-cyan-500 py-2 rounded-xl">${isEdit ? 'Сохранить' : 'Добавить'}</button>
        <button id="cancelMarketplaceBtn" class="flex-1 bg-white/20 py-2 rounded-xl">Отмена</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
  
  const cancelBtn = modal.querySelector('#cancelMarketplaceBtn');
  cancelBtn.onclick = () => modal.remove();
  modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
  
  const saveBtn = modal.querySelector('#saveMarketplaceBtn');
  saveBtn.onclick = async () => {
    const name = modal.querySelector('#mpName').value.trim();
    const url = modal.querySelector('#mpUrl').value.trim();
    const country = modal.querySelector('#mpCountry').value.trim();
    if (!name || !url || !country) { alert('Заполните обязательные поля'); return; }
    
    // Собираем выбранные категории и пол
    const categories = Array.from(modal.querySelectorAll('#mpCategories input:checked')).map(cb => cb.value);
    const gender = Array.from(modal.querySelectorAll('#mpGender input:checked')).map(cb => cb.value);
    
    const description = modal.querySelector('#mpDescription').value.trim();
    const instruction = modal.querySelector('#mpInstruction').value.trim();
    const requires_vpn = modal.querySelector('#mpVpn').checked;
    const sort_order = parseInt(modal.querySelector('#mpSortOrder').value) || 0;
    const is_active = modal.querySelector('#mpActive').checked;
    
    // Обработка логотипа
    let logo_url = modal.querySelector('#mpLogoUrl').value.trim();
    const logoFile = modal.querySelector('#mpLogoFile').files[0];
    if (logoFile) {
      const fileName = `logos/${Date.now()}_${logoFile.name}`;
      const { data: uploadData, error: uploadError } = await supabaseClient.storage.from('marketplace-logos').upload(fileName, logoFile);
      if (uploadError) { alert('Ошибка загрузки лого: ' + uploadError.message); return; }
      const { data: publicUrl } = supabaseClient.storage.from('marketplace-logos').getPublicUrl(fileName);
      logo_url = publicUrl.publicUrl;
    }
    
    const payload = { name, website_url: url, country, categories, gender, description, instruction, requires_vpn, sort_order, is_active, logo_url };
    
    try {
      if (isEdit) {
        await supabaseClient.from('marketplaces').update(payload).eq('id', marketplace.id);
      } else {
        await supabaseClient.from('marketplaces').insert(payload);
      }
      alert(isEdit ? 'Площадка обновлена' : 'Площадка добавлена');
      modal.remove();
      renderCurrentScreen(); // обновим админку
    } catch (err) { alert('Ошибка: ' + err.message); }
  };
}

async function renderProductsCatalog() {
  try {
    let query = supabaseClient.from('products').select('*', { count: 'exact' }).eq('is_active', true);
    if (productsFilter.category !== 'all') query = query.eq('category', productsFilter.category);
    if (productsFilter.brand !== 'all') query = query.eq('brand', productsFilter.brand);
    if (productsFilter.sort === 'price_asc') query = query.order('price', { ascending: true });
    else if (productsFilter.sort === 'price_desc') query = query.order('price', { ascending: false });
    else query = query.order('created_at', { ascending: false });
    
    const from = (productsPage - 1) * 20;
    const to = from + 19;
    const { data, count, error } = await query.range(from, to);
    if (error) throw error;
    
    productsTotalPages = Math.ceil((count || 0) / 20);
    
    const categories = [...new Set(data.map(p => p.category).filter(Boolean))];
    const brands = [...new Set(data.map(p => p.brand).filter(Boolean))];
    
    return `
      <button id="backFromProductsCatalogBtn" class="global-back-btn">← Назад</button>

        <div class="flex-1"><select id="filterBrand" class="w-full p-2 rounded-lg bg-white/20 border border-white/30"><option value="all">Все бренды</option>${brands.map(b => `<option value="${b}" ${productsFilter.brand === b ? 'selected' : ''}>${b}</option>`).join('')}</select></div>
        <div><select id="filterSort" class="w-full p-2 rounded-lg bg-white/20 border border-white/30"><option value="new" ${productsFilter.sort === 'new' ? 'selected' : ''}>Новинки</option><option value="price_asc" ${productsFilter.sort === 'price_asc' ? 'selected' : ''}>Цена ↑</option><option value="price_desc" ${productsFilter.sort === 'price_desc' ? 'selected' : ''}>Цена ↓</option></select></div>
        <button id="applyProductsFilter" class="bg-cyan-500 px-4 py-2 rounded-lg">Применить</button>
      </div>
      <div class="grid grid-cols-2 gap-4" id="productsGrid">
        ${data.map(p => `
          <div class="product-card" data-product-id="${p.id}">
            <div class="aspect-square bg-white/10 flex items-center justify-center relative"><img src="${p.image_url || 'https://via.placeholder.com/150'}" class="w-full h-full object-cover"><span class="absolute top-2 right-2 wishlist-heart text-xl ${wishlist.has(p.id) ? 'text-red-500' : 'text-white/50'}" data-product-id="${p.id}">${wishlist.has(p.id) ? '❤️' : '🤍'}</span></div>
            <div class="p-2"><p class="text-white font-bold text-sm truncate">${p.title}</p><p class="text-cyan-400 text-xs">${p.price} ${p.currency}</p><p class="text-white/50 text-xs">${p.brand || ''} ${p.category || ''}</p><button class="buyNowBtn mt-2 w-full bg-cyan-500/50 py-1 rounded text-xs" data-url="${p.url}" data-price="${p.price}">Купить сейчас</button></div>
          </div>
        `).join('')}
      </div>
      <div class="flex justify-center gap-2 mt-4"><button id="prevPage" class="bg-white/20 px-4 py-2 rounded-lg" ${productsPage <= 1 ? 'disabled' : ''}>← Назад</button><span class="text-white/70 py-2">Страница ${productsPage} из ${productsTotalPages}</span><button id="nextPage" class="bg-white/20 px-4 py-2 rounded-lg" ${productsPage >= productsTotalPages ? 'disabled' : ''}>Вперёд →</button></div>

  } catch (err) { return '<p class="text-center mt-10 text-red-400">Ошибка загрузки товаров</p>'; }

function attachProductsCatalogHandlers() {

      productsPage = 1;
      renderCurrentScreen();
    };
  }
  const prevBtn = document.getElementById('prevPage');
  const nextBtn = document.getElementById('nextPage');
  if (prevBtn) prevBtn.onclick = () => { if (productsPage > 1) { productsPage--; renderCurrentScreen(); } };
  if (nextBtn) nextBtn.onclick = () => { if (productsPage < productsTotalPages) { productsPage++; renderCurrentScreen(); } };
  
  document.querySelectorAll('.wishlist-heart').forEach(heart => {
    heart.onclick = async (e) => {
      e.stopPropagation();
      const productId = heart.getAttribute('data-product-id');
      if (wishlist.has(productId)) {
        await supabaseClient.from('wishlist').delete().eq('user_id', userId).eq('product_id', productId);
        wishlist.delete(productId);
        heart.innerText = '🤍';

        heart.innerText = '❤️';

    };
  });
  
  document.querySelectorAll('.buyNowBtn').forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      const url = btn.getAttribute('data-url');
      const price = parseFloat(btn.getAttribute('data-price'));

        window.tempOrder = { url: url, price: price, weight: 1, total: price * 0.45 + 12, discountAmount: 0, appliedPromo: null };
        switchTab('neworder');
      }
    };
  });
  
  document.querySelectorAll('.product-card').forEach(card => {
    card.onclick = () => {
      const url = card.querySelector('.buyNowBtn')?.getAttribute('data-url');

        window.tempOrder = { url: url, price: price, weight: 1, total: price * 0.45 + 12, discountAmount: 0, appliedPromo: null };
        switchTab('neworder');
      }
    };
  });
  
  const backBtn = document.getElementById('backFromProductsCatalogBtn');
  if (backBtn) backBtn.onclick = () => { currentSubScreen = null; renderCurrentScreen(); };
}

        </div>
        <div class="p-4">
          ${requiresVpn === 'true' ? '<p class="text-yellow-400 mb-3">⚠️ Для доступа может потребоваться VPN.</p>' : ''}
          <p class="text-white/90 whitespace-pre-line">${instruction || 'Подробная инструкция появится позже.'}</p>
          ${images.length > 0 ? `
            <div class="mt-4 space-y-3">
              ${images.map(url => `<img src="${url}" class="w-full rounded-xl border border-white/20">`).join('')}
            </div>
          ` : ''}
        </div>
      </div>
    `;
    document.body.appendChild(modal);
    modal.querySelector('.close-modal').onclick = () => modal.remove();
    modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
  }
  
  function setupFilters() {
    ['#filterCountries', '#filterCategories', '#filterGenders'].forEach(selector => {
      const container = document.querySelector(selector);
      if (!container) return;
      container.querySelectorAll('.filter-chip').forEach(chip => {
        chip.addEventListener('click', () => {
          container.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
          chip.classList.add('active');
          renderFilteredGrid();
        });
      });
    });
  }
  
  (async () => {
    await renderFilteredGrid();
    setupFilters();
  })();
}

// ==================== РЕНДЕР ПОДКАТАЛОГА ТОВАРОВ ====================
async function renderProductsCatalog() {
  try {
    let query = supabaseClient.from('products').select('*', { count: 'exact' }).eq('is_active', true);
    if (productsFilter.category !== 'all') query = query.eq('category', productsFilter.category);
    if (productsFilter.brand !== 'all') query = query.eq('brand', productsFilter.brand);
    if (productsFilter.sort === 'price_asc') query = query.order('price', { ascending: true });
    else if (productsFilter.sort === 'price_desc') query = query.order('price', { ascending: false });
    else query = query.order('created_at', { ascending: false });
    
    const from = (productsPage - 1) * 20;
    const to = from + 19;
    const { data, count, error } = await query.range(from, to);
    if (error) throw error;
    productsTotalPages = Math.ceil((count || 0) / 20);
    const categories = [...new Set(data.map(p => p.category).filter(Boolean))];
    const brands = [...new Set(data.map(p => p.brand).filter(Boolean))];
    
    return `
      <button id="backFromProductsCatalogBtn" class="global-back-btn">← Назад</button>
      <div class="mb-4 flex flex-wrap gap-2">
        <div class="flex-1"><select id="filterCategory" class="w-full p-2 rounded-lg bg-white/20 border border-white/30"><option value="all">Все категории</option>${categories.map(c => `<option value="${c}" ${productsFilter.category === c ? 'selected' : ''}>${c}</option>`).join('')}</select></div>
        <div class="flex-1"><select id="filterBrand" class="w-full p-2 rounded-lg bg-white/20 border border-white/30"><option value="all">Все бренды</option>${brands.map(b => `<option value="${b}" ${productsFilter.brand === b ? 'selected' : ''}>${b}</option>`).join('')}</select></div>
        <div><select id="filterSort" class="w-full p-2 rounded-lg bg-white/20 border border-white/30"><option value="new" ${productsFilter.sort === 'new' ? 'selected' : ''}>Новинки</option><option value="price_asc" ${productsFilter.sort === 'price_asc' ? 'selected' : ''}>Цена ↑</option><option value="price_desc" ${productsFilter.sort === 'price_desc' ? 'selected' : ''}>Цена ↓</option></select></div>
        <button id="applyProductsFilter" class="bg-cyan-500 px-4 py-2 rounded-lg">Применить</button>
      </div>
      <div class="grid grid-cols-2 gap-4" id="productsGrid">
        ${data.map(p => `
          <div class="product-card" data-product-id="${p.id}">
            <div class="aspect-square bg-white/10 flex items-center justify-center relative"><img src="${p.image_url || 'https://via.placeholder.com/150'}" class="w-full h-full object-cover"><span class="absolute top-2 right-2 wishlist-heart text-xl ${wishlist.has(p.id) ? 'text-red-500' : 'text-white/50'}" data-product-id="${p.id}">${wishlist.has(p.id) ? '❤️' : '🤍'}</span></div>
            <div class="p-2"><p class="text-white font-bold text-sm truncate">${p.title}</p><p class="text-cyan-400 text-xs">${p.price} ${p.currency}</p><p class="text-white/50 text-xs">${p.brand || ''} ${p.category || ''}</p><button class="buyNowBtn mt-2 w-full bg-cyan-500/50 py-1 rounded text-xs" data-url="${p.url}" data-price="${p.price}">Купить сейчас</button></div>
          </div>
        `).join('')}
      </div>
      <div class="flex justify-center gap-2 mt-4"><button id="prevPage" class="bg-white/20 px-4 py-2 rounded-lg" ${productsPage <= 1 ? 'disabled' : ''}>← Назад</button><span class="text-white/70 py-2">Страница ${productsPage} из ${productsTotalPages}</span><button id="nextPage" class="bg-white/20 px-4 py-2 rounded-lg" ${productsPage >= productsTotalPages ? 'disabled' : ''}>Вперёд →</button></div>
      ${renderFooter()}
    `;
  } catch (err) { return '<p class="text-center mt-10 text-red-400">Ошибка загрузки товаров</p>'; }
}

function attachProductsCatalogHandlers() {
  const applyBtn = document.getElementById('applyProductsFilter');
  if (applyBtn) applyBtn.onclick = () => {
    productsFilter.category = document.getElementById('filterCategory').value;
    productsFilter.brand = document.getElementById('filterBrand').value;
    productsFilter.sort = document.getElementById('filterSort').value;
    productsPage = 1;
    renderCurrentScreen();
  };
  document.getElementById('prevPage')?.addEventListener('click', () => { if (productsPage > 1) { productsPage--; renderCurrentScreen(); } });
  document.getElementById('nextPage')?.addEventListener('click', () => { if (productsPage < productsTotalPages) { productsPage++; renderCurrentScreen(); } });
  
  document.querySelectorAll('.wishlist-heart').forEach(heart => {
    heart.onclick = async (e) => {
      e.stopPropagation();
      const pid = heart.dataset.productId;
      if (wishlist.has(pid)) {
        await supabaseClient.from('wishlist').delete().eq('user_id', userId).eq('product_id', pid);
        wishlist.delete(pid);
        heart.innerText = '🤍';
        heart.classList.remove('text-red-500');
      } else {
        await supabaseClient.from('wishlist').insert({ user_id: userId, product_id: pid });
        wishlist.add(pid);
        heart.innerText = '❤️';
        heart.classList.add('text-red-500');
      }
    };
  });
  
  document.querySelectorAll('.buyNowBtn').forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      const url = btn.dataset.url;
      const price = parseFloat(btn.dataset.price);
      if (url) { window.tempOrder = { url, price, weight: 1, total: price * 0.45 + 12, discountAmount: 0, appliedPromo: null }; switchTab('neworder'); }
    };
  });
  
  document.querySelectorAll('.product-card').forEach(card => {
    card.onclick = () => {
      const btn = card.querySelector('.buyNowBtn');
      if (btn) { const url = btn.dataset.url; const price = parseFloat(btn.dataset.price); window.tempOrder = { url, price, weight: 1, total: price * 0.45 + 12, discountAmount: 0, appliedPromo: null }; switchTab('neworder'); }
    };
  });
  
  const backBtn = document.getElementById('backFromProductsCatalogBtn');
  if (backBtn) backBtn.onclick = () => { currentSubScreen = null; renderCurrentScreen(); };
}

        // ==================== ЗАПУСК ====================
        init();
  </script>
</body>
</html>
