<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>ICE LOGIX</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    body { background: #0F172A; }
    .status-badge { padding: 4px 8px; border-radius: 20px; font-size: 12px; font-weight: bold; }
    .status-pending { background: #f59e0b; color: #000; }
    .status-paid { background: #10b981; color: #fff; }
    .status-shipped { background: #3b82f6; color: #fff; }
    .status-delivered { background: #8b5cf6; color: #fff; }
    .status-cancelled { background: #ef4444; color: #fff; }
    .marketplace-card { transition: transform 0.2s, box-shadow 0.2s; }
    .marketplace-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -12px rgba(0,0,0,0.3); }
    /* Нижнее меню */
    .tab-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255,255,255,0.1);
      display: flex;
      justify-content: space-around;
      padding: 8px 12px 12px;
      z-index: 100;
    }
    .tab-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: #8e9aaf;
      transition: color 0.2s;
      cursor: pointer;
      font-size: 12px;
    }
    .tab-item.active { color: #00c2ff; }
    .tab-icon { font-size: 22px; }
    .tab-label { font-size: 10px; font-weight: bold; }
    /* Выделенная кнопка "Новый заказ" */
    .tab-item.new-order {
      background: linear-gradient(135deg, #007aff, #00c2ff);
      color: white;
      padding: 6px 12px;
      border-radius: 30px;
      margin-top: -8px;
      box-shadow: 0 4px 12px rgba(0,122,255,0.4);
    }
    .tab-item.new-order .tab-icon { font-size: 18px; }
    .tab-item.new-order .tab-label { font-size: 11px; font-weight: bold; }
    /* Верхняя панель */
    .app-header {
      position: sticky;
      top: 0;
      z-index: 90;
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(20px);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .back-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; display: none; }
    .logo-img { height: 32px; cursor: pointer; }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .balance {
      background: rgba(0,194,255,0.15);
      padding: 4px 8px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .balance-add {
      background: none;
      border: none;
      color: #00c2ff;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
    }
    .icon-btn { background: none; border: none; color: white; font-size: 20px; cursor: pointer; }
    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #2d3748;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      overflow: hidden;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .user-info { display: flex; flex-direction: column; align-items: flex-end; }
    .user-name { font-size: 12px; font-weight: bold; color: white; line-height: 1.2; }
    .main-content { padding: 16px; padding-bottom: 80px; }
    /* Каталог: два подраздела */
    .catalog-tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.2);
      padding-bottom: 8px;
    }
    .catalog-tab {
      font-size: 16px;
      font-weight: bold;
      color: #8e9aaf;
      cursor: pointer;
      padding: 4px 0;
    }
    .catalog-tab.active { color: #00c2ff; border-bottom: 2px solid #00c2ff; }
  </style>
</head>
<body class="text-white">
  <div id="app">
    <!-- Верхняя панель -->
    <div class="app-header">
      <div class="header-left">
        <button class="back-btn" id="backBtn">←</button>
        <img id="logoImg" class="logo-img" src="https://i.ibb.co/9kJTjpjT/1-Logo.png" alt="ICE LOGIX" style="display: block;">
      </div>
      <div class="header-right">
        <div class="balance">
          <span id="headerBalance">0 ❄️</span>
          <button class="balance-add" id="addBalanceBtn">+</button>
        </div>
        <button class="icon-btn" id="notificationsBtn">🔔</button>
        <div class="user-info">
          <div class="avatar" id="avatar"></div>
          <span class="user-name" id="userNameHeader">Гость</span>
        </div>
      </div>
    </div>
    <!-- Контент -->
    <div id="content" class="main-content"><div class="text-center py-10">Загрузка...</div></div>
    <!-- Нижнее меню -->
    <div class="tab-bar" id="tabBar">
      <div class="tab-item" data-tab="home"><span class="tab-icon">🏠</span><span class="tab-label">Главная</span></div>
      <div class="tab-item" data-tab="calculator"><span class="tab-icon">🧮</span><span class="tab-label">Калькулятор</span></div>
      <div class="tab-item new-order" data-tab="neworder"><span class="tab-icon">✨</span><span class="tab-label">Новый заказ</span></div>
      <div class="tab-item" data-tab="catalogs"><span class="tab-icon">📚</span><span class="tab-label">Каталоги</span></div>
      <div class="tab-item" data-tab="profile"><span class="tab-icon">👤</span><span class="tab-label">Профиль</span></div>
    </div>
  </div>
  <script>
    // --- Глобальные переменные ---
    let tg = null;
    let userId = null;
    let userName = 'Гость';
    let userAvatarUrl = null;
    let isOwner = false;
    let supabaseClient = null;
    let currentTab = 'home';
    let currentSubScreen = null;
    let previousTab = null;  // для кнопки "назад"
    let marketplaceFilters = { country: 'all', type: 'all', category: 'all', gender: 'all' };
    let balance = 0;

    // --- Инициализация ---
    function init() {
      tg = window.Telegram.WebApp;
      tg.ready();
      tg.expand();
      const user = tg.initDataUnsafe?.user;
      userId = user ? user.id : null;
      userName = user ? (user.first_name || user.username) : 'Гость';
      userAvatarUrl = user?.photo_url || null;
      const SUPABASE_URL = 'https://vrvwdagjpttvfvjanbwq.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZydndkYWdqcHR0dmZ2amFuYndxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NTc4MzgsImV4cCI6MjA5MTIzMzgzOH0.P9GQSW6NLN1BhR66PX-LP4ysZBXFeWIXRYIRvhRjo1c';
      supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      loadUserData();
      attachEventListeners();
      // Обновляем интерфейс после загрузки
      document.getElementById('userNameHeader').innerText = userName;
      const avatarDiv = document.getElementById('avatar');
      if (userAvatarUrl) {
        avatarDiv.innerHTML = `<img src="${userAvatarUrl}" alt="avatar">`;
      } else {
        avatarDiv.innerText = userName.charAt(0).toUpperCase();
      }
      // Логотип: переход на главную
      document.getElementById('logoImg').addEventListener('click', () => switchTab('home'));
    }

    async function loadUserData() {
      if (!userId) return;
      const { data, error } = await supabaseClient.from('users').select('role, ices_balance').eq('user_id', userId).maybeSingle();
      if (!error && data) {
        isOwner = (data.role === 'owner');
        balance = data.ices_balance || 0;
        document.getElementById('headerBalance').innerText = balance + ' ❄️';
      }
    }

    function attachEventListeners() {
      // Кнопка "Назад" – возврат на предыдущий таб
      document.getElementById('backBtn').addEventListener('click', () => {
        if (previousTab && previousTab !== currentTab) {
          switchTab(previousTab);
        } else if (currentTab !== 'home') {
          switchTab('home');
        } else {
          tg.close();
        }
      });
      document.getElementById('notificationsBtn').addEventListener('click', () => alert('Уведомления пока не реализованы'));
      document.getElementById('addBalanceBtn').addEventListener('click', () => alert('Пополнение баланса будет позже'));
      document.querySelectorAll('.tab-item').forEach(tab => {
        tab.addEventListener('click', () => {
          const tabName = tab.getAttribute('data-tab');
          if (tabName === 'catalogs') {
            // Для каталогов запоминаем, что мы внутри, и показываем подразделы
            currentSubScreen = 'catalogs';
            renderCatalogs();
          } else {
            currentSubScreen = null;
            switchTab(tabName);
          }
        });
      });
    }

    function switchTab(tabName, keepHistory = true) {
      if (keepHistory && currentTab && currentTab !== tabName) {
        previousTab = currentTab;
      }
      currentTab = tabName;
      currentSubScreen = null;
      document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
      const activeTab = document.querySelector(`.tab-item[data-tab="${tabName}"]`);
      if (activeTab) activeTab.classList.add('active');
      const backBtn = document.getElementById('backBtn');
      backBtn.style.display = (tabName === 'home') ? 'none' : 'block';
      renderCurrentScreen();
    }

    async function renderCurrentScreen() {
      const contentDiv = document.getElementById('content');
      if (currentSubScreen === 'catalogs') {
        contentDiv.innerHTML = await renderCatalogsContent();
        attachCatalogsHandlers();
        return;
      }
      if (currentTab === 'home') { contentDiv.innerHTML = await renderHome(); attachHomeHandlers(); }
      else if (currentTab === 'calculator') { contentDiv.innerHTML = await renderCalculator(); attachCalculatorHandlers(); }
      else if (currentTab === 'neworder') { contentDiv.innerHTML = await renderNewOrder(); attachNewOrderHandlers(); }
      else if (currentTab === 'catalogs') { contentDiv.innerHTML = await renderCatalogsContent(); attachCatalogsHandlers(); }
      else if (currentTab === 'profile') { contentDiv.innerHTML = await renderProfile(); attachProfileHandlers(); }
      else if (currentTab === 'admin' && isOwner) { contentDiv.innerHTML = await renderAdmin(); attachAdminHandlers(); }
      else contentDiv.innerHTML = '<div class="text-center py-10">Страница не найдена</div>';
    }

    // --- Рендер каталогов (два подраздела) ---
    async function renderCatalogsContent() {
      return `
        <div>
          <div class="catalog-tabs">
            <div class="catalog-tab active" data-catalog="marketplaces">Площадки</div>
            <div class="catalog-tab" data-catalog="products">Товары</div>
          </div>
          <div id="catalogContent">${await renderMarketplaces()}</div>
        </div>
      `;
    }

    function attachCatalogsHandlers() {
      const tabs = document.querySelectorAll('.catalog-tab');
      tabs.forEach(tab => {
        tab.addEventListener('click', async () => {
          tabs.forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          const type = tab.getAttribute('data-catalog');
          const container = document.getElementById('catalogContent');
          if (type === 'marketplaces') {
            container.innerHTML = await renderMarketplaces();
            attachMarketplacesHandlers();
          } else {
            container.innerHTML = '<p class="text-center mt-10">Каталог товаров в разработке</p>';
          }
        });
      });
      attachMarketplacesHandlers();
    }

    // --- Остальные функции (рендер Home, Calculator, NewOrder, Profile, Admin) ---
    // (они будут во второй части)
    async function renderHome() { return `<div>Загрузка...</div>`; }
    function attachHomeHandlers() {}
    async function renderCalculator() { return `<div>Калькулятор</div>`; }
    function attachCalculatorHandlers() {}
    async function renderNewOrder() { return `<div>Новый заказ</div>`; }
    function attachNewOrderHandlers() {}
    async function renderProfile() { return `<div>Профиль</div>`; }
    function attachProfileHandlers() {}
    async function renderAdmin() { return `<div>Админка</div>`; }
    function attachAdminHandlers() {}
    async function renderMarketplaces() { return `<div>Загрузка...</div>`; }
    function attachMarketplacesHandlers() {}
    async function loadBalance() { return balance; }
    function getStatusText(s) { return s; }
    function getStatusClass(s) { return 'status-pending'; }
    async function uploadPhoto(o,f) { return ''; }
    async function addPhotoToOrder(o,u) {}

        // ==================== РЕАЛЬНЫЕ ФУНКЦИИ ====================
        async function renderHome() {
      const bal = await loadBalance();
      return `
        <div class="space-y-4">
          <div class="bg-white/10 backdrop-blur-md rounded-2xl p-4 text-center">
            <h1 class="text-2xl font-bold">Добро пожаловать, ${userName}!</h1>
            <p class="text-white/70">Ваш баланс: <span class="text-cyan-400 font-bold">${bal} ❄️</span></p>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div class="bg-white/10 backdrop-blur-md rounded-xl p-3"><p class="text-white/70 text-xs">Курс ¥</p><p class="text-white text-xl font-bold">0.45 BYN</p></div>
            <div class="bg-white/10 backdrop-blur-md rounded-xl p-3"><p class="text-white/70 text-xs">Поставка</p><p class="text-white text-xl font-bold">8 дн</p></div>
          </div>
          <div class="bg-white/10 backdrop-blur-md rounded-xl p-4">
            <p class="text-center text-white/70">Используйте <strong>Калькулятор</strong> или <strong>Новый заказ</strong> для оформления.</p>
          </div>
        </div>
      `;
    }
    function attachHomeHandlers() {}

    async function renderCalculator() {
      const bal = await loadBalance();
      return `
        <div class="space-y-4">
          <div class="bg-white/10 backdrop-blur-md rounded-xl p-4">
            <h2 class="text-lg font-bold mb-3">🧮 Калькулятор стоимости</h2>
            <label class="text-white/70 text-sm">Ссылка на товар (необязательно)</label>
            <input type="text" id="calcUrl" class="w-full mt-1 p-2 rounded-lg bg-white/20 text-white border border-white/30" placeholder="https://...">
            <label class="text-white/70 text-sm block mt-3">Цена (¥)</label>
            <input type="number" id="calcPrice" class="w-full mt-1 p-2 rounded-lg bg-white/20 text-white border border-white/30" value="520" step="1">
            <label class="text-white/70 text-sm block mt-3">Вес (кг)</label>
            <input type="range" id="calcWeight" min="0.1" max="30" step="0.1" value="1" class="w-full mt-1">
            <div class="flex justify-between text-white/70 text-sm mt-1"><span>0.1 кг</span><span id="weightVal">1.0 кг</span><span>30 кг</span></div>
            <button id="calcBtn" class="mt-4 w-full bg-cyan-500 py-2 rounded-lg">Рассчитать</button>
            <div id="calcResult" class="mt-4 hidden">
              <p class="text-white">Примерная стоимость: <span id="totalPrice" class="font-bold text-cyan-400">0</span> ❄️</p>
              <button id="toNewOrderBtn" class="mt-2 w-full bg-blue-600 py-2 rounded-lg">Перенести в заказ</button>
            </div>
          </div>
        </div>
      `;
    }

    function attachCalculatorHandlers() {
      const weightSlider = document.getElementById('calcWeight');
      const weightVal = document.getElementById('weightVal');
      if (weightSlider) weightSlider.addEventListener('input', () => weightVal.innerText = parseFloat(weightSlider.value).toFixed(1) + ' кг');
      const calcBtn = document.getElementById('calcBtn');
      const calcResult = document.getElementById('calcResult');
      const totalSpan = document.getElementById('totalPrice');
      const priceInput = document.getElementById('calcPrice');
      const urlInput = document.getElementById('calcUrl');
      const toNewOrder = document.getElementById('toNewOrderBtn');
      if (calcBtn) {
        calcBtn.addEventListener('click', () => {
          let price = parseFloat(priceInput?.value || 520);
          let weight = parseFloat(weightSlider?.value || 1);
          let total = (price * 0.45) + (weight * 12);
          if (totalSpan) totalSpan.innerText = total.toFixed(2);
          if (calcResult) calcResult.classList.remove('hidden');
          window.tempOrder = { url: urlInput?.value || '', price, weight, total };
        });
      }
      if (toNewOrder) {
        toNewOrder.addEventListener('click', () => {
          if (window.tempOrder) switchTab('neworder');
          else alert('Сначала рассчитайте стоимость');
        });
      }
    }

    async function renderNewOrder() {
      const data = window.tempOrder || { url: '', price: 520, weight: 1, total: 0 };
      return `
        <div class="space-y-4">
          <div class="bg-white/10 backdrop-blur-md rounded-xl p-4">
            <h2 class="text-lg font-bold mb-3">✨ Новый заказ</h2>
            <label class="text-white/70 text-sm">Ссылка</label>
            <input type="text" id="orderUrl" class="w-full mt-1 p-2 rounded-lg bg-white/20 text-white" value="${data.url}">
            <label class="text-white/70 text-sm block mt-3">Цена (¥)</label>
            <input type="number" id="orderPrice" class="w-full mt-1 p-2 rounded-lg bg-white/20 text-white" value="${data.price}">
            <label class="text-white/70 text-sm block mt-3">Вес (кг)</label>
            <input type="number" id="orderWeight" class="w-full mt-1 p-2 rounded-lg bg-white/20 text-white" value="${data.weight}" step="0.1">
            <p class="mt-2 text-white">Итого: <span id="orderTotal" class="font-bold text-cyan-400">${data.total}</span> ❄️</p>
            <button id="createOrderFinal" class="mt-4 w-full bg-green-600 py-2 rounded-lg">Оформить заказ (75% предоплата)</button>
          </div>
        </div>
      `;
    }

    function attachNewOrderHandlers() {
      const priceInput = document.getElementById('orderPrice');
      const weightInput = document.getElementById('orderWeight');
      const totalSpan = document.getElementById('orderTotal');
      const createBtn = document.getElementById('createOrderFinal');
      const urlInput = document.getElementById('orderUrl');
      function updateTotal() {
        let price = parseFloat(priceInput?.value || 520);
        let weight = parseFloat(weightInput?.value || 1);
        let total = (price * 0.45) + (weight * 12);
        if (totalSpan) totalSpan.innerText = total.toFixed(2);
        window.tempOrder = { url: urlInput?.value, price, weight, total };
      }
      priceInput?.addEventListener('input', updateTotal);
      weightInput?.addEventListener('input', updateTotal);
      if (createBtn) {
        createBtn.addEventListener('click', async () => {
          if (!window.tempOrder) { alert('Заполните данные'); return; }
          if (!userId) { alert('Ошибка авторизации'); return; }
          try {
            const { data, error } = await supabaseClient.from('orders').insert({
              user_id: userId, source_url: window.tempOrder.url,
              weight_estimated: window.tempOrder.weight, price_original: window.tempOrder.price,
              price_byn: window.tempOrder.price * 0.45, delivery_cost_estimated: window.tempOrder.weight * 12,
              prepayment_amount: window.tempOrder.total * 0.75, status: 'pending'
            }).select();
            if (error) throw error;
            alert(`Заказ создан! Номер: ${data[0].id}. Сумма предоплаты: ${(window.tempOrder.total * 0.75).toFixed(2)} ❄️`);
            window.tempOrder = null;
            switchTab('home');
          } catch (err) { alert('Ошибка: ' + err.message); }
        });
      }
    }

    async function renderProfile() {
      const bal = await loadBalance();
      return `
        <div class="space-y-4">
          <div class="bg-white/10 backdrop-blur-md rounded-2xl p-4 text-center">
            <div class="avatar mx-auto w-20 h-20 text-3xl flex items-center justify-center bg-white/20 rounded-full mb-2">${userName.charAt(0).toUpperCase()}</div>
            <h2 class="text-xl font-bold">${userName}</h2>
            <p class="text-white/70">Баланс: <span class="text-cyan-400 font-bold">${bal} ❄️</span></p>
            <button id="topupBtn" class="mt-2 bg-cyan-500 px-4 py-1 rounded-full text-sm">Пополнить</button>
          </div>
          <div class="bg-white/10 backdrop-blur-md rounded-xl p-4">
            <h3 class="font-bold mb-2">Мои заказы</h3>
            <button id="myOrdersBtn" class="w-full bg-white/20 py-2 rounded-lg">Посмотреть заказы</button>
          </div>
          <button id="logoutBtn" class="w-full bg-red-500/20 border border-red-500/50 py-3 rounded-lg">Выйти</button>
        </div>
      `;
    }

    function attachProfileHandlers() {
      document.getElementById('myOrdersBtn')?.addEventListener('click', () => switchTab('orders'));
      document.getElementById('topupBtn')?.addEventListener('click', () => alert('Пополнение будет позже'));
      document.getElementById('logoutBtn')?.addEventListener('click', () => tg.close());
    }

    async function renderAdmin() {
      if (!isOwner) return '<p class="text-center mt-10">Доступ запрещён</p>';
      return '<p class="text-center mt-10">Админ-панель в разработке</p>';
    }
    function attachAdminHandlers() {}

    // --- Каталог площадок (полная версия) ---
    async function renderMarketplaces() {
      try {
        let query = supabaseClient.from('marketplaces').select('*').eq('is_active', true);
        if (marketplaceFilters.country && marketplaceFilters.country !== 'all') query = query.eq('country', marketplaceFilters.country);
        if (marketplaceFilters.type && marketplaceFilters.type !== 'all') query = query.eq('type', marketplaceFilters.type);
        const { data, error } = await query.order('sort_order', { ascending: true });
        if (error) throw error;
        if (!data || data.length === 0) return '<p class="text-center mt-10 text-white/70">Каталог пуст</p>';
        const countries = [...new Set(data.map(m => m.country).filter(Boolean))];
        return `
          <div class="mb-4 flex flex-wrap items-center justify-between gap-2">
            <div class="flex gap-2 overflow-x-auto pb-1">
              <button class="filter-country active bg-cyan-500 text-white px-3 py-1 rounded-full text-sm" data-country="all">Все</button>
              ${countries.map(c => `<button class="filter-country bg-white/20 hover:bg-white/30 px-3 py-1 rounded-full text-sm" data-country="${c}">${c}</button>`).join('')}
            </div>
            <button id="openFilterModalBtn" class="bg-white/20 hover:bg-white/30 px-3 py-1 rounded-full text-sm">🔍 Фильтр</button>
          </div>
          <div class="grid grid-cols-2 gap-4">
            ${data.map(mp => `
              <div class="marketplace-card bg-white/10 backdrop-blur-md rounded-xl overflow-hidden" data-country="${mp.country || ''}">
                <div class="aspect-square bg-white/20 flex items-center justify-center p-2">
                  ${mp.logo_url ? `<img src="${mp.logo_url}" class="w-full h-full object-contain">` : '<div class="text-4xl">🛍️</div>'}
                </div>
                <div class="p-3">
                  <h3 class="font-bold text-white truncate">${mp.name}</h3>
                  <p class="text-white/70 text-xs">${mp.country || ''} · ${mp.type === 'brand' ? 'Бренд' : mp.type === 'marketplace' ? 'Маркетплейс' : 'Спец'}</p>
                  <p class="text-white/80 text-xs mt-2 line-clamp-2">${(mp.description || '').substring(0, 80)}</p>
                  <div class="flex justify-between items-center mt-3">
                    <a href="${mp.website_url}" target="_blank" class="text-cyan-400 text-sm underline">Перейти</a>
                    <button class="detail-btn bg-white/20 rounded-full w-8 h-8" data-name="${mp.name.replace(/"/g, '&quot;')}" data-description="${(mp.description || '').replace(/"/g, '&quot;')}" data-delivery="${(mp.delivery_info || '').replace(/"/g, '&quot;')}" data-payment="${(mp.payment_methods || '').replace(/"/g, '&quot;')}" data-instruction="${(mp.full_instruction || '').replace(/"/g, '&quot;')}">ℹ️</button>
                  </div>
                </div>
              </div>
            `).join('')}
          </div>
        `;
      } catch (err) { return '<p class="text-center mt-10 text-red-400">Ошибка загрузки</p>'; }
    }

    function attachMarketplacesHandlers() {
      const filterBtns = document.querySelectorAll('.filter-country');
      const cards = document.querySelectorAll('.marketplace-card');
      filterBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          const country = btn.getAttribute('data-country');
          filterBtns.forEach(b => b.classList.remove('active', 'bg-cyan-500', 'text-white'));
          btn.classList.add('active', 'bg-cyan-500', 'text-white');
          cards.forEach(card => {
            if (country === 'all' || card.getAttribute('data-country') === country) card.style.display = '';
            else card.style.display = 'none';
          });
          marketplaceFilters.country = country === 'all' ? null : country;
        });
      });
      document.getElementById('openFilterModalBtn')?.addEventListener('click', showFilterModal);
      document.querySelectorAll('.detail-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          showDetailModal(btn.getAttribute('data-name'), btn.getAttribute('data-description'), btn.getAttribute('data-delivery'), btn.getAttribute('data-payment'), btn.getAttribute('data-instruction'));
        });
      });
    }

    function showDetailModal(name, desc, delivery, payment, instr) {
      const modal = document.createElement('div');
      modal.className = 'fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4';
      modal.innerHTML = `
        <div class="bg-white/10 backdrop-blur-md rounded-2xl max-w-md w-full max-h-[80vh] overflow-y-auto">
          <div class="sticky top-0 bg-white/10 backdrop-blur-md p-4 border-b border-white/20 flex justify-between"><h3 class="text-white font-bold">${name}</h3><button class="close-modal text-white text-2xl">&times;</button></div>
          <div class="p-4 space-y-3 text-white/90">
            ${desc ? `<div><h4 class="font-bold text-cyan-300">Описание</h4><p>${desc}</p></div>` : ''}
            ${delivery ? `<div><h4 class="font-bold text-cyan-300">Доставка</h4><p>${delivery}</p></div>` : ''}
            ${payment ? `<div><h4 class="font-bold text-cyan-300">Оплата</h4><p>${payment}</p></div>` : ''}
            ${instr ? `<div><h4 class="font-bold text-cyan-300">Инструкция</h4><p class="whitespace-pre-line">${instr}</p></div>` : ''}
          </div>
        </div>
      `;
      document.body.appendChild(modal);
      modal.querySelector('.close-modal').addEventListener('click', () => modal.remove());
      modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
    }

    function showFilterModal() {
      const modal = document.createElement('div');
      modal.className = 'fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4';
      modal.innerHTML = `
        <div class="bg-white/10 backdrop-blur-md rounded-2xl max-w-sm w-full p-4">
          <div class="flex justify-between items-center mb-4"><h3 class="text-white font-bold">Фильтры</h3><button class="close-modal text-white text-2xl">&times;</button></div>
          <div class="space-y-4">
            <div><label class="text-white/80 text-sm">Страна</label><select id="filterCountry" class="w-full p-2 rounded-lg bg-white/20"><option value="all">Все</option><option value="Китай">Китай</option><option value="Европа">Европа</option><option value="Россия">Россия</option></select></div>
            <div><label class="text-white/80 text-sm">Тип</label><select id="filterType" class="w-full p-2 rounded-lg bg-white/20"><option value="all">Все</option><option value="marketplace">Маркетплейс</option><option value="brand">Бренд</option><option value="special">Специальный</option></select></div>
            <div class="flex gap-2 mt-4"><button id="applyFiltersBtn" class="flex-1 bg-cyan-500 py-2 rounded-lg">Применить</button><button id="resetFiltersBtn" class="flex-1 bg-white/20 py-2 rounded-lg">Сбросить</button></div>
          </div>
        </div>
      `;
      document.body.appendChild(modal);
      const close = () => modal.remove();
      modal.querySelector('.close-modal').addEventListener('click', close);
      modal.querySelector('#applyFiltersBtn').addEventListener('click', async () => {
        marketplaceFilters.country = modal.querySelector('#filterCountry').value;
        marketplaceFilters.type = modal.querySelector('#filterType').value;
        await renderCurrentScreen();
        close();
      });
      modal.querySelector('#resetFiltersBtn').addEventListener('click', async () => {
        marketplaceFilters = { country: 'all', type: 'all', category: 'all', gender: 'all' };
        await renderCurrentScreen();
        close();
      });
    }

    // --- Заказы (для профиля) ---
    async function renderOrders() {
      if (!userId) return '<p class="text-center mt-10">Авторизуйтесь</p>';
      const { data, error } = await supabaseClient.from('orders').select('*').eq('user_id', userId).order('created_at', { ascending: false });
      if (error || !data || data.length === 0) return '<p class="text-center mt-10">У вас пока нет заказов</p>';
      return `
        <div class="space-y-3">
          ${data.map(order => `
            <div class="bg-white/10 backdrop-blur-md rounded-xl p-4">
              <div class="flex justify-between"><p class="font-bold">Заказ #${order.id.slice(0,8)}</p><span class="status-badge ${getStatusClass(order.status)}">${getStatusText(order.status)}</span></div>
              <p class="text-white/70 text-xs">Вес: ${order.weight_estimated} кг, сумма: ${order.prepayment_amount} ❄️</p>
              ${order.tracking_number_cn ? `<p class="text-white/70 text-xs mt-1">📦 Трек: ${order.tracking_number_cn}</p>` : ''}
            </div>
          `).join('')}
        </div>
      `;
    }
    function attachOrdersHandlers() {}

    // --- Запуск ---
    init();
  </script>
</body>
</html>
