<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>ICE LOGIX</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0F172A; font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
    /* Стили статусов заказов */
    .status-badge { padding: 4px 12px; border-radius: 40px; font-size: 11px; font-weight: bold; display: inline-block; }
    .status-pending { background: #f59e0b; color: #000; }
    .status-paid { background: #10b981; color: #fff; }
    .status-bought { background: #3b82f6; color: #fff; }
    .status-on_sklad_cn { background: #8b5cf6; color: #fff; }
    .status-in_transit { background: #06b6d4; color: #fff; }
    .status-in_belarus { background: #14b8a6; color: #fff; }
    .status-delivered { background: #10b981; color: #fff; }
    .status-cancelled { background: #ef4444; color: #fff; }
    /* Карточки каталога */
    .marketplace-card {
      transition: all 0.2s;
      cursor: pointer;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .marketplace-card:hover { transform: translateY(-4px); background: rgba(255,255,255,0.12); }
    /* Карточка отчёта */
    .report-card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
      margin-bottom: 16px;
    }
    .report-card:hover { transform: translateY(-2px); background: rgba(255,255,255,0.12); }
    /* Нижнее меню */
    .tab-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(25px);
      border-top: 1px solid rgba(255,255,255,0.1);
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 8px 12px 16px;
      z-index: 100;
    }
    .tab-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: #8e9aaf;
      cursor: pointer;
      transition: color 0.2s;
    }
    .tab-item.active { color: #00c2ff; }
    .tab-icon { font-size: 22px; }
    .tab-label { font-size: 10px; font-weight: 600; }
    .tab-item.new-order {
      background: linear-gradient(135deg, #007aff, #00c2ff);
      color: white;
      padding: 8px 16px;
      border-radius: 40px;
      margin-top: -12px;
      box-shadow: 0 4px 12px rgba(0,122,255,0.4);
    }
    .tab-item.new-order .tab-label { font-size: 12px; font-weight: bold; }
    /* Верхняя панель */
    .app-header {
      position: sticky;
      top: 0;
      z-index: 90;
      background: rgba(15, 23, 42, 0.92);
      backdrop-filter: blur(25px);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .header-left { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .logo-img { height: 34px; cursor: pointer; }
    .header-right { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .balance {
      background: rgba(0,194,255,0.15);
      padding: 5px 12px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .balance-add { background: none; border: none; color: #00c2ff; font-size: 16px; cursor: pointer; font-weight: bold; padding: 0; }
    .icon-btn { background: none; border: none; color: white; font-size: 20px; cursor: pointer; width: 32px; text-align: center; }
    .avatar { width: 36px; height: 36px; border-radius: 50%; background: #2d3748; display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; cursor: pointer; }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .user-info { display: flex; flex-direction: column; align-items: flex-end; margin-left: 8px; }
    .user-name { font-size: 12px; font-weight: 600; color: white; line-height: 1.3; }
    /* Отдельная кнопка "Назад" (под хедером) */
    .global-back-btn {
      background: rgba(255,255,255,0.15);
      border: none;
      color: white;
      font-size: 14px;
      font-weight: 600;
      padding: 6px 16px;
      border-radius: 40px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: 0.2s;
      margin-bottom: 16px;
    }
    .global-back-btn:hover { background: rgba(255,255,255,0.25); }
    .main-content { padding: 16px; padding-bottom: 80px; }
    /* Каталог: вкладки и фильтры */
    .catalog-tabs { display: flex; gap: 16px; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 8px; }
    .catalog-tab { font-size: 16px; font-weight: bold; color: #8e9aaf; cursor: pointer; padding: 4px 0; transition: 0.2s; }
    .catalog-tab.active { color: #00c2ff; border-bottom: 2px solid #00c2ff; }
    .filter-country.active { background: #00c2ff !important; color: #0F172A !important; }
    /* Карточка заказа */
    .order-card { background: rgba(255,255,255,0.08); backdrop-filter: blur(12px); border-radius: 20px; padding: 16px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.1); transition: 0.2s; }
    .order-card:hover { background: rgba(255,255,255,0.12); }
  </style>
</head>
<body>
  <div id="app">
    <div class="app-header">
      <div class="header-left">
        <img id="logoImg" class="logo-img" src="https://i.ibb.co/9kJTjpjT/1-Logo.png" alt="ICE LOGIX">
      </div>
      <div class="header-right">
        <div class="balance"><span id="headerBalance">0 ❄️</span><button class="balance-add" id="addBalanceBtn">+</button></div>
        <button class="icon-btn" id="reportsBtn">📸</button>
        <button class="icon-btn" id="notificationsBtn">🔔</button>
        <button class="icon-btn" id="settingsBtn">⚙️</button>
        <div class="user-info">
          <div class="avatar" id="avatar"></div>
          <span class="user-name" id="userNameHeader">Гость</span>
        </div>
      </div>
    </div>
    <div id="content" class="main-content"><div class="text-center py-10">Загрузка...</div></div>
    <div class="tab-bar" id="tabBar">
      <div class="tab-item" data-tab="home"><span class="tab-icon">🏠</span><span class="tab-label">Главная</span></div>
      <div class="tab-item" data-tab="calculator"><span class="tab-icon">🧮</span><span class="tab-label">Калькулятор</span></div>
      <div class="tab-item new-order" data-tab="neworder"><span class="tab-icon">✨</span><span class="tab-label">Новый заказ</span></div>
      <div class="tab-item" data-tab="catalogs"><span class="tab-icon">📚</span><span class="tab-label">Каталоги</span></div>
      <div class="tab-item" data-tab="reports"><span class="tab-icon">📸</span><span class="tab-label">Отчёты</span></div>
      <div class="tab-item" data-tab="profile"><span class="tab-icon">👤</span><span class="tab-label">Профиль</span></div>
    </div>
  </div>
  <script>
    let tg = null, userId = null, userName = 'Гость', userAvatarUrl = null, isOwner = false, supabaseClient = null;
    let currentTab = 'home', previousTab = null, currentSubScreen = null;
    let marketplaceFilters = { country: 'all', type: 'all' };
    let balance = 0;

    async function init() {
      tg = window.Telegram.WebApp;
      tg.ready();
      tg.expand();
      const user = tg.initDataUnsafe?.user;
      userId = user ? user.id : null;
      userName = user ? (user.first_name || user.username) : 'Гость';
      userAvatarUrl = user?.photo_url || null;
      const SUPABASE_URL = 'https://vrvwdagjpttvfvjanbwq.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZydndkYWdqcHR0dmZ2amFuYndxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NTc4MzgsImV4cCI6MjA5MTIzMzgzOH0.P9GQSW6NLN1BhR66PX-LP4ysZBXFeWIXRYIRvhRjo1c';
      supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      await loadUserData();
      attachEventListeners();
      document.getElementById('userNameHeader').innerText = userName;
      const avatarDiv = document.getElementById('avatar');
      avatarDiv.innerHTML = userAvatarUrl ? `<img src="${userAvatarUrl}">` : userName.charAt(0).toUpperCase();
      document.getElementById('logoImg').onclick = () => switchTab('home');
      document.getElementById('avatar').onclick = () => switchTab('profile');
      document.getElementById('settingsBtn').onclick = () => alert('Настройки будут позже');
      document.getElementById('notificationsBtn').onclick = () => alert('Уведомлений пока нет');
      document.getElementById('reportsBtn').onclick = () => switchTab('reports');
      switchTab('home');
    }

    async function loadUserData() {
      if (!userId) return;
      const { data, error } = await supabaseClient.from('users').select('role, ices_balance').eq('user_id', userId).maybeSingle();
      if (!error && data) {
        isOwner = (data.role === 'owner');
        balance = data.ices_balance || 0;
        document.getElementById('headerBalance').innerText = balance + ' ❄️';
      }
    }

    function attachEventListeners() {
      document.getElementById('addBalanceBtn').onclick = () => alert('Пополнение баланса будет позже');
      document.querySelectorAll('.tab-item').forEach(tab => {
        tab.onclick = () => {
          const tabName = tab.getAttribute('data-tab');
          if (tabName === 'catalogs') {
            currentSubScreen = 'catalogs';
            renderCurrentScreen();
          } else {
            currentSubScreen = null;
            switchTab(tabName);
          }
        };
      });
    }

    function switchTab(tabName) {
      if (currentTab && currentTab !== tabName) previousTab = currentTab;
      currentTab = tabName;
      currentSubScreen = null;
      document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
      const activeTab = document.querySelector(`.tab-item[data-tab="${tabName}"]`);
      if (activeTab) activeTab.classList.add('active');
      renderCurrentScreen();
    }

    async function renderCurrentScreen() {
      const contentDiv = document.getElementById('content');
      if (currentSubScreen === 'catalogs') {
        contentDiv.innerHTML = await renderCatalogsContent();
        attachCatalogsHandlers();
        return;
      }
      if (currentSubScreen === 'myOrders') {
        contentDiv.innerHTML = await renderOrders();
        const backBtn = document.getElementById('backToProfileBtn');
        if (backBtn) backBtn.onclick = () => { currentSubScreen = null; renderCurrentScreen(); };
        return;
      }
      if (currentTab === 'home') contentDiv.innerHTML = await renderHome();
      else if (currentTab === 'calculator') contentDiv.innerHTML = await renderCalculator();
      else if (currentTab === 'neworder') contentDiv.innerHTML = await renderNewOrder();
      else if (currentTab === 'catalogs') {
        contentDiv.innerHTML = await renderCatalogsContent();
        attachCatalogsHandlers();
        return;
      }
      else if (currentTab === 'reports') contentDiv.innerHTML = await renderReports();
      else if (currentTab === 'profile') contentDiv.innerHTML = await renderProfile();
      else if (currentTab === 'admin' && isOwner) contentDiv.innerHTML = await renderAdmin();
      else contentDiv.innerHTML = '<div class="text-center py-10">Страница не найдена</div>';
      if (currentTab === 'calculator') attachCalculatorHandlers();
      if (currentTab === 'neworder') attachNewOrderHandlers();
      if (currentTab === 'profile') attachProfileHandlers();
      if (currentTab === 'admin' && isOwner) attachAdminHandlers();
    }

        // --- РЕНДЕР ГЛАВНОЙ СТРАНИЦЫ ---
        async function renderHome() {
      return `
        <div class="bg-white/10 backdrop-blur-md rounded-2xl p-6 text-center shadow-lg">
          <h1 class="text-2xl font-bold">Добро пожаловать, ${userName}!</h1>
          <p class="text-white/70 mt-2">Ваш баланс: <span class="text-cyan-400 font-bold">${balance} ❄️</span></p>
          <div class="mt-6 grid grid-cols-2 gap-3">
            <div class="bg-white/5 rounded-xl p-3">
              <p class="text-white/70 text-xs">Курс ¥</p>
              <p class="text-white text-xl font-bold">0.45 BYN</p>
            </div>
            <div class="bg-white/5 rounded-xl p-3">
              <p class="text-white/70 text-xs">Поставка</p>
              <p class="text-white text-xl font-bold">8 дн</p>
            </div>
          </div>
        </div>
      `;
    }

    // --- РЕНДЕР КАЛЬКУЛЯТОРА ---
    async function renderCalculator() {
      return `
        <div class="bg-white/10 backdrop-blur-md rounded-2xl p-5 shadow-lg">
          <h2 class="text-xl font-bold mb-4">🧮 Калькулятор стоимости</h2>
          <label class="text-white/70 text-sm">Ссылка на товар (необязательно)</label>
          <input type="text" id="calcUrl" class="w-full mt-1 p-3 rounded-xl bg-white/20 border border-white/30 mb-3" placeholder="https://poizon.com/...">
          <label class="text-white/70 text-sm block mt-2">Цена (¥)</label>
          <input type="number" id="calcPrice" class="w-full mt-1 p-3 rounded-xl bg-white/20 border border-white/30 mb-3" placeholder="Цена в юанях" value="520">
          <label class="text-white/70 text-sm block mt-2">Вес (кг)</label>
          <div class="flex items-center gap-3 mt-1">
            <input type="range" id="calcWeight" min="0.1" max="30" step="0.1" value="1" class="flex-1">
            <span id="weightVal" class="text-white/80 bg-white/10 px-3 py-1 rounded-full">1.0 кг</span>
          </div>
          <button id="calcBtn" class="mt-5 w-full bg-cyan-500 hover:bg-cyan-600 py-3 rounded-xl font-bold transition">Рассчитать</button>
          <div id="calcResult" class="mt-5 hidden bg-white/5 p-4 rounded-xl">
            <p class="text-white">Примерная стоимость: <span id="totalPrice" class="font-bold text-cyan-400">0</span> ❄️</p>
            <p class="text-white/70 text-xs mt-1">*Окончательная цена после взвешивания на складе</p>
            <button id="toNewOrderBtn" class="mt-3 w-full bg-blue-600 hover:bg-blue-700 py-2 rounded-xl">Перенести в заказ</button>
          </div>
        </div>
      `;
    }

    function attachCalculatorHandlers() {
      const slider = document.getElementById('calcWeight');
      const valSpan = document.getElementById('weightVal');
      if (slider) {
        slider.oninput = () => {
          valSpan.innerText = parseFloat(slider.value).toFixed(1) + ' кг';
        };
      }
      const calcBtn = document.getElementById('calcBtn');
      if (calcBtn) {
        calcBtn.onclick = () => {
          let price = parseFloat(document.getElementById('calcPrice')?.value || 520);
          let weight = parseFloat(slider?.value || 1);
          let total = (price * 0.45) + (weight * 12);
          document.getElementById('totalPrice').innerText = total.toFixed(2);
          document.getElementById('calcResult').classList.remove('hidden');
          window.tempOrder = {
            url: document.getElementById('calcUrl')?.value || '',
            price: price,
            weight: weight,
            total: total
          };
        };
      }
      const toNewOrderBtn = document.getElementById('toNewOrderBtn');
      if (toNewOrderBtn) {
        toNewOrderBtn.onclick = () => {
          if (window.tempOrder) {
            switchTab('neworder');
          } else {
            alert('Сначала рассчитайте стоимость');
          }
        };
      }
    }

    // --- РЕНДЕР НОВОГО ЗАКАЗА ---
    async function renderNewOrder() {
      const d = window.tempOrder || { url: '', price: 520, weight: 1, total: 0 };
      return `
        <div class="bg-white/10 backdrop-blur-md rounded-2xl p-5 shadow-lg">
          <h2 class="text-xl font-bold mb-4">✨ Новый заказ</h2>
          <label class="text-white/70 text-sm">Ссылка на товар</label>
          <input type="text" id="orderUrl" class="w-full mt-1 p-3 rounded-xl bg-white/20 border border-white/30 mb-3" value="${d.url}" placeholder="https://...">
          <label class="text-white/70 text-sm block mt-2">Цена (¥)</label>
          <input type="number" id="orderPrice" class="w-full mt-1 p-3 rounded-xl bg-white/20 border border-white/30 mb-3" value="${d.price}">
          <label class="text-white/70 text-sm block mt-2">Вес (кг)</label>
          <div class="flex items-center gap-3 mt-1">
            <input type="number" id="orderWeight" class="flex-1 p-3 rounded-xl bg-white/20 border border-white/30" value="${d.weight}" step="0.1">
            <span class="text-white/80 bg-white/10 px-3 py-1 rounded-full">кг</span>
          </div>
          <p class="mt-4 text-lg">Итого: <span id="orderTotal" class="font-bold text-cyan-400">${d.total}</span> ❄️</p>
          <p class="text-white/70 text-xs mt-1">*Предоплата 75%: <span id="prepaymentAmount" class="font-bold text-cyan-300">${(d.total * 0.75).toFixed(2)}</span> ❄️</p>
          <button id="createOrderFinal" class="mt-5 w-full bg-green-600 hover:bg-green-700 py-3 rounded-xl font-bold">Оформить заказ</button>
        </div>
      `;
    }

    function attachNewOrderHandlers() {
      const priceInp = document.getElementById('orderPrice');
      const weightInp = document.getElementById('orderWeight');
      const totalSpan = document.getElementById('orderTotal');
      const prepaymentSpan = document.getElementById('prepaymentAmount');
      const urlInp = document.getElementById('orderUrl');
      const update = () => {
        let price = parseFloat(priceInp?.value || 520);
        let weight = parseFloat(weightInp?.value || 1);
        let total = (price * 0.45) + (weight * 12);
        if (totalSpan) totalSpan.innerText = total.toFixed(2);
        if (prepaymentSpan) prepaymentSpan.innerText = (total * 0.75).toFixed(2);
        window.tempOrder = { url: urlInp?.value || '', price, weight, total };
      };
      if (priceInp) priceInp.addEventListener('input', update);
      if (weightInp) weightInp.addEventListener('input', update);
      const createBtn = document.getElementById('createOrderFinal');
      if (createBtn) {
        createBtn.onclick = async () => {
          if (!window.tempOrder || !userId) {
            alert('Ошибка: заполните все поля');
            return;
          }
          try {
            const { data, error } = await supabaseClient.from('orders').insert({
              user_id: userId,
              source_url: window.tempOrder.url,
              weight_estimated: window.tempOrder.weight,
              price_original: window.tempOrder.price,
              price_byn: window.tempOrder.price * 0.45,
              delivery_cost_estimated: window.tempOrder.weight * 12,
              prepayment_amount: window.tempOrder.total * 0.75,
              status: 'pending'
            }).select();
            if (error) throw error;
            alert(`Заказ создан! Номер: ${data[0].id}. Сумма предоплаты: ${(window.tempOrder.total * 0.75).toFixed(2)} ❄️`);
            window.tempOrder = null;
            switchTab('home');
          } catch (err) {
            alert('Ошибка: ' + err.message);
          }
        };
      }
    }

        // --- РЕНДЕР ПРОФИЛЯ ---
        async function renderProfile() {
      return `
        <div class="bg-white/10 backdrop-blur-md rounded-2xl p-5 text-center shadow-lg">
          <div class="avatar mx-auto w-24 h-24 text-4xl flex items-center justify-center bg-white/20 rounded-full mb-3">${userName.charAt(0)}</div>
          <h2 class="text-xl font-bold">${userName}</h2>
          <p class="text-white/70 mt-1">Баланс: <span class="text-cyan-400 font-bold">${balance} ❄️</span></p>
          <button id="myOrdersBtn" class="mt-5 bg-white/20 hover:bg-white/30 px-6 py-2 rounded-full transition">📋 Мои заказы</button>
          ${isOwner ? '<button id="adminPanelBtn" class="mt-3 bg-white/20 hover:bg-white/30 px-6 py-2 rounded-full transition">⚙️ Админ-панель</button>' : ''}
          <button id="logoutBtn" class="mt-4 w-full bg-red-500/20 hover:bg-red-500/30 py-2 rounded-full transition">Выйти из аккаунта</button>
        </div>
      `;
    }

    function attachProfileHandlers() {
      const myOrdersBtn = document.getElementById('myOrdersBtn');
      if (myOrdersBtn) {
        myOrdersBtn.onclick = () => {
          currentSubScreen = 'myOrders';
          renderCurrentScreen();
        };
      }
      const adminPanelBtn = document.getElementById('adminPanelBtn');
      if (adminPanelBtn) {
        adminPanelBtn.onclick = () => switchTab('admin');
      }
      const logoutBtn = document.getElementById('logoutBtn');
      if (logoutBtn) {
        logoutBtn.onclick = () => tg.close();
      }
    }

    // --- РЕНДЕР АДМИНКИ (только для владельцев) ---
    async function renderAdmin() {
      if (!isOwner) return '<p class="text-center mt-10 text-red-400">Доступ запрещён</p>';
      try {
        const { data, error } = await supabaseClient.from('orders').select('*').order('created_at', { ascending: false });
        if (error) throw error;
        if (!data || data.length === 0) return '<p class="text-center mt-10 text-white/70">Нет заказов</p>';
        return `
          <div class="space-y-3">
            ${data.map(order => `
              <div class="bg-white/10 backdrop-blur-md rounded-xl p-4 border border-white/10">
                <div class="flex justify-between items-start flex-wrap gap-2">
                  <div class="flex-1">
                    <p class="font-bold text-white">Заказ #${order.id.slice(0, 8)}</p>
                    <p class="text-white/70 text-xs">Пользователь: ${order.user_id}</p>
                    <p class="text-white/70 text-xs">Вес: ${order.weight_estimated} кг</p>
                    <p class="text-cyan-400 text-sm">${order.prepayment_amount} ❄️</p>
                    <div class="mt-2">
                      <label class="text-white/70 text-xs">Трек-номер:</label>
                      <input type="text" id="tracking_${order.id}" value="${order.tracking_number_cn || ''}" class="w-full mt-1 p-2 rounded-lg bg-white/20 text-white text-sm border border-white/30">
                    </div>
                    <div class="mt-2">
                      <label class="text-white/70 text-xs">Фотоотчёт:</label>
                      <input type="file" id="photo_${order.id}" class="w-full mt-1 text-sm text-white/70" accept="image/*">

    function attachAdminHandlers() {
      // Обновление статуса
      document.querySelectorAll('.update-status-btn').forEach(btn => {
        btn.onclick = async () => {
          const orderId = btn.getAttribute('data-order-id');
          const select = document.querySelector(`.status-select[data-order-id="${orderId}"]`);
          const newStatus = select.value;
          try {
            await supabaseClient.from('orders').update({ status: newStatus }).eq('id', orderId);
            alert('Статус заказа обновлён');
            renderCurrentScreen();
          } catch (err) {
            alert('Ошибка: ' + err.message);
          }
        };
      });
      // Сохранение трек-номера
      document.querySelectorAll('.update-tracking-btn').forEach(btn => {
        btn.onclick = async () => {
          const orderId = btn.getAttribute('data-order-id');
          const input = document.getElementById(`tracking_${orderId}`);
          try {
            await supabaseClient.from('orders').update({ tracking_number_cn: input?.value || '' }).eq('id', orderId);
            alert('Трек-номер сохранён');
            renderCurrentScreen();
          } catch (err) {
            alert('Ошибка: ' + err.message);
          }
        };
      });
      // Загрузка фото
      document.querySelectorAll('.upload-photo-btn').forEach(btn => {
        btn.onclick = async () => {
          const orderId = btn.getAttribute('data-order-id');
          const fileInput = document.getElementById(`photo_${orderId}`);
          const file = fileInput?.files[0];
          if (!file) {
            alert('Выберите файл');
            return;
          }
          const fileName = `${orderId}/${Date.now()}_${file.name}`;
          try {
            const { error: uploadError } = await supabaseClient.storage.from('order_photos').upload(fileName, file);
            if (uploadError) throw uploadError;
            const { data: urlData } = supabaseClient.storage.from('order_photos').getPublicUrl(fileName);
            const photoUrl = urlData.publicUrl;
            const { data: order } = await supabaseClient.from('orders').select('photo_reports').eq('id', orderId).single();
            const currentPhotos = order?.photo_reports || [];
            await supabaseClient.from('orders').update({ photo_reports: [...currentPhotos, photoUrl] }).eq('id', orderId);
            alert('Фото загружено');
            renderCurrentScreen();
          } catch (err) {
            alert('Ошибка загрузки фото: ' + err.message);
          }
        };
      });
    }

    function getStatusText(status) {
      const statuses = {
        'pending': 'Ожидает оплаты',
        'paid': 'Оплачен (75%)',
        'bought': 'Выкуплен',
        'on_sklad_cn': 'На складе в Китае',
        'in_transit': 'В пути',
        'in_belarus': 'В Беларуси',
        'delivered': 'Доставлен',
        'cancelled': 'Отменён'
      };
      return statuses[status] || status;
    }

    function getStatusClass(status) {
      const classes = {
        'pending': 'status-pending',
        'paid': 'status-paid',
        'bought': 'status-bought',
        'on_sklad_cn': 'status-on_sklad_cn',
        'in_transit': 'status-in_transit',
        'in_belarus': 'status-in_belarus',
        'delivered': 'status-delivered',
        'cancelled': 'status-cancelled'
      };
      return classes[status] || 'status-pending';
    }

    function ensureBackButton() {
      // Удаляем старую кнопку, если она есть, чтобы не было дублирования
      const oldBtn = document.getElementById('globalBackBtn');
      if (oldBtn) oldBtn.remove();
      
      // Показываем кнопку только если не на главной и не в подэкране каталогов (там своя навигация)
      if (currentTab !== 'home' && currentTab !== 'catalogs' && currentTab !== 'reports') {
        const contentDiv = document.getElementById('content');
        const btn = document.createElement('button');
        btn.id = 'globalBackBtn';
        btn.className = 'global-back-btn';
        btn.innerHTML = '← Назад';
        btn.onclick = () => {
          if (previousTab && previousTab !== currentTab) {
            switchTab(previousTab);
          } else if (currentTab !== 'home') {
            switchTab('home');
          } else {
            tg.close();
          }
        };
        if (contentDiv.firstChild && contentDiv.firstChild.id !== 'globalBackBtn') {
          contentDiv.insertBefore(btn, contentDiv.firstChild);
        } else if (contentDiv.firstChild) {
          contentDiv.insertBefore(btn, contentDiv.firstChild);
        } else {
          contentDiv.appendChild(btn);
        }
      }
    }

      await originalRender();
      // Для экранов, где нужна своя кнопка "Назад" (подэкран myOrders)
      if (currentSubScreen === 'myOrders') return;
      // Для каталогов и отчётов кнопка не нужна (там своя навигация)
      if (currentTab === 'catalogs' || currentTab === 'reports') return;
      ensureBackButton();
    };

    // Добавляем обработчик для экрана отчётов (если он не был добавлен ранее)
    const originalRenderCurrentScreen = renderCurrentScreen;
    window.renderCurrentScreen = renderCurrentScreen;

    // Запуск приложения
    init();
  </script>
</body>
