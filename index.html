<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ICE LOGIX - Тест</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-900 text-white">
  <div class="p-4">
    <h1 class="text-2xl font-bold">ICE LOGIX</h1>
    <p id="info" class="mt-2">Загрузка...</p>
    <button id="testBtn" class="mt-4 bg-cyan-500 px-4 py-2 rounded">Тест</button>
  </div>

  <script>
    const info = document.getElementById('info');
    const testBtn = document.getElementById('testBtn');
    
    info.innerText = 'Скрипт загружен. Telegram WebApp: ' + (window.Telegram ? 'есть' : 'нет');
    
    testBtn.onclick = () => {
      alert('Кнопка работает!');
    };
  </script>
</body>
</html>
