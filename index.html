<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>ICE LOGIX</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    body { background: #0F172A; }
    .status-badge { padding: 4px 8px; border-radius: 20px; font-size: 12px; font-weight: bold; }
    .status-pending { background: #f59e0b; color: #000; }
    .status-paid { background: #10b981; color: #fff; }
    .status-shipped { background: #3b82f6; color: #fff; }
    .status-delivered { background: #8b5cf6; color: #fff; }
    .status-cancelled { background: #ef4444; color: #fff; }
    .marketplace-card { transition: transform 0.2s; cursor: pointer; }
    .marketplace-card:hover { transform: translateY(-4px); }
    .tab-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255,255,255,0.1);
      display: flex;
      justify-content: space-around;
      padding: 8px 12px 12px;
      z-index: 100;
    }
    .tab-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: #8e9aaf;
      cursor: pointer;
    }
    .tab-item.active { color: #00c2ff; }
    .tab-icon { font-size: 22px; }
    .tab-label { font-size: 10px; font-weight: bold; }
    .tab-item.new-order {
      background: linear-gradient(135deg, #007aff, #00c2ff);
      color: white;
      padding: 6px 12px;
      border-radius: 30px;
      margin-top: -8px;
    }
    .app-header {
      position: sticky;
      top: 0;
      z-index: 90;
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(20px);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .back-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; display: none; }
    .logo-img { height: 32px; cursor: pointer; }
    .balance { background: rgba(0,194,255,0.15); padding: 4px 8px; border-radius: 20px; font-size: 14px; font-weight: bold; display: flex; align-items: center; gap: 6px; }
    .balance-add { background: none; border: none; color: #00c2ff; font-size: 16px; cursor: pointer; }
    .icon-btn { background: none; border: none; color: white; font-size: 20px; cursor: pointer; }
    .avatar { width: 36px; height: 36px; border-radius: 50%; background: #2d3748; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .user-info { display: flex; flex-direction: column; align-items: flex-end; }
    .user-name { font-size: 12px; font-weight: bold; }
    .main-content { padding: 16px; padding-bottom: 80px; }
    .catalog-tabs { display: flex; gap: 12px; margin-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 8px; }
    .catalog-tab { font-size: 16px; font-weight: bold; color: #8e9aaf; cursor: pointer; padding: 4px 0; }
    .catalog-tab.active { color: #00c2ff; border-bottom: 2px solid #00c2ff; }
  </style>
</head>
<body>
  <div id="app">
    <div class="app-header">
      <div class="header-left">
        <button class="back-btn" id="backBtn">←</button>
        <img id="logoImg" class="logo-img" src="https://i.ibb.co/9kJTjpjT/1-Logo.png" alt="ICE LOGIX">
      </div>
      <div class="header-right">
        <div class="balance"><span id="headerBalance">0 ❄️</span><button class="balance-add" id="addBalanceBtn">+</button></div>
        <button class="icon-btn" id="notificationsBtn">🔔</button>
        <div class="user-info"><div class="avatar" id="avatar"></div><span class="user-name" id="userNameHeader">Гость</span></div>
      </div>
    </div>
    <div id="content" class="main-content"><div class="text-center py-10">Загрузка...</div></div>
    <div class="tab-bar" id="tabBar">
      <div class="tab-item" data-tab="home"><span class="tab-icon">🏠</span><span class="tab-label">Главная</span></div>
      <div class="tab-item" data-tab="calculator"><span class="tab-icon">🧮</span><span class="tab-label">Калькулятор</span></div>
      <div class="tab-item new-order" data-tab="neworder"><span class="tab-icon">✨</span><span class="tab-label">Новый заказ</span></div>
      <div class="tab-item" data-tab="catalogs"><span class="tab-icon">📚</span><span class="tab-label">Каталоги</span></div>
      <div class="tab-item" data-tab="profile"><span class="tab-icon">👤</span><span class="tab-label">Профиль</span></div>
    </div>
  </div>
  <script>
    let tg = null, userId = null, userName = 'Гость', userAvatarUrl = null, isOwner = false, supabaseClient = null;
    let currentTab = 'home', previousTab = null, currentSubScreen = null;
    let marketplaceFilters = { country: 'all', type: 'all', category: 'all', gender: 'all' };
    let balance = 0;

    function init() {
      tg = window.Telegram.WebApp;
      tg.ready();
      tg.expand();
      const user = tg.initDataUnsafe?.user;
      userId = user ? user.id : null;
      userName = user ? (user.first_name || user.username) : 'Гость';
      userAvatarUrl = user?.photo_url || null;
      const SUPABASE_URL = 'https://vrvwdagjpttvfvjanbwq.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZydndkYWdqcHR0dmZ2amFuYndxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NTc4MzgsImV4cCI6MjA5MTIzMzgzOH0.P9GQSW6NLN1BhR66PX-LP4ysZBXFeWIXRYIRvhRjo1c';
      supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      loadUserData();
      attachEventListeners();
      document.getElementById('userNameHeader').innerText = userName;
      const avatarDiv = document.getElementById('avatar');
      avatarDiv.innerHTML = userAvatarUrl ? `<img src="${userAvatarUrl}">` : userName.charAt(0).toUpperCase();
      document.getElementById('logoImg').onclick = () => switchTab('home');
      switchTab('home');
    }

    async function loadUserData() {
      if (!userId) return;
      const { data, error } = await supabaseClient.from('users').select('role, ices_balance').eq('user_id', userId).maybeSingle();
      if (!error && data) {
        isOwner = (data.role === 'owner');
        balance = data.ices_balance || 0;
        document.getElementById('headerBalance').innerText = balance + ' ❄️';
      }
    }

    function attachEventListeners() {
      document.getElementById('backBtn').onclick = () => { if (previousTab) switchTab(previousTab); else if (currentTab !== 'home') switchTab('home'); else tg.close(); };
      document.getElementById('addBalanceBtn').onclick = () => alert('Пополнение баланса будет позже');
      document.querySelectorAll('.tab-item').forEach(tab => {
        tab.onclick = () => {
          const tabName = tab.getAttribute('data-tab');
          if (tabName === 'catalogs') { currentSubScreen = 'catalogs'; renderCurrentScreen(); }
          else { currentSubScreen = null; switchTab(tabName); }
        };
      });
    }

    function switchTab(tabName) {
      if (currentTab && currentTab !== tabName) previousTab = currentTab;
      currentTab = tabName;
      currentSubScreen = null;
      document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
      const activeTab = document.querySelector(`.tab-item[data-tab="${tabName}"]`);
      if (activeTab) activeTab.classList.add('active');
      document.getElementById('backBtn').style.display = (tabName === 'home') ? 'none' : 'block';
      renderCurrentScreen();
    }

    async function renderCurrentScreen() {
      const contentDiv = document.getElementById('content');
      if (currentSubScreen === 'catalogs') { contentDiv.innerHTML = await renderCatalogsContent(); attachCatalogsHandlers(); return; }
      if (currentTab === 'home') contentDiv.innerHTML = await renderHome();
      else if (currentTab === 'calculator') contentDiv.innerHTML = await renderCalculator();
      else if (currentTab === 'neworder') contentDiv.innerHTML = await renderNewOrder();
      else if (currentTab === 'catalogs') { contentDiv.innerHTML = await renderCatalogsContent(); attachCatalogsHandlers(); return; }
      else if (currentTab === 'profile') contentDiv.innerHTML = await renderProfile();
      else contentDiv.innerHTML = '<div class="text-center py-10">Страница не найдена</div>';
      if (currentTab === 'calculator') attachCalculatorHandlers();
      if (currentTab === 'neworder') attachNewOrderHandlers();
      if (currentTab === 'profile') attachProfileHandlers();
    }

    async function renderHome() { return `<div class="bg-white/10 backdrop-blur-md rounded-2xl p-4 text-center"><h1 class="text-2xl font-bold">Добро пожаловать, ${userName}!</h1><p class="text-white/70 mt-2">Баланс: <span class="text-cyan-400 font-bold">${balance} ❄️</span></p></div>`; }
    async function renderCalculator() { return `<div class="bg-white/10 backdrop-blur-md rounded-xl p-4"><h2 class="text-lg font-bold mb-3">🧮 Калькулятор</h2><input type="text" id="calcUrl" class="w-full p-2 rounded bg-white/20 mb-2" placeholder="Ссылка"><input type="number" id="calcPrice" class="w-full p-2 rounded bg-white/20 mb-2" placeholder="Цена ¥" value="520"><input type="range" id="calcWeight" min="0.1" max="30" step="0.1" value="1" class="w-full"><span id="weightVal">1.0 кг</span><button id="calcBtn" class="mt-4 w-full bg-cyan-500 py-2 rounded">Рассчитать</button><div id="calcResult" class="mt-4 hidden"><p>Итого: <span id="totalPrice">0</span> ❄️</p><button id="toNewOrderBtn" class="w-full bg-blue-600 py-2 rounded mt-2">Перенести в заказ</button></div></div>`; }
    async function renderNewOrder() { const d = window.tempOrder || { url: '', price: 520, weight: 1, total: 0 }; return `<div class="bg-white/10 backdrop-blur-md rounded-xl p-4"><h2 class="text-lg font-bold mb-3">✨ Новый заказ</h2><input type="text" id="orderUrl" class="w-full p-2 rounded bg-white/20 mb-2" value="${d.url}" placeholder="Ссылка"><input type="number" id="orderPrice" class="w-full p-2 rounded bg-white/20 mb-2" value="${d.price}"><input type="number" id="orderWeight" class="w-full p-2 rounded bg-white/20 mb-2" value="${d.weight}" step="0.1"><p>Итого: <span id="orderTotal">${d.total}</span> ❄️</p><button id="createOrderFinal" class="mt-4 w-full bg-green-600 py-2 rounded">Оформить заказ (75%)</button></div>`; }
    async function renderProfile() { return `<div class="bg-white/10 backdrop-blur-md rounded-2xl p-4 text-center"><div class="avatar mx-auto w-20 h-20 text-3xl flex items-center justify-center bg-white/20 rounded-full mb-2">${userName.charAt(0)}</div><h2 class="text-xl font-bold">${userName}</h2><p class="text-white/70">Баланс: <span class="text-cyan-400 font-bold">${balance} ❄️</span></p><button id="myOrdersBtn" class="mt-2 bg-white/20 px-4 py-2 rounded-lg">Мои заказы</button><button id="logoutBtn" class="mt-4 w-full bg-red-500/20 py-2 rounded-lg">Выйти</button></div>`; }

    function attachCalculatorHandlers() {
      const slider = document.getElementById('calcWeight'), valSpan = document.getElementById('weightVal');
      if (slider) slider.oninput = () => valSpan.innerText = parseFloat(slider.value).toFixed(1) + ' кг';
      document.getElementById('calcBtn').onclick = () => {
        let price = parseFloat(document.getElementById('calcPrice')?.value || 520);
        let weight = parseFloat(slider?.value || 1);
        let total = (price * 0.45) + (weight * 12);
        document.getElementById('totalPrice').innerText = total.toFixed(2);
        document.getElementById('calcResult').classList.remove('hidden');
        window.tempOrder = { url: document.getElementById('calcUrl')?.value || '', price, weight, total };
      };
      document.getElementById('toNewOrderBtn').onclick = () => { if (window.tempOrder) switchTab('neworder'); else alert('Сначала рассчитайте'); };
    }
    function attachNewOrderHandlers() {
      const priceInp = document.getElementById('orderPrice'), weightInp = document.getElementById('orderWeight'), totalSpan = document.getElementById('orderTotal');
      const update = () => { let price = parseFloat(priceInp?.value || 520), weight = parseFloat(weightInp?.value || 1), total = (price * 0.45) + (weight * 12); totalSpan.innerText = total.toFixed(2); window.tempOrder = { url: document.getElementById('orderUrl')?.value || '', price, weight, total }; };
      priceInp?.addEventListener('input', update); weightInp?.addEventListener('input', update);
      document.getElementById('createOrderFinal').onclick = async () => {
        if (!window.tempOrder || !userId) return alert('Ошибка');
        const { data, error } = await supabaseClient.from('orders').insert({ user_id: userId, source_url: window.tempOrder.url, weight_estimated: window.tempOrder.weight, price_original: window.tempOrder.price, price_byn: window.tempOrder.price * 0.45, delivery_cost_estimated: window.tempOrder.weight * 12, prepayment_amount: window.tempOrder.total * 0.75, status: 'pending' }).select();
        if (error) return alert('Ошибка: ' + error.message);
        alert(`Заказ создан! Номер: ${data[0].id}`);
        switchTab('home');
      };
    }
    function attachProfileHandlers() {
      document.getElementById('myOrdersBtn').onclick = () => alert('Список заказов будет позже');
      document.getElementById('logoutBtn').onclick = () => tg.close();
    }

    async function renderCatalogsContent() { return `<div><div class="catalog-tabs"><div class="catalog-tab active" data-catalog="marketplaces">Площадки</div><div class="catalog-tab" data-catalog="products">Товары</div></div><div id="catalogContent">${await renderMarketplaces()}</div></div>`; }
    function attachCatalogsHandlers() {
      document.querySelectorAll('.catalog-tab').forEach(tab => {
        tab.onclick = async () => {
          document.querySelectorAll('.catalog-tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          const type = tab.getAttribute('data-catalog');
          const container = document.getElementById('catalogContent');
          if (type === 'marketplaces') container.innerHTML = await renderMarketplaces();
          else container.innerHTML = '<p class="text-center mt-10">Каталог товаров в разработке</p>';
          if (type === 'marketplaces') attachMarketplacesHandlers();
        };
      });
      attachMarketplacesHandlers();
    }
    async function renderMarketplaces() {
      try {
        let query = supabaseClient.from('marketplaces').select('*').eq('is_active', true);
        if (marketplaceFilters.country && marketplaceFilters.country !== 'all') query = query.eq('country', marketplaceFilters.country);
        const { data, error } = await query.order('sort_order', { ascending: true });
        if (error || !data?.length) return '<p class="text-center mt-10">Каталог пуст</p>';
        const countries = [...new Set(data.map(m => m.country).filter(Boolean))];
        return `<div class="mb-4 flex gap-2"><button class="filter-country active bg-cyan-500 px-3 py-1 rounded-full" data-country="all">Все</button>${countries.map(c => `<button class="filter-country bg-white/20 px-3 py-1 rounded-full" data-country="${c}">${c}</button>`).join('')}<button id="openFilterModalBtn" class="bg-white/20 px-3 py-1 rounded-full">🔍 Фильтр</button></div><div class="grid grid-cols-2 gap-4">${data.map(mp => `<div class="marketplace-card bg-white/10 rounded-xl overflow-hidden" data-country="${mp.country || ''}"><div class="aspect-square bg-white/20 flex items-center justify-center p-2">${mp.logo_url ? `<img src="${mp.logo_url}" class="w-full h-full object-contain">` : '🛍️'}</div><div class="p-3"><h3 class="font-bold">${mp.name}</h3><p class="text-white/70 text-xs">${mp.country || ''}</p><div class="flex justify-between mt-2"><a href="${mp.website_url}" target="_blank" class="text-cyan-400 text-sm underline">Перейти</a><button class="detail-btn bg-white/20 rounded-full w-8 h-8" data-name="${mp.name.replace(/"/g, '&quot;')}" data-desc="${(mp.description || '').replace(/"/g, '&quot;')}">ℹ️</button></div></div></div>`).join('')}</div>`;
      } catch(e) { return '<p class="text-center mt-10 text-red-400">Ошибка загрузки</p>'; }
    }
    function attachMarketplacesHandlers() {
      document.querySelectorAll('.filter-country').forEach(btn => {
        btn.onclick = () => { const country = btn.getAttribute('data-country'); document.querySelectorAll('.filter-country').forEach(b => b.classList.remove('active', 'bg-cyan-500')); btn.classList.add('active', 'bg-cyan-500'); document.querySelectorAll('.marketplace-card').forEach(card => { if (country === 'all' || card.getAttribute('data-country') === country) card.style.display = ''; else card.style.display = 'none'; }); marketplaceFilters.country = country === 'all' ? null : country; };
      });
      document.getElementById('openFilterModalBtn')?.addEventListener('click', () => alert('Расширенный фильтр будет позже'));
      document.querySelectorAll('.detail-btn').forEach(btn => btn.onclick = () => alert(btn.getAttribute('data-desc') || 'Нет описания'));
    }
    init();
  </script>
</body>
</html>
