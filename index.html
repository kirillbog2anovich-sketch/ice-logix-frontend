<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>ICE LOGIX</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    body { background: #0F172A; }
    .status-badge { padding: 4px 8px; border-radius: 20px; font-size: 12px; font-weight: bold; }
    .status-pending { background: #f59e0b; color: #000; }
    .status-paid { background: #10b981; color: #fff; }
    .status-shipped { background: #3b82f6; color: #fff; }
    .status-delivered { background: #8b5cf6; color: #fff; }
    .status-cancelled { background: #ef4444; color: #fff; }
    .marketplace-card { transition: transform 0.2s, box-shadow 0.2s; }
    .marketplace-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -12px rgba(0,0,0,0.3); }
    .tab-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255,255,255,0.1);
      display: flex;
      justify-content: space-around;
      padding: 8px 16px 12px;
      z-index: 100;
    }
    .tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #8e9aaf; transition: color 0.2s; cursor: pointer; }
    .tab-item.active { color: #00c2ff; }
    .tab-icon { font-size: 20px; }
    .tab-label { font-size: 10px; font-weight: bold; }
    .app-header {
      position: sticky;
      top: 0;
      z-index: 90;
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(20px);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .back-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; display: none; }
    .logo { font-weight: bold; font-size: 18px; background: linear-gradient(135deg, #fff, #00c2ff); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .balance { background: rgba(0,194,255,0.2); padding: 4px 8px; border-radius: 20px; font-size: 14px; font-weight: bold; }
    .icon-btn { background: none; border: none; color: white; font-size: 20px; cursor: pointer; }
    .avatar { width: 32px; height: 32px; border-radius: 50%; background: #2d3748; display: flex; align-items: center; justify-content: center; font-weight: bold; }
    .main-content { padding: 16px; padding-bottom: 80px; }
  </style>
</head>
<body class="text-white">
  <div id="app">
    <div class="app-header">
      <div class="header-left">
        <button class="back-btn" id="backBtn">←</button>
        <div class="logo">ICE LOGIX</div>
      </div>
      <div class="header-right">
        <span class="balance" id="headerBalance">0 ❄️</span>
        <button class="icon-btn" id="notificationsBtn">🔔</button>
        <button class="icon-btn" id="settingsBtn">⚙️</button>
        <div class="avatar" id="avatar">U</div>
      </div>
    </div>
    <div id="content" class="main-content"><div class="text-center py-10">Загрузка...</div></div>
    <div class="tab-bar" id="tabBar">
      <div class="tab-item" data-tab="home"><span class="tab-icon">🏠</span><span class="tab-label">Главная</span></div>
      <div class="tab-item" data-tab="marketplaces"><span class="tab-icon">🌍</span><span class="tab-label">Каталог</span></div>
      <div class="tab-item" data-tab="orders"><span class="tab-icon">📦</span><span class="tab-label">Заказы</span></div>
      <div class="tab-item" data-tab="profile"><span class="tab-icon">👤</span><span class="tab-label">Профиль</span></div>
    </div>
  </div>
  <script>
    // --- Глобальные переменные (без повторного объявления supabase) ---
    let tg = null;
    let userId = null;
    let userName = 'Гость';
    let isOwner = false;
    let supabaseClient = null;   // переименовано, чтобы избежать конфликта
    let currentTab = 'home';
    let currentSubScreen = null;
    let marketplaceFilters = { country: 'all', type: 'all', category: 'all', gender: 'all' };
    let balance = 0;

    function init() {
      tg = window.Telegram.WebApp;
      tg.ready();
      tg.expand();
      const user = tg.initDataUnsafe?.user;
      userId = user ? user.id : null;
      userName = user ? (user.first_name || user.username) : 'Гость';
      const SUPABASE_URL = 'https://jpcupwexczdgaikpktui.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpwY3Vwd2V4Y3pkZ2Fpa3BrdHVpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMTE0NDYsImV4cCI6MjA5MDg4NzQ0Nn0.M1yQjOZFY5Gnr7jTxAgnnPJ2Lpaz8wZOajqFmY0xOaU';
      supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      loadUserData();
      attachEventListeners();
    }

    async function loadUserData() {
      if (!userId) return;
      const { data, error } = await supabaseClient.from('users').select('role, ices_balance').eq('user_id', userId).maybeSingle();
      if (!error && data) {
        isOwner = (data.role === 'owner');
        balance = data.ices_balance || 0;
        document.getElementById('headerBalance').innerText = balance + ' ❄️';
        document.getElementById('avatar').innerText = userName.charAt(0).toUpperCase();
        const tabBar = document.getElementById('tabBar');
        const adminTab = tabBar.querySelector('[data-tab="admin"]');
        if (isOwner && !adminTab) {
          const newAdminTab = document.createElement('div');
          newAdminTab.className = 'tab-item';
          newAdminTab.setAttribute('data-tab', 'admin');
          newAdminTab.innerHTML = '<span class="tab-icon">⚙️</span><span class="tab-label">Админка</span>';
          tabBar.appendChild(newAdminTab);
          newAdminTab.addEventListener('click', () => switchTab('admin'));
        } else if (!isOwner && adminTab) adminTab.remove();
      }
    }

    function attachEventListeners() {
      document.getElementById('backBtn').addEventListener('click', () => {
        if (currentSubScreen) { currentSubScreen = null; switchTab(currentTab, true); }
        else { tg.close(); }
      });
      document.getElementById('notificationsBtn').addEventListener('click', () => alert('Уведомления пока не реализованы'));
      document.getElementById('settingsBtn').addEventListener('click', () => alert('Настройки будут позже'));
      document.querySelectorAll('.tab-item').forEach(tab => {
        tab.addEventListener('click', () => { switchTab(tab.getAttribute('data-tab')); });
      });
    }

    function switchTab(tabName, keepSub = false) {
      if (!keepSub) currentSubScreen = null;
      currentTab = tabName;
      document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
      const activeTab = document.querySelector(`.tab-item[data-tab="${tabName}"]`);
      if (activeTab) activeTab.classList.add('active');
      const backBtn = document.getElementById('backBtn');
      backBtn.style.display = (tabName === 'home') ? 'none' : 'block';
      renderCurrentScreen();
    }

    async function renderCurrentScreen() {
      const contentDiv = document.getElementById('content');
      if (currentSubScreen) { contentDiv.innerHTML = '<div class="text-center py-10">Детали...</div>'; return; }
      if (currentTab === 'home') { contentDiv.innerHTML = await renderHome(); attachHomeHandlers(); }
      else if (currentTab === 'marketplaces') { contentDiv.innerHTML = await renderMarketplaces(); attachMarketplacesHandlers(); }
      else if (currentTab === 'orders') { contentDiv.innerHTML = await renderOrders(); attachOrdersHandlers(); }
      else if (currentTab === 'profile') { contentDiv.innerHTML = await renderProfile(); attachProfileHandlers(); }
      else if (currentTab === 'admin' && isOwner) { contentDiv.innerHTML = await renderAdmin(); attachAdminHandlers(); }
      else contentDiv.innerHTML = '<div class="text-center py-10">Страница не найдена</div>';
    }

    // ==================== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ====================
    async function loadBalance() {
      if (!userId) return 0;
      try {
        const { data, error } = await supabaseClient.from('users').select('ices_balance').eq('user_id', userId).maybeSingle();
        if (error) throw error;
        return data ? data.ices_balance : 0;
      } catch (err) { return 0; }
    }

    function getStatusText(status) {
      const statuses = {
        'pending': 'Ожидает оплаты', 'paid': 'Оплачен (75%)', 'bought': 'Выкуплен',
        'on_sklad_cn': 'На складе в Китае', 'in_transit': 'В пути', 'in_belarus': 'В Беларуси',
        'delivered': 'Доставлен', 'cancelled': 'Отменён'
      };
      return statuses[status] || status;
    }

    function getStatusClass(status) {
      const classes = {
        'pending': 'status-pending', 'paid': 'status-paid', 'bought': 'status-paid',
        'on_sklad_cn': 'status-paid', 'in_transit': 'status-shipped', 'in_belarus': 'status-shipped',
        'delivered': 'status-delivered', 'cancelled': 'status-cancelled'
      };
      return classes[status] || 'status-pending';
    }

    async function uploadPhoto(orderId, file) {
      const fileName = `${orderId}/${Date.now()}_${file.name}`;
      const { error } = await supabaseClient.storage.from('order_photos').upload(fileName, file);
      if (error) throw error;
      const { data: urlData } = supabaseClient.storage.from('order_photos').getPublicUrl(fileName);
      return urlData.publicUrl;
    }

    async function addPhotoToOrder(orderId, photoUrl) {
      const { data: order } = await supabaseClient.from('orders').select('photo_reports').eq('id', orderId).single();
      const currentPhotos = order?.photo_reports || [];
      await supabaseClient.from('orders').update({ photo_reports: [...currentPhotos, photoUrl] }).eq('id', orderId);
    }

    // ==================== ГЛАВНАЯ СТРАНИЦА ====================
    async function renderHome() {
      const balance = await loadBalance();
      return `
        <div class="space-y-4">
          <div class="bg-white/10 backdrop-blur-md rounded-2xl p-4">
            <div class="flex justify-between items-center">
              <div><p class="text-sm text-white/70">Привет,</p><h1 class="text-xl font-bold">${userName}</h1></div>
              <div class="text-right"><p class="text-sm text-white/70">Баланс</p><p class="text-xl font-bold text-cyan-400">${balance} ❄️</p></div>
            </div>
          </div>
          <div>
            <h2 class="text-white text-lg font-bold mb-2">❄️ Находки дня</h2>
            <div class="flex gap-3 overflow-x-auto pb-2">
              <div class="bg-white/10 backdrop-blur-md rounded-xl p-3 w-40 shrink-0"><div class="w-full h-32 bg-slate-700 rounded-lg"></div><p class="text-white font-bold mt-2">Nike Dunk Low</p><p class="text-cyan-400 text-sm">520 ❄️</p><button class="mt-2 w-full bg-cyan-500 text-white py-1 rounded-lg text-sm">Хочу!</button></div>
              <div class="bg-white/10 backdrop-blur-md rounded-xl p-3 w-40 shrink-0"><div class="w-full h-32 bg-slate-700 rounded-lg"></div><p class="text-white font-bold mt-2">Jordan 1 Retro</p><p class="text-cyan-400 text-sm">780 ❄️</p><button class="mt-2 w-full bg-cyan-500 text-white py-1 rounded-lg text-sm">Хочу!</button></div>
            </div>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div class="bg-white/10 backdrop-blur-md rounded-xl p-3"><p class="text-white/70 text-xs">Курс ¥</p><p class="text-white text-xl font-bold">0.45 BYN</p></div>
            <div class="bg-white/10 backdrop-blur-md rounded-xl p-3"><p class="text-white/70 text-xs">Поставка</p><p class="text-white text-xl font-bold">8 дн</p></div>
          </div>
          <div class="bg-white/10 backdrop-blur-md rounded-xl p-4">
            <h2 class="text-white text-lg font-bold mb-3">🧮 Калькулятор стоимости</h2>
            <label class="text-white/70 text-sm">Ссылка на товар (необязательно)</label>
            <input type="text" id="productUrl" class="w-full mt-1 p-2 rounded-lg bg-white/20 text-white border border-white/30" placeholder="https://poizon.com/...">
            <label class="text-white/70 text-sm block mt-3">Цена (¥)</label>
            <input type="text" id="productPrice" class="w-full mt-1 p-2 rounded-lg bg-white/20 text-white border border-white/30" placeholder="0" value="520">
            <label class="text-white/70 text-sm block mt-3">Вес (кг)</label>
            <input type="range" id="weightSlider" min="0.1" max="30" step="0.1" value="1" class="w-full mt-1">
            <div class="flex justify-between text-white/70 text-sm mt-1"><span>0.1 кг</span><span id="weightValue">1.0 кг</span><span>30 кг</span></div>
            <button id="calcBtn" class="mt-4 w-full bg-cyan-500 text-white py-2 rounded-lg">Рассчитать</button>
            <div id="calcResult" class="mt-4 hidden">
              <p class="text-white">Примерная стоимость: <span id="totalPrice" class="font-bold text-cyan-400">0</span> ❄️</p>
              <p class="text-white/70 text-xs mt-1">*Окончательная цена после взвешивания на складе</p>
              <button id="createOrderBtn" class="mt-3 w-full bg-blue-600 text-white py-2 rounded-lg">Оформить заказ (75% предоплата)</button>
            </div>
          </div>
        </div>
      `;
    }

    function attachHomeHandlers() {
      const weightSlider = document.getElementById('weightSlider');
      const weightValue = document.getElementById('weightValue');
      const calcBtn = document.getElementById('calcBtn');
      const productUrl = document.getElementById('productUrl');
      const productPrice = document.getElementById('productPrice');
      const calcResult = document.getElementById('calcResult');
      const totalPriceSpan = document.getElementById('totalPrice');
      const createOrderBtn = document.getElementById('createOrderBtn');
      if (weightSlider && weightValue) {
        weightSlider.addEventListener('input', () => weightValue.innerText = parseFloat(weightSlider.value).toFixed(1) + ' кг');
      }
      if (calcBtn) {
        calcBtn.addEventListener('click', () => {
          let priceCNY = parseFloat(productPrice?.value || '520');
          const weight = parseFloat(weightSlider?.value || 1);
          const total = (priceCNY * 0.45) + (weight * 12);
          if (totalPriceSpan) totalPriceSpan.innerText = total.toFixed(2);
          if (calcResult) calcResult.classList.remove('hidden');
          window.tempOrder = { url: productUrl?.value || '', priceCNY, weight, total };
          alert('Расчёт выполнен');
        });
      }
      if (createOrderBtn) {
        createOrderBtn.addEventListener('click', async () => {
          if (!window.tempOrder) { alert('Сначала рассчитайте стоимость'); return; }
          const { url, priceCNY, weight, total } = window.tempOrder;
          if (!userId) { alert('Ошибка авторизации'); return; }
          try {
            const { data, error } = await supabaseClient.from('orders').insert({
              user_id: userId, source_url: url, weight_estimated: weight,
              price_original: priceCNY, price_byn: priceCNY * 0.45,
              delivery_cost_estimated: weight * 12, prepayment_amount: total * 0.75, status: 'pending'
            }).select();
            if (error) throw error;
            alert(`Заказ создан! Номер: ${data[0].id}. Сумма: ${(total * 0.75).toFixed(2)} ❄️`);
            if (productUrl) productUrl.value = '';
            if (productPrice) productPrice.value = '520';
            if (weightSlider) weightSlider.value = 1;
            if (weightValue) weightValue.innerText = '1.0 кг';
            if (calcResult) calcResult.classList.add('hidden');
            window.tempOrder = null;
          } catch (err) { alert('Ошибка: ' + err.message); }
        });
      }
    }

    // ==================== КАТАЛОГ ПЛОЩАДОК ====================
    async function renderMarketplaces() {
      try {
        let query = supabaseClient.from('marketplaces').select('*').eq('is_active', true);
        if (marketplaceFilters.country && marketplaceFilters.country !== 'all') query = query.eq('country', marketplaceFilters.country);
        if (marketplaceFilters.type && marketplaceFilters.type !== 'all') query = query.eq('type', marketplaceFilters.type);
        const { data: marketplaces, error } = await query.order('sort_order', { ascending: true, nullsFirst: false });
        if (error) throw error;
        if (!marketplaces || marketplaces.length === 0) return '<p class="text-center mt-10 text-white/70">Каталог пока пуст. Скоро добавим площадки.</p>';
        const countries = [...new Set(marketplaces.map(m => m.country).filter(Boolean))];
        return `
          <div class="mb-4 flex flex-wrap items-center justify-between gap-2">
            <div class="flex gap-2 overflow-x-auto pb-1">
              <button class="filter-country active bg-cyan-500 text-white px-3 py-1 rounded-full text-sm" data-country="all">Все</button>
              ${countries.map(c => `<button class="filter-country bg-white/20 hover:bg-white/30 px-3 py-1 rounded-full text-sm" data-country="${c}">${c}</button>`).join('')}
            </div>
            <button id="openFilterModalBtn" class="bg-white/20 hover:bg-white/30 px-3 py-1 rounded-full text-sm flex items-center gap-1">🔍 Фильтр</button>
          </div>
          <div class="grid grid-cols-2 gap-4" id="marketplaces-grid">
            ${marketplaces.map(mp => `
              <div class="marketplace-card bg-white/10 backdrop-blur-md rounded-xl overflow-hidden" data-country="${mp.country || ''}" data-type="${mp.type || ''}">
                <div class="aspect-square bg-white/20 flex items-center justify-center p-2">
                  ${mp.logo_url ? `<img src="${mp.logo_url}" class="w-full h-full object-contain" alt="${mp.name}">` : `<div class="text-4xl">🛍️</div>`}
                </div>
                <div class="p-3">
                  <h3 class="font-bold text-white truncate">${mp.name}</h3>
                  <p class="text-white/70 text-xs mt-1">${mp.country || ''} · ${mp.type === 'brand' ? 'Бренд' : mp.type === 'marketplace' ? 'Маркетплейс' : 'Специальный'}</p>
                  <p class="text-white/80 text-xs mt-2 line-clamp-2">${(mp.description || 'Описание отсутствует').substring(0, 80)}${(mp.description || '').length > 80 ? '…' : ''}</p>
                  <div class="flex justify-between items-center mt-3">
                    <a href="${mp.website_url}" target="_blank" class="text-cyan-400 text-sm underline">Перейти</a>
                    <button class="detail-btn bg-white/20 rounded-full w-8 h-8 flex items-center justify-center" data-name="${mp.name.replace(/"/g, '&quot;')}" data-description="${(mp.description || '').replace(/"/g, '&quot;')}" data-delivery="${(mp.delivery_info || '').replace(/"/g, '&quot;')}" data-payment="${(mp.payment_methods || '').replace(/"/g, '&quot;')}" data-instruction="${(mp.full_instruction || mp.instruction_text || '').replace(/"/g, '&quot;')}">ℹ️</button>
                  </div>
                </div>
              </div>
            `).join('')}
          </div>
        `;
      } catch (err) { return '<p class="text-center mt-10 text-red-400">Ошибка загрузки каталога</p>'; }
    }

    function attachMarketplacesHandlers() {
      const filterBtns = document.querySelectorAll('.filter-country');
      const cards = document.querySelectorAll('.marketplace-card');
      filterBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          const country = btn.getAttribute('data-country');
          filterBtns.forEach(b => b.classList.remove('active', 'bg-cyan-500', 'text-white'));
          btn.classList.add('active', 'bg-cyan-500', 'text-white');
          cards.forEach(card => {
            if (country === 'all' || card.getAttribute('data-country') === country) card.style.display = '';
            else card.style.display = 'none';
          });
          marketplaceFilters.country = country === 'all' ? null : country;
        });
      });
      document.getElementById('openFilterModalBtn')?.addEventListener('click', showFilterModal);
      document.querySelectorAll('.detail-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          showDetailModal(btn.getAttribute('data-name'), btn.getAttribute('data-description'), btn.getAttribute('data-delivery'), btn.getAttribute('data-payment'), btn.getAttribute('data-instruction'));
        });
      });
    }

    function showDetailModal(name, description, delivery, payment, instruction) {
      const modal = document.createElement('div');
      modal.className = 'fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4';
      modal.innerHTML = `
        <div class="bg-white/10 backdrop-blur-md rounded-2xl max-w-md w-full max-h-[80vh] overflow-y-auto">
          <div class="sticky top-0 bg-white/10 backdrop-blur-md p-4 border-b border-white/20 flex justify-between items-center">
            <h3 class="text-white font-bold text-lg">${name}</h3><button class="close-modal text-white text-2xl">&times;</button>
          </div>
          <div class="p-4 space-y-3 text-white/90">
            ${description ? `<div><h4 class="font-bold text-cyan-300">Описание</h4><p>${description}</p></div>` : ''}
            ${delivery ? `<div><h4 class="font-bold text-cyan-300">Доставка до склада</h4><p>${delivery}</p></div>` : ''}
            ${payment ? `<div><h4 class="font-bold text-cyan-300">Способы оплаты</h4><p>${payment}</p></div>` : ''}
            ${instruction ? `<div><h4 class="font-bold text-cyan-300">Инструкция по заказу</h4><p class="whitespace-pre-line">${instruction}</p></div>` : ''}
          </div>
        </div>
      `;
      document.body.appendChild(modal);
      modal.querySelector('.close-modal').addEventListener('click', () => modal.remove());
      modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
    }

    function showFilterModal() {
      const modal = document.createElement('div');
      modal.className = 'fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4';
      modal.innerHTML = `
        <div class="bg-white/10 backdrop-blur-md rounded-2xl max-w-sm w-full p-4">
          <div class="flex justify-between items-center mb-4"><h3 class="text-white font-bold text-lg">Фильтры</h3><button class="close-modal text-white text-2xl">&times;</button></div>
          <div class="space-y-4">
            <div><label class="text-white/80 text-sm block mb-1">Страна</label><select id="filterCountry" class="w-full p-2 rounded-lg bg-white/20 text-white border border-white/30"><option value="all">Все</option><option value="Китай">Китай</option><option value="Европа">Европа</option><option value="Россия">Россия</option></select></div>
            <div><label class="text-white/80 text-sm block mb-1">Тип площадки</label><select id="filterType" class="w-full p-2 rounded-lg bg-white/20 text-white border border-white/30"><option value="all">Все</option><option value="marketplace">Маркетплейс</option><option value="brand">Бренд</option><option value="special">Специальный</option></select></div>
            <div><label class="text-white/80 text-sm block mb-1">Категория товаров</label><select id="filterCategory" class="w-full p-2 rounded-lg bg-white/20 text-white border border-white/30"><option value="all">Все</option><option value="обувь">Обувь</option><option value="одежда">Одежда</option><option value="аксессуары">Аксессуары</option></select></div>
            <div><label class="text-white/80 text-sm block mb-1">Пол</label><select id="filterGender" class="w-full p-2 rounded-lg bg-white/20 text-white border border-white/30"><option value="all">Все</option><option value="муж">Мужской</option><option value="жен">Женский</option><option value="унисекс">Унисекс</option></select></div>
            <div class="flex gap-2 mt-4"><button id="applyFiltersBtn" class="flex-1 bg-cyan-500 py-2 rounded-lg">Применить</button><button id="resetFiltersBtn" class="flex-1 bg-white/20 py-2 rounded-lg">Сбросить</button></div>
          </div>
        </div>
      `;
      document.body.appendChild(modal);
      const closeModal = () => modal.remove();
      modal.querySelector('.close-modal').addEventListener('click', closeModal);
      modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
      if (modal.querySelector('#filterCountry')) modal.querySelector('#filterCountry').value = marketplaceFilters.country || 'all';
      if (modal.querySelector('#filterType')) modal.querySelector('#filterType').value = marketplaceFilters.type || 'all';
      if (modal.querySelector('#filterCategory')) modal.querySelector('#filterCategory').value = marketplaceFilters.category || 'all';
      if (modal.querySelector('#filterGender')) modal.querySelector('#filterGender').value = marketplaceFilters.gender || 'all';
      modal.querySelector('#applyFiltersBtn').addEventListener('click', async () => {
        marketplaceFilters = { country: modal.querySelector('#filterCountry').value, type: modal.querySelector('#filterType').value, category: modal.querySelector('#filterCategory').value, gender: modal.querySelector('#filterGender').value };
        await renderCurrentScreen();
        closeModal();
      });
      modal.querySelector('#resetFiltersBtn').addEventListener('click', async () => {
        marketplaceFilters = { country: 'all', type: 'all', category: 'all', gender: 'all' };
        await renderCurrentScreen();
        closeModal();
      });
    }

        // ==================== ЗАКАЗЫ ====================
        async function renderOrders() {
      if (!userId) return '<p class="text-center mt-10">Авторизуйтесь</p>';
      try {
        const { data, error } = await supabaseClient.from('orders').select('*').eq('user_id', userId).order('created_at', { ascending: false });
        if (error) throw error;
        if (!data || data.length === 0) return '<p class="text-center mt-10 text-white/70">У вас пока нет заказов</p>';
        return `
          <div class="space-y-3">
            ${data.map(order => `
              <div class="bg-white/10 backdrop-blur-md rounded-xl p-4">
                <div class="flex justify-between items-start">
                  <div>
                    <p class="text-white font-bold">Заказ #${order.id.slice(0, 8)}</p>
                    <p class="text-white/70 text-xs">Вес: ${order.weight_estimated} кг</p>
                    <p class="text-cyan-400 text-sm mt-1">${order.prepayment_amount} ❄️</p>
                    ${order.tracking_number_cn ? `<p class="text-white/70 text-xs mt-2">📦 Трек: ${order.tracking_number_cn}</p>` : ''}
                    ${order.photo_reports && order.photo_reports.length > 0 ? `<div class="mt-2"><p class="text-white/70 text-xs mb-1">📸 Фотоотчёт:</p><div class="flex gap-2 overflow-x-auto">${order.photo_reports.map(url => `<img src="${url}" class="w-20 h-20 object-cover rounded-lg" />`).join('')}</div></div>` : ''}
                  </div>
                  <span class="status-badge ${getStatusClass(order.status)}">${getStatusText(order.status)}</span>
                </div>
              </div>
            `).join('')}
          </div>
        `;
      } catch (err) { return '<p class="text-center mt-10 text-red-400">Ошибка загрузки заказов</p>'; }
    }

    function attachOrdersHandlers() {}

    // ==================== ПРОФИЛЬ ====================
    async function renderProfile() {
      const balance = await loadBalance();
      return `
        <div class="space-y-4">
          <div class="bg-white/10 backdrop-blur-md rounded-2xl p-4 text-center">
            <div class="avatar mx-auto w-20 h-20 text-3xl flex items-center justify-center bg-white/20 rounded-full mb-2">${userName.charAt(0).toUpperCase()}</div>
            <h2 class="text-xl font-bold">${userName}</h2>
            <p class="text-white/70">Баланс: <span class="text-cyan-400 font-bold">${balance} ❄️</span></p>
          </div>
          <div class="bg-white/10 backdrop-blur-md rounded-xl p-4">
            <h3 class="font-bold mb-2">Информация</h3>
            <p class="text-sm text-white/70">Telegram ID: ${userId || '—'}</p>
            <p class="text-sm text-white/70">Статус: ${isOwner ? 'Владелец' : 'Клиент'}</p>
          </div>
          <button id="logoutBtn" class="w-full bg-red-500/20 border border-red-500/50 text-white py-3 rounded-lg">Выйти из аккаунта</button>
        </div>
      `;
    }

    function attachProfileHandlers() {
      document.getElementById('logoutBtn')?.addEventListener('click', () => { tg.close(); });
    }

    // ==================== АДМИНКА ====================
    async function renderAdmin() {
      if (!isOwner) return '<p class="text-center mt-10">Доступ запрещён</p>';
      try {
        const { data, error } = await supabaseClient.from('orders').select('*').order('created_at', { ascending: false });
        if (error) throw error;
        if (!data || data.length === 0) return '<p class="text-center mt-10 text-white/70">Нет заказов</p>';
        return `
          <div class="space-y-3">
            ${data.map(order => `
              <div class="bg-white/10 backdrop-blur-md rounded-xl p-4">
                <div class="flex justify-between items-start flex-wrap gap-2">
                  <div class="flex-1">
                    <p class="text-white font-bold">Заказ #${order.id.slice(0, 8)}</p>
                    <p class="text-white/70 text-xs">Пользователь: ${order.user_id}</p>
                    <p class="text-white/70 text-xs">Вес: ${order.weight_estimated} кг</p>
                    <p class="text-cyan-400 text-sm">${order.prepayment_amount} ❄️</p>
                    <div class="mt-2"><label class="text-white/70 text-xs">Трек-номер:</label><input type="text" id="tracking_${order.id}" value="${order.tracking_number_cn || ''}" class="tracking-input w-full mt-1 p-1 rounded bg-white/20 text-white text-sm border border-white/30" placeholder="Введите трек-номер"></div>
                    <div class="mt-2"><label class="text-white/70 text-xs">Фотоотчёт:</label><input type="file" id="photo_${order.id}" class="photo-input w-full mt-1 p-1 text-white/70 text-sm" accept="image/*"><div id="photo_preview_${order.id}" class="flex gap-2 mt-2 overflow-x-auto">${order.photo_reports && order.photo_reports.length > 0 ? order.photo_reports.map(url => `<img src="${url}" class="w-16 h-16 object-cover rounded-lg" />`).join('') : ''}</div></div>
                  </div>
                  <div class="flex flex-col gap-2">
                    <select class="status-select bg-slate-800 text-white rounded-lg px-2 py-1 text-sm" data-order-id="${order.id}">
                      <option value="pending" ${order.status === 'pending' ? 'selected' : ''}>Ожидает оплаты</option>
                      <option value="paid" ${order.status === 'paid' ? 'selected' : ''}>Оплачен (75%)</option>
                      <option value="bought" ${order.status === 'bought' ? 'selected' : ''}>Выкуплен</option>
                      <option value="on_sklad_cn" ${order.status === 'on_sklad_cn' ? 'selected' : ''}>На складе в Китае</option>
                      <option value="in_transit" ${order.status === 'in_transit' ? 'selected' : ''}>В пути</option>
                      <option value="in_belarus" ${order.status === 'in_belarus' ? 'selected' : ''}>В Беларуси</option>
                      <option value="delivered" ${order.status === 'delivered' ? 'selected' : ''}>Доставлен</option>
                      <option value="cancelled" ${order.status === 'cancelled' ? 'selected' : ''}>Отменён</option>
                    </select>
                    <button class="update-status-btn bg-cyan-500 text-white px-3 py-1 rounded-lg text-sm" data-order-id="${order.id}">Обновить статус</button>
                    <button class="update-tracking-btn bg-emerald-500 text-white px-3 py-1 rounded-lg text-sm" data-order-id="${order.id}">Сохранить трек</button>
                    <button class="upload-photo-btn bg-purple-500 text-white px-3 py-1 rounded-lg text-sm" data-order-id="${order.id}">Загрузить фото</button>
                  </div>
                </div>
              </div>
            `).join('')}
          </div>
        `;
      } catch (err) { return '<p class="text-center mt-10 text-red-400">Ошибка загрузки админки</p>'; }
    }

    function attachAdminHandlers() {
      document.querySelectorAll('.update-status-btn').forEach(btn => {
        btn.onclick = async () => {
          const orderId = btn.getAttribute('data-order-id');
          const select = document.querySelector(`.status-select[data-order-id="${orderId}"]`);
          const newStatus = select.value;
          await supabaseClient.from('orders').update({ status: newStatus }).eq('id', orderId);
          alert('Статус обновлён');
          renderCurrentScreen();
        };
      });
      document.querySelectorAll('.update-tracking-btn').forEach(btn => {
        btn.onclick = async () => {
          const orderId = btn.getAttribute('data-order-id');
          const input = document.getElementById(`tracking_${orderId}`);
          await supabaseClient.from('orders').update({ tracking_number_cn: input?.value || '' }).eq('id', orderId);
          alert('Трек сохранён');
          renderCurrentScreen();
        };
      });
      document.querySelectorAll('.upload-photo-btn').forEach(btn => {
        btn.onclick = async () => {
          const orderId = btn.getAttribute('data-order-id');
          const file = document.getElementById(`photo_${orderId}`)?.files[0];
          if (!file) { alert('Выберите файл'); return; }
          const photoUrl = await uploadPhoto(orderId, file);
          await addPhotoToOrder(orderId, photoUrl);
          alert('Фото загружено');
          renderCurrentScreen();
        };
      });
    }

    // ==================== ЗАПУСК ПРИЛОЖЕНИЯ ====================
    init();
  </script>
</body>
</html>
