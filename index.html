<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>ICE LOGIX</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0F172A; font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
    .status-badge { padding: 4px 12px; border-radius: 40px; font-size: 11px; font-weight: bold; display: inline-block; }
    .status-pending { background: #f59e0b; color: #000; }
    .status-paid { background: #10b981; color: #fff; }
    .status-bought { background: #3b82f6; color: #fff; }
    .status-on_sklad_cn { background: #8b5cf6; color: #fff; }
    .status-in_transit { background: #06b6d4; color: #fff; }
    .status-in_belarus { background: #14b8a6; color: #fff; }
    .status-delivered { background: #10b981; color: #fff; }
    .status-cancelled { background: #ef4444; color: #fff; }
    .product-card { background: rgba(255,255,255,0.08); backdrop-filter: blur(12px); border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); transition: all 0.2s; cursor: pointer; }
    .product-card:hover { transform: translateY(-4px); background: rgba(255,255,255,0.12); }
    .story-card { display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; transition: 0.2s; min-width: 70px; }
    .story-card:hover { transform: translateY(-2px); }
    .story-icon { width: 70px; height: 70px; background: rgba(255,255,255,0.1); backdrop-filter: blur(12px); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 32px; border: 1px solid rgba(255,255,255,0.2); }
    .story-label { font-size: 11px; font-weight: 500; color: #8e9aaf; }
    .banner-slide { background: linear-gradient(135deg, #007aff, #00c2ff); border-radius: 20px; padding: 16px; min-width: 280px; scroll-snap-align: start; cursor: pointer; }
    .banner-title { font-size: 18px; font-weight: bold; color: white; }
    .banner-desc { font-size: 12px; color: rgba(255,255,255,0.8); margin-top: 4px; }
    .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(25px); border-top: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-around; align-items: center; padding: 8px 12px 16px; z-index: 100; }
    .tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #8e9aaf; cursor: pointer; transition: color 0.2s; }
    .tab-item.active { color: #00c2ff; }
    .tab-icon { font-size: 22px; }
    .tab-label { font-size: 10px; font-weight: 600; }
    .tab-item.new-order { background: linear-gradient(135deg, #007aff, #00c2ff); color: white; padding: 8px 16px; border-radius: 40px; margin-top: -12px; box-shadow: 0 4px 12px rgba(0,122,255,0.4); }
    .tab-item.new-order .tab-label { font-size: 12px; font-weight: bold; }
    .app-header { position: sticky; top: 0; z-index: 90; background: rgba(15, 23, 42, 0.92); backdrop-filter: blur(25px); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .header-left { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .logo-img { height: 44px; cursor: pointer; transition: 0.2s; }
    .logo-img:hover { transform: scale(1.02); }
    .header-right { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .balance { background: rgba(0,194,255,0.15); padding: 5px 12px; border-radius: 30px; font-size: 14px; font-weight: bold; display: flex; align-items: center; gap: 6px; }
    .balance-add { background: none; border: none; color: #00c2ff; font-size: 16px; cursor: pointer; font-weight: bold; padding: 0; }
    .icon-btn { background: none; border: none; color: white; font-size: 20px; cursor: pointer; width: 32px; text-align: center; }
    .user-card { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.1); backdrop-filter: blur(12px); padding: 5px 12px 5px 5px; border-radius: 40px; cursor: pointer; transition: 0.2s; }
    .user-card:hover { background: rgba(255,255,255,0.2); }
    .user-avatar { width: 40px; height: 40px; border-radius: 50%; background: #2d3748; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .user-name { font-size: 14px; font-weight: 600; color: white; }
    .global-back-btn { background: rgba(255,255,255,0.15); border: none; color: white; font-size: 14px; font-weight: 600; padding: 8px 20px; border-radius: 40px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: 0.2s; margin-bottom: 16px; }
    .global-back-btn:hover { background: rgba(255,255,255,0.25); }
    .main-content { padding: 16px; padding-bottom: 80px; }
    .app-footer { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.1); padding: 20px 16px; margin-top: 30px; text-align: center; }
    .footer-links { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-bottom: 12px; }
    .footer-link { color: #8e9aaf; font-size: 12px; text-decoration: none; cursor: pointer; }
    .footer-link:hover { color: #00c2ff; }
    .social-icons { display: flex; justify-content: center; gap: 20px; margin-bottom: 12px; }
    .social-icon { font-size: 24px; cursor: pointer; }
    .copyright { font-size: 10px; color: #5a6e8a; }
    .scroll-x { overflow-x: auto; display: flex; gap: 12px; scroll-snap-type: x mandatory; padding-bottom: 8px; }
    .scroll-x::-webkit-scrollbar { display: none; }
    .review-card { background: rgba(255,255,255,0.08); backdrop-filter: blur(12px); border-radius: 20px; padding: 16px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.1); }
    .stars { color: #fbbf24; margin-bottom: 8px; }
    .course-card { background: rgba(255,255,255,0.08); backdrop-filter: blur(12px); border-radius: 20px; padding: 16px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.2s; }
    .course-card:hover { transform: translateY(-2px); background: rgba(255,255,255,0.12); }
    .filter-chip { background: rgba(255,255,255,0.15); padding: 6px 12px; border-radius: 40px; font-size: 12px; cursor: pointer; transition: 0.2s; }
    .filter-chip.active { background: #00c2ff; color: #0F172A; }
    .wishlist-heart { color: #ff4d4d; cursor: pointer; }
    .cart-badge { position: absolute; top: -4px; right: -8px; background: #ef4444; color: white; font-size: 10px; font-weight: bold; padding: 0px 5px; border-radius: 20px; min-width: 18px; text-align: center; }
  </style>
</head>
<body>
  <div id="app">
    <div class="app-header">
      <div class="header-left">
        <img id="logoImg" class="logo-img" src="https://i.ibb.co/9kJTjpjT/1-Logo.png" alt="ICE LOGIX">
      </div>
      <div class="header-right">
        <div class="balance"><span id="headerBalance">0 ❄️</span><button class="balance-add" id="addBalanceBtn">+</button></div>
        <button class="icon-btn" id="notificationsBtn">🔔</button>
        <button class="icon-btn" id="settingsBtn">⚙️</button>
        <div class="user-card" id="userCard">
          <div class="user-avatar" id="avatar"></div>
          <span class="user-name" id="userNameHeader">Гость</span>
        </div>
      </div>
    </div>
    <div id="content" class="main-content"><div class="text-center py-10">Загрузка...</div></div>
    <div class="tab-bar" id="tabBar">
      <div class="tab-item" data-tab="home"><span class="tab-icon">🏠</span><span class="tab-label">Главная</span></div>
      <div class="tab-item" data-tab="products"><span class="tab-icon">🛍️</span><span class="tab-label">Товары</span></div>
      <div class="tab-item new-order" data-tab="neworder"><span class="tab-icon">✨</span><span class="tab-label">Новый заказ</span></div>
      <div class="tab-item" data-tab="catalogs"><span class="tab-icon">📚</span><span class="tab-label">Каталоги</span></div>
      <div class="tab-item" data-tab="profile"><span class="tab-icon">👤</span><span class="tab-label">Профиль</span></div>
    </div>
  </div>
  <script>
    let tg = null, userId = null, userName = 'Гость', userAvatarUrl = null, isOwner = false, supabaseClient = null;
    let currentTab = 'home', previousTab = null, currentSubScreen = null;
    let balance = 0;
    let appliedPromo = null;
    let userReferralCode = null;
    let wishlist = new Set();
    let cartItems = [];
    let productsPage = 1;
    let productsFilter = { category: 'all', brand: 'all', sort: 'new', priceMin: 0, priceMax: 10000 };
    let productsTotalPages = 1;
    let reviewsPage = 1;
    let reviewsTotalPages = 1;
    let adminOrdersPage = 1;
    let adminOrdersFilter = 'all';
    let adminOrdersTotalPages = 1;

    async function init() {
      tg = window.Telegram.WebApp;
      tg.ready();
      tg.expand();
      const user = tg.initDataUnsafe?.user;
      userId = user ? user.id : null;
      userName = user ? (user.first_name || user.username) : 'Гость';
      userAvatarUrl = user?.photo_url || null;
      const SUPABASE_URL = 'https://vrvwdagjpttvfvjanbwq.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZydndkYWdqcHR0dmZ2amFuYndxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NTc4MzgsImV4cCI6MjA5MTIzMzgzOH0.P9GQSW6NLN1BhR66PX-LP4ysZBXFeWIXRYIRvhRjo1c';
      supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      await loadUserData();
      await initReferralCode();
      await loadWishlist();
      await loadCart();
      attachEventListeners();
      const avatarDiv = document.querySelector('#avatar');
      avatarDiv.innerHTML = userAvatarUrl ? `<img src="${userAvatarUrl}">` : userName.charAt(0).toUpperCase();
      document.querySelector('#userNameHeader').innerText = userName;
      document.getElementById('logoImg').onclick = () => switchTab('home');
      document.getElementById('userCard').onclick = () => switchTab('profile');
      document.getElementById('settingsBtn').onclick = () => alert('Настройки будут позже');
      document.getElementById('notificationsBtn').onclick = () => alert('Уведомлений пока нет');
      updateCartBadge();
      switchTab('home');
    }

    async function loadUserData() {
      if (!userId) return;
      const { data, error } = await supabaseClient.from('users').select('role, ices_balance, referral_code, referral_count, referral_bonus').eq('user_id', userId).maybeSingle();
      if (!error && data) {
        isOwner = (data.role === 'owner');
        balance = data.ices_balance || 0;
        userReferralCode = data.referral_code;
        document.getElementById('headerBalance').innerText = balance + ' ❄️';
      }
    }

    async function initReferralCode() {
      if (!userId) return;
      if (userReferralCode) return;
      const code = 'ICE' + userId.toString().slice(-6);
      try {
        await supabaseClient.from('users').update({ referral_code: code }).eq('user_id', userId);
        userReferralCode = code;
      } catch(e) { console.log(e); }
    }

    async function loadWishlist() {
      if (!userId) return;
      try {
        const { data } = await supabaseClient.from('wishlist').select('product_id').eq('user_id', userId);
        if (data) data.forEach(item => wishlist.add(item.product_id));
      } catch(e) {}
    }

    async function loadCart() {
      if (!userId) return;
      try {
        const { data } = await supabaseClient.from('cart').select('*, products(*)').eq('user_id', userId);
        if (data) cartItems = data;
        updateCartBadge();
      } catch(e) { console.log(e); }
    }

    async function updateCartBadge() {
      // Корзина в профиле, бейдж не нужен, но оставим переменную для внутреннего использования
    }

    async function addToCart(productId, quantity = 1) {
      if (!userId) { alert('Авторизуйтесь'); return false; }
      try {
        const existing = cartItems.find(item => item.product_id === productId);
        if (existing) {
          await supabaseClient.from('cart').update({ quantity: existing.quantity + quantity }).eq('id', existing.id);
          existing.quantity += quantity;
        } else {
          const { data } = await supabaseClient.from('cart').insert({ user_id: userId, product_id: productId, quantity: quantity }).select();
          if (data) cartItems.push(data[0]);
        }
        await loadCart();
        alert('Товар добавлен в корзину');
        return true;
      } catch (err) { alert('Ошибка: ' + err.message); return false; }
    }

    function attachEventListeners() {
      document.getElementById('addBalanceBtn').onclick = () => alert('Пополнение баланса будет позже');
      document.querySelectorAll('.tab-item').forEach(tab => {
        tab.onclick = () => {
          const tabName = tab.getAttribute('data-tab');
          currentSubScreen = null;
          appliedPromo = null;
          switchTab(tabName);
        };
      });
    }

    function switchTab(tabName) {
      if (currentTab && currentTab !== tabName) previousTab = currentTab;
      currentTab = tabName;
      document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
      const activeTab = document.querySelector(`.tab-item[data-tab="${tabName}"]`);
      if (activeTab) activeTab.classList.add('active');
      renderCurrentScreen();
    }

    function renderFooter() {
      return `
        <div class="app-footer">
          <div class="social-icons"><span class="social-icon" data-social="tg">📱</span><span class="social-icon" data-social="ig">📷</span><span class="social-icon" data-social="vk">🎵</span></div>
          <div class="footer-links"><span class="footer-link" data-link="offer">Публичная оферта</span><span class="footer-link" data-link="privacy">Политика конфиденциальности</span><span class="footer-link" data-link="contacts">Контакты</span></div>
          <div class="copyright">ИП Иванов И.И., УНП 123456789<br>© 2025 ICE LOGIX. Все права защищены.</div>
        </div>
      `;
    }

        // ==================== РЕНДЕР ГЛАВНОЙ СТРАНИЦЫ ====================
        async function renderHome() {
      const marketplaces = [
        { id: 1, name: 'Poizon', url: 'https://poizon.com' },
        { id: 2, name: 'Taobao', url: 'https://taobao.com' },
        { id: 3, name: '1688', url: 'https://1688.com' },
        { id: 4, name: 'Zalando', url: 'https://zalando.de' },
        { id: 5, name: 'Nike', url: 'https://nike.com' }
      ];
      const banners = [
        { title: '🔥 Розыгрыш iPhone 15', desc: 'Участвуй до 30 апреля' },
        { title: '🎁 Скидка 10% на доставку', desc: 'Для новых клиентов' },
        { title: '✈️ Бесплатная консолидация', desc: 'При заказе от 3 товаров' }
      ];
      return `
        <div class="scroll-x mb-6">
          <div class="story-card" data-story="reports"><div class="story-icon">📸</div><span class="story-label">Отчёты</span></div>
          <div class="story-card" data-story="reviews"><div class="story-icon">⭐</div><span class="story-label">Отзывы</span></div>
          <div class="story-card" data-story="promo"><div class="story-icon">🎁</div><span class="story-label">Акции</span></div>
          <div class="story-card" data-story="academy"><div class="story-icon">🎓</div><span class="story-label">Обучение</span></div>
          <div class="story-card" data-story="drops"><div class="story-icon">📦</div><span class="story-label">Дропы</span></div>
          <div class="story-card" data-story="referral"><div class="story-icon">👥</div><span class="story-label">Рефералы</span></div>
        </div>
        <div class="scroll-x mb-6">${banners.map(b => `<div class="banner-slide"><div class="banner-title">${b.title}</div><div class="banner-desc">${b.desc}</div></div>`).join('')}</div>
        <div class="mb-6"><div class="flex justify-between items-center mb-3"><h3 class="text-white font-bold">🔥 Популярные площадки</h3><button id="moreMarketplacesBtn" class="text-cyan-400 text-sm">Больше →</button></div><div class="scroll-x">${marketplaces.map(mp => `<div class="story-card marketplace-story" data-url="${mp.url}" style="min-width: 70px;"><div class="story-icon text-2xl">🛍️</div><span class="story-label">${mp.name}</span></div>`).join('')}</div></div>
        <div class="mb-6"><div class="flex justify-between items-center mb-3"><h3 class="text-white font-bold">✨ Рекомендуем</h3><button id="moreProductsBtn" class="text-cyan-400 text-sm">Больше →</button></div><div class="grid grid-cols-2 gap-3" id="homeProductsGrid"></div></div>
        ${renderFooter()}
      `;
    }

    async function loadHomeProducts() {
      try {
        const { data } = await supabaseClient.from('products').select('*').eq('is_active', true).limit(6);
        const grid = document.getElementById('homeProductsGrid');
        if (grid && data) {
          grid.innerHTML = data.map(p => `
            <div class="product-card" data-product-id="${p.id}">
              <div class="aspect-square bg-white/10 flex items-center justify-center"><img src="${p.image_url || 'https://via.placeholder.com/150'}" class="w-full h-full object-cover"></div>
              <div class="p-2"><p class="text-white font-bold text-sm truncate">${p.title}</p><p class="text-cyan-400 text-xs">${p.price} ${p.currency}</p><button class="addToCartFromHomeBtn mt-2 w-full bg-cyan-500/50 py-1 rounded text-xs" data-id="${p.id}">В корзину</button></div>
            </div>
          `).join('');
          document.querySelectorAll('.addToCartFromHomeBtn').forEach(btn => {
            btn.onclick = (e) => { e.stopPropagation(); addToCart(btn.getAttribute('data-id'), 1); };
          });
          document.querySelectorAll('.product-card').forEach(card => {
            card.onclick = () => { const url = card.getAttribute('data-url'); if (url) { window.tempOrder = { url, price: 520, weight: 1, total: 0, discountAmount: 0 }; switchTab('neworder'); } };
          });
        }
      } catch(e) {}
    }

    // ==================== РЕНДЕР КАЛЬКУЛЯТОРА ====================
    async function renderCalculator() {
      return `
        <div class="bg-white/10 backdrop-blur-md rounded-2xl p-5 shadow-lg">
          <h2 class="text-xl font-bold mb-4">🧮 Калькулятор стоимости</h2>
          <label class="text-white/70 text-sm">Ссылка на товар (необязательно)</label>
          <input type="text" id="calcUrl" class="w-full mt-1 p-3 rounded-xl bg-white/20 border border-white/30 mb-3" placeholder="https://poizon.com/...">
          <label class="text-white/70 text-sm block mt-2">Цена (¥)</label>
          <input type="number" id="calcPrice" class="w-full mt-1 p-3 rounded-xl bg-white/20 border border-white/30 mb-3" placeholder="Цена в юанях" value="520">
          <label class="text-white/70 text-sm block mt-2">Вес (кг)</label>
          <div class="flex items-center gap-3 mt-1"><input type="range" id="calcWeight" min="0.1" max="30" step="0.1" value="1" class="flex-1"><span id="weightVal" class="text-white/80 bg-white/10 px-3 py-1 rounded-full">1.0 кг</span></div>
          <button id="calcBtn" class="mt-5 w-full bg-cyan-500 hover:bg-cyan-600 py-3 rounded-xl font-bold transition">Рассчитать</button>
          <div id="calcResult" class="mt-5 hidden bg-white/5 p-4 rounded-xl"><p class="text-white">Примерная стоимость: <span id="totalPrice" class="font-bold text-cyan-400">0</span> ❄️</p><p class="text-white/70 text-xs mt-1">*Окончательная цена после взвешивания на складе</p><button id="toNewOrderBtn" class="mt-3 w-full bg-blue-600 hover:bg-blue-700 py-2 rounded-xl">Перенести в заказ</button></div>
        </div>
        ${renderFooter()}
      `;
    }

    function attachCalculatorHandlers() {
      const slider = document.getElementById('calcWeight');
      const valSpan = document.getElementById('weightVal');
      if (slider) slider.oninput = () => valSpan.innerText = parseFloat(slider.value).toFixed(1) + ' кг';
      const calcBtn = document.getElementById('calcBtn');
      if (calcBtn) calcBtn.onclick = () => {
        let price = parseFloat(document.getElementById('calcPrice')?.value || 520);
        let weight = parseFloat(slider?.value || 1);
        let total = (price * 0.45) + (weight * 12);
        document.getElementById('totalPrice').innerText = total.toFixed(2);
        document.getElementById('calcResult').classList.remove('hidden');
        window.tempOrder = { url: document.getElementById('calcUrl')?.value || '', price: price, weight: weight, total: total, discountAmount: 0, appliedPromo: null };
      };
      const toNewOrderBtn = document.getElementById('toNewOrderBtn');
      if (toNewOrderBtn) toNewOrderBtn.onclick = () => { if (window.tempOrder) switchTab('neworder'); else alert('Сначала рассчитайте стоимость'); };
    }

    // ==================== РЕНДЕР НОВОГО ЗАКАЗА (С ПРОМОКОДАМИ) ====================
    async function renderNewOrder() {
      const d = window.tempOrder || { url: '', price: 520, weight: 1, total: 0, discountAmount: 0, appliedPromo: null };
      const finalTotal = d.total - (d.discountAmount || 0);
      return `
        <div class="bg-white/10 backdrop-blur-md rounded-2xl p-5 shadow-lg">
          <h2 class="text-xl font-bold mb-4">✨ Новый заказ</h2>
          <label class="text-white/70 text-sm">Ссылка на товар</label>
          <input type="text" id="orderUrl" class="w-full mt-1 p-3 rounded-xl bg-white/20 border border-white/30 mb-3" value="${d.url}" placeholder="https://...">
          <label class="text-white/70 text-sm block mt-2">Цена (¥)</label>
          <input type="number" id="orderPrice" class="w-full mt-1 p-3 rounded-xl bg-white/20 border border-white/30 mb-3" value="${d.price}">
          <label class="text-white/70 text-sm block mt-2">Вес (кг)</label>
          <div class="flex items-center gap-3 mt-1"><input type="number" id="orderWeight" class="flex-1 p-3 rounded-xl bg-white/20 border border-white/30" value="${d.weight}" step="0.1"><span class="text-white/80 bg-white/10 px-3 py-1 rounded-full">кг</span></div>

    function attachNewOrderHandlers() {
      const priceInp = document.getElementById('orderPrice');
      const weightInp = document.getElementById('orderWeight');
      const totalSpan = document.getElementById('orderTotal');
      const prepaymentSpan = document.getElementById('prepaymentAmount');
      const urlInp = document.getElementById('orderUrl');
      const promoInput = document.getElementById('promoCode');
      const promoMessage = document.getElementById('promoMessage');
      
      const update = () => {
        let price = parseFloat(priceInp?.value || 520);
        let weight = parseFloat(weightInp?.value || 1);
        let total = (price * 0.45) + (weight * 12);
        let discount = window.tempOrder?.discountAmount || 0;
        if (totalSpan) totalSpan.innerText = (total - discount).toFixed(2);
        if (prepaymentSpan) prepaymentSpan.innerText = ((total - discount) * 0.75).toFixed(2);
        window.tempOrder = { ...window.tempOrder, url: urlInp?.value || '', price: price, weight: weight, total: total, discountAmount: discount };
      };
      
      if (priceInp) priceInp.addEventListener('input', update);
      if (weightInp) weightInp.addEventListener('input', update);
      
      const applyPromoBtn = document.getElementById('applyPromoBtn');
      if (applyPromoBtn) {
        applyPromoBtn.onclick = async () => {
          const code = promoInput?.value.trim().toUpperCase();
          if (!code) { promoMessage.innerText = 'Введите код'; promoMessage.classList.remove('hidden'); return; }
          try {
            const { data, error } = await supabaseClient.from('promocodes').select('*').eq('code', code).eq('is_active', true).single();
            if (error || !data) { promoMessage.innerText = 'Неверный или просроченный код'; promoMessage.classList.remove('hidden'); return; }
            let discountAmount = 0;
            if (data.discount_type === 'percent') discountAmount = window.tempOrder.total * (data.discount_value / 100);
            else discountAmount = data.discount_value;
            if (discountAmount > window.tempOrder.total) discountAmount = window.tempOrder.total;
            window.tempOrder.discountAmount = discountAmount;
            window.tempOrder.appliedPromo = data;
            update();
            promoMessage.innerText = `Промокод применён! Скидка: ${discountAmount} ❄️`;
            promoMessage.classList.remove('hidden');
            promoMessage.style.color = '#4ade80';
          } catch (err) { promoMessage.innerText = 'Ошибка проверки кода'; promoMessage.classList.remove('hidden'); }
        };
      }
      
      const createBtn = document.getElementById('createOrderFinal');
      if (createBtn) {
        createBtn.onclick = async () => {
          if (!window.tempOrder || !userId) { alert('Ошибка: заполните все поля'); return; }
          try {
            const { data, error } = await supabaseClient.from('orders').insert({
              user_id: userId, source_url: window.tempOrder.url, weight_estimated: window.tempOrder.weight,
              price_original: window.tempOrder.price, price_byn: window.tempOrder.price * 0.45,
              delivery_cost_estimated: window.tempOrder.weight * 12, prepayment_amount: (window.tempOrder.total - window.tempOrder.discountAmount) * 0.75,
              status: 'pending', discount_applied: window.tempOrder.discountAmount || 0, promo_code: window.tempOrder.appliedPromo?.code || null
            }).select();
            if (error) throw error;
            alert(`Заказ создан! Номер: ${data[0].id}. Сумма предоплаты: ${((window.tempOrder.total - window.tempOrder.discountAmount) * 0.75).toFixed(2)} ❄️`);
            window.tempOrder = null;
            switchTab('home');
          } catch (err) { alert('Ошибка: ' + err.message); }
        };
      }
    }

        return `

            <div class="flex-1"><p class="text-white font-bold">${item.products?.title || 'Товар'}</p><p class="text-cyan-400 text-sm">${price} × ${item.quantity} = ${subtotal} ❄️</p></div>

    function attachCartHandlers() {
      document.querySelectorAll('.cartDecBtn').forEach(btn => {
        btn.onclick = async () => {
          const productId = btn.getAttribute('data-id');
          const item = cartItems.find(i => i.product_id === productId);
          if (item && item.quantity > 1) {
            await supabaseClient.from('cart').update({ quantity: item.quantity - 1 }).eq('id', item.id);
            await loadCart();
            renderCurrentScreen();
          } else if (item) {
            await supabaseClient.from('cart').delete().eq('id', item.id);
            await loadCart();
            renderCurrentScreen();
          }
        };
      });
      document.querySelectorAll('.cartIncBtn').forEach(btn => {
        btn.onclick = async () => {
          const productId = btn.getAttribute('data-id');
          const item = cartItems.find(i => i.product_id === productId);
          if (item) {
            await supabaseClient.from('cart').update({ quantity: item.quantity + 1 }).eq('id', item.id);
            await loadCart();
            renderCurrentScreen();
          }
        };
      });
      document.querySelectorAll('.cartRemoveBtn').forEach(btn => {
        btn.onclick = async () => {
          const id = btn.getAttribute('data-id');
          await supabaseClient.from('cart').delete().eq('id', id);
          await loadCart();
          renderCurrentScreen();
        };
      });
      const goToProductsBtn = document.getElementById('goToProductsBtn');

            return { title: item.products?.title, price: price, quantity: item.quantity };
          });
          const deliveryCost = 12;
          const totalWithDelivery = total + deliveryCost;

            }).select();
            if (error) throw error;
            await supabaseClient.from('cart').delete().eq('user_id', userId);
            cartItems = [];
            alert(`Заказ создан! Номер: ${data[0].id}. Сумма предоплаты: ${prepayment} ❄️`);
            switchTab('home');
          } catch (err) { alert('Ошибка: ' + err.message); }
        };
      }

                  </div>
                  <div class="text-right"><span class="text-cyan-400 font-bold">${course.price_ice > 0 ? course.price_ice + ' ❄️' : 'Бесплатно'}</span></div>
                </div>
                ${course.price_ice > 0 && course.progress === 0 && (!userId || balance < course.price_ice) ? 
                  `<button class="buyCourseBtn mt-3 w-full bg-green-600 py-2 rounded-lg" data-course-id="${course.id}" data-price="${course.price_ice}">Купить за ${course.price_ice} ❄️</button>` : ''}
                <div class="lessons-container hidden mt-3 space-y-2" data-course="${course.id}">
                  ${course.lessons.map(lesson => `
                    <div class="lesson-item bg-white/5 rounded-xl p-3 cursor-pointer" data-lesson-id="${lesson.id}" data-lesson-type="${lesson.content_type}">
                      <div class="flex justify-between items-center">
                        <div><span class="text-white font-medium">${lesson.title}</span><p class="text-white/50 text-xs">${lesson.content_type === 'video' ? '📹 Видео' : lesson.content_type === 'quiz' ? '📝 Тест' : '📄 Текст'}</p></div>
                        ${userProgress[lesson.id] ? '<span class="text-green-400">✅ Пройдено</span>' : lesson.is_locked ? '<span class="text-yellow-400">🔒 Заблокировано</span>' : '<span class="text-cyan-400">▶ Начать</span>'}
                      </div>
                    </div>
                  `).join('')}
                </div>
              </div>
            `).join('')}
          </div>
          ${renderFooter()}
        `;
      } catch (err) { return '<p class="text-center mt-10 text-red-400">Ошибка загрузки курсов</p>'; }
    }

    // ==================== РЕНДЕР КАТАЛОГА ТОВАРОВ ====================
    async function renderProducts() {
      try {
        let query = supabaseClient.from('products').select('*', { count: 'exact' }).eq('is_active', true);
        if (productsFilter.category !== 'all') query = query.eq('category', productsFilter.category);
        if (productsFilter.brand !== 'all') query = query.eq('brand', productsFilter.brand);
        if (productsFilter.sort === 'price_asc') query = query.order('price', { ascending: true });
        else if (productsFilter.sort === 'price_desc') query = query.order('price', { ascending: false });
        else query = query.order('created_at', { ascending: false });
        if (productsFilter.priceMin > 0) query = query.gte('price', productsFilter.priceMin);
        if (productsFilter.priceMax < 10000) query = query.lte('price', productsFilter.priceMax);
        
        const from = (productsPage - 1) * 20;
        const to = from + 19;
        const { data, count, error } = await query.range(from, to);
        if (error) throw error;
        
        productsTotalPages = Math.ceil((count || 0) / 20);
        
        const categories = [...new Set(data.map(p => p.category).filter(Boolean))];
        const brands = [...new Set(data.map(p => p.brand).filter(Boolean))];
        
        return `
          <div class="mb-4 flex flex-wrap gap-2">
            <div class="flex-1"><select id="filterCategory" class="w-full p-2 rounded-lg bg-white/20 border border-white/30"><option value="all">Все категории</option>${categories.map(c => `<option value="${c}" ${productsFilter.category === c ? 'selected' : ''}>${c}</option>`).join('')}</select></div>
            <div class="flex-1"><select id="filterBrand" class="w-full p-2 rounded-lg bg-white/20 border border-white/30"><option value="all">Все бренды</option>${brands.map(b => `<option value="${b}" ${productsFilter.brand === b ? 'selected' : ''}>${b}</option>`).join('')}</select></div>
            <div><select id="filterSort" class="w-full p-2 rounded-lg bg-white/20 border border-white/30"><option value="new" ${productsFilter.sort === 'new' ? 'selected' : ''}>Новинки</option><option value="price_asc" ${productsFilter.sort === 'price_asc' ? 'selected' : ''}>Цена ↑</option><option value="price_desc" ${productsFilter.sort === 'price_desc' ? 'selected' : ''}>Цена ↓</option></select></div>
            <button id="openProductsFilterBtn" class="bg-cyan-500 px-4 py-2 rounded-lg">🔍 Фильтр</button>
            <button id="applyProductsFilter" class="bg-cyan-500 px-4 py-2 rounded-lg">Применить</button>
          </div>
          <div class="grid grid-cols-2 gap-4" id="productsGrid">
            ${data.map(p => `
              <div class="product-card" data-product-id="${p.id}">
                <div class="aspect-square bg-white/10 flex items-center justify-center relative"><img src="${p.image_url || 'https://via.placeholder.com/150'}" class="w-full h-full object-cover"><span class="absolute top-2 right-2 wishlist-heart text-xl ${wishlist.has(p.id) ? 'text-red-500' : 'text-white/50'}" data-product-id="${p.id}">${wishlist.has(p.id) ? '❤️' : '🤍'}</span></div>
                <div class="p-2"><p class="text-white font-bold text-sm truncate">${p.title}</p><p class="text-cyan-400 text-xs">${p.price} ${p.currency}</p><p class="text-white/50 text-xs">${p.brand || ''} ${p.category || ''}</p><button class="buyNowBtn mt-2 w-full bg-cyan-500/50 py-1 rounded text-xs" data-url="${p.url}" data-price="${p.price}" data-id="${p.id}">Купить сейчас</button><button class="addToCartBtn mt-1 w-full bg-white/20 py-1 rounded text-xs" data-id="${p.id}">В корзину</button></div>
              </div>
            `).join('')}
          </div>
          <div class="flex justify-center gap-2 mt-4"><button id="prevPage" class="bg-white/20 px-4 py-2 rounded-lg" ${productsPage <= 1 ? 'disabled' : ''}>← Назад</button><span class="text-white/70 py-2">Страница ${productsPage} из ${productsTotalPages}</span><button id="nextPage" class="bg-white/20 px-4 py-2 rounded-lg" ${productsPage >= productsTotalPages ? 'disabled' : ''}>Вперёд →</button></div>
          ${renderFooter()}
        `;
      } catch (err) { return '<p class="text-center mt-10 text-red-400">Ошибка загрузки товаров</p>'; }
    }

            await supabaseClient.from('wishlist').delete().eq('user_id', userId).eq('product_id', productId);
            wishlist.delete(productId);
            heart.innerText = '🤍';
            heart.classList.remove('text-red-500');
          } else {
            await supabaseClient.from('wishlist').insert({ user_id: userId, product_id: productId });
            wishlist.add(productId);
            heart.innerText = '❤️';
            heart.classList.add('text-red-500');
          }
        };
      });
      
      document.querySelectorAll('.buyNowBtn').forEach(btn => {
        btn.onclick = (e) => {
          e.stopPropagation();
          const url = btn.getAttribute('data-url');
          const price = parseFloat(btn.getAttribute('data-price'));

      document.querySelectorAll('.addToCartBtn').forEach(btn => {
        btn.onclick = (e) => {
          e.stopPropagation();
          const productId = btn.getAttribute('data-id');
          addToCart(productId, 1);

      });

      const { data, error } = await supabaseClient.from('orders').select('id').eq('user_id', userId).eq('status', 'delivered').limit(1);
      return !error && data && data.length > 0;

      document.querySelectorAll('.approveReviewBtn').forEach(btn => {
        btn.onclick = async () => {
          const id = btn.getAttribute('data-id');
          try {
            await supabaseClient.from('reviews').update({ is_published: true }).eq('id', id);
            alert('Отзыв опубликован');
            renderCurrentScreen();
          } catch (err) { alert('Ошибка: ' + err.message); }
        };
      });
      
      document.querySelectorAll('.rejectReviewBtn').forEach(btn => {
        btn.onclick = async () => {
          const id = btn.getAttribute('data-id');
          try {
            await supabaseClient.from('reviews').delete().eq('id', id);
            alert('Отзыв отклонён');
            renderCurrentScreen();
          } catch (err) { alert('Ошибка: ' + err.message); }
        };
      });
      
      const addProductBtn = document.getElementById('addProductBtn');
      if (addProductBtn) {
        addProductBtn.onclick = () => {
          const modal = document.createElement('div');
          modal.className = 'fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4';
          modal.innerHTML = `
            <div class="bg-white/10 backdrop-blur-md rounded-2xl max-w-md w-full p-5">
              <h3 class="text-white font-bold text-lg mb-4">➕ Новый товар</h3>
              <input type="text" id="productTitle" class="w-full p-3 rounded-xl bg-white/20 border border-white/30 mb-3" placeholder="Название">
              <textarea id="productDesc" class="w-full p-3 rounded-xl bg-white/20 border border-white/30 mb-3" placeholder="Описание" rows="2"></textarea>
              <input type="number" id="productPrice" class="w-full p-3 rounded-xl bg-white/20 border border-white/30 mb-3" placeholder="Цена" value="0">
              <select id="productCategory" class="w-full p-3 rounded-xl bg-white/20 border border-white/30 mb-3"><option value="Обувь">Обувь</option><option value="Одежда">Одежда</option><option value="Аксессуары">Аксессуары</option></select>
              <input type="text" id="productBrand" class="w-full p-3 rounded-xl bg-white/20 border border-white/30 mb-3" placeholder="Бренд">
              <input type="url" id="productImage" class="w-full p-3 rounded-xl bg-white/20 border border-white/30 mb-3" placeholder="URL изображения">
              <input type="url" id="productUrl" class="w-full p-3 rounded-xl bg-white/20 border border-white/30 mb-3" placeholder="Ссылка на товар">
              <div class="flex gap-3 mt-4"><button id="saveProductBtn" class="flex-1 bg-cyan-500 py-2 rounded-xl">Сохранить</button><button id="cancelProductBtn" class="flex-1 bg-white/20 py-2 rounded-xl">Отмена</button></div>
            </div>
          `;
          document.body.appendChild(modal);
          modal.querySelector('#cancelProductBtn').onclick = () => modal.remove();
          modal.querySelector('#saveProductBtn').onclick = async () => {
            const title = modal.querySelector('#productTitle').value.trim();
            const description = modal.querySelector('#productDesc').value.trim();
            const price = parseFloat(modal.querySelector('#productPrice').value);
            const category = modal.querySelector('#productCategory').value;
            const brand = modal.querySelector('#productBrand').value.trim();
            const image_url = modal.querySelector('#productImage').value.trim();
            const url = modal.querySelector('#productUrl').value.trim();
            if (!title || !price) { alert('Заполните название и цену'); return; }
            try {
              await supabaseClient.from('products').insert({ title, description, price, category, brand, image_url, url, currency: 'CNY', is_active: true });
              alert('Товар добавлен');
              modal.remove();
              renderCurrentScreen();
            } catch (err) { alert('Ошибка: ' + err.message); }
          };
        };
      }
      
      document.querySelectorAll('.deleteProductBtn').forEach(btn => {
        btn.onclick = async () => {
          const id = btn.getAttribute('data-id');
          if (confirm('Удалить товар?')) {
            await supabaseClient.from('products').delete().eq('id', id);
            renderCurrentScreen();
          }
        };
      });
      
      document.querySelectorAll('.approvePayoutBtn').forEach(btn => {
        btn.onclick = async () => {
          const id = btn.getAttribute('data-id');
          try {
            await supabaseClient.from('payout_requests').update({ status: 'approved', processed_at: new Date() }).eq('id', id);
            alert('Заявка одобрена');
            renderCurrentScreen();
          } catch (err) { alert('Ошибка: ' + err.message); }
        };
      });
      
      document.querySelectorAll('.rejectPayoutBtn').forEach(btn => {
        btn.onclick = async () => {
          const id = btn.getAttribute('data-id');
          try {
            await supabaseClient.from('payout_requests').update({ status: 'rejected', processed_at: new Date() }).eq('id', id);
            alert('Заявка отклонена');
            renderCurrentScreen();
          } catch (err) { alert('Ошибка: ' + err.message); }
        };
      });
    }

        // ==================== РЕНДЕР ГЛАВНОЙ СТРАНИЦЫ ====================
        async function renderHome() {
      const bal = await loadBalance();
      return `
        <div class="space-y-4">
          <div class="bg-white/10 backdrop-blur-md rounded-2xl p-5 text-center shadow-lg">
            <h1 class="text-2xl font-bold">Добро пожаловать, ${userName}!</h1>
            <p class="text-white/70 mt-2">Ваш баланс: <span class="text-cyan-400 font-bold">${bal} ❄️</span></p>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div class="bg-white/10 backdrop-blur-md rounded-xl p-3"><p class="text-white/70 text-xs">Курс ¥</p><p class="text-white text-xl font-bold">0.45 BYN</p></div>
            <div class="bg-white/10 backdrop-blur-md rounded-xl p-3"><p class="text-white/70 text-xs">Поставка</p><p class="text-white text-xl font-bold">8 дн</p></div>
          </div>
          <div class="bg-white/10 backdrop-blur-md rounded-xl p-4">
            <p class="text-center text-white/70">Используйте <strong>Калькулятор</strong> или <strong>Новый заказ</strong> для оформления.</p>
          </div>
          ${renderFooter()}
        </div>
      `;
    }

    function attachHomeHandlers() {
      // На главной пока нет интерактивных элементов, кроме навигации
    }

    // ==================== РЕНДЕР КАЛЬКУЛЯТОРА ====================
    async function renderCalculator() {
      return `
        <div class="space-y-4">
          <div class="bg-white/10 backdrop-blur-md rounded-xl p-5 shadow-lg">
            <h2 class="text-xl font-bold mb-4">🧮 Калькулятор стоимости</h2>
            <label class="text-white/70 text-sm">Ссылка на товар (необязательно)</label>
            <input type="text" id="calcUrl" class="w-full mt-1 p-3 rounded-xl bg-white/20 text-white border border-white/30" placeholder="https://...">
            <label class="text-white/70 text-sm block mt-3">Цена (¥)</label>
            <input type="number" id="calcPrice" class="w-full mt-1 p-3 rounded-xl bg-white/20 text-white border border-white/30" value="520" step="1">
            <label class="text-white/70 text-sm block mt-3">Вес (кг)</label>
            <input type="range" id="calcWeight" min="0.1" max="30" step="0.1" value="1" class="w-full mt-1">
            <div class="flex justify-between text-white/70 text-sm mt-1"><span>0.1 кг</span><span id="weightVal">1.0 кг</span><span>30 кг</span></div>
            <button id="calcBtn" class="mt-5 w-full bg-cyan-500 py-3 rounded-xl font-bold">Рассчитать</button>
            <div id="calcResult" class="mt-5 hidden bg-white/5 p-4 rounded-xl">
              <p class="text-white">Итого: <span id="totalPrice" class="font-bold text-cyan-400">0</span> ❄️</p>
              <button id="toNewOrderBtn" class="mt-3 w-full bg-blue-600 py-2 rounded-xl">Перенести в заказ</button>
            </div>
          </div>
          ${renderFooter()}
        </div>
      `;
    }

    function attachCalculatorHandlers() {
      const slider = document.getElementById('calcWeight'), valSpan = document.getElementById('weightVal');
      if (slider) slider.oninput = () => valSpan.innerText = parseFloat(slider.value).toFixed(1) + ' кг';
      const calcBtn = document.getElementById('calcBtn');
      if (calcBtn) {
        calcBtn.onclick = () => {
          let price = parseFloat(document.getElementById('calcPrice')?.value || 520);
          let weight = parseFloat(slider?.value || 1);
          let total = (price * 0.45) + (weight * 12);
          document.getElementById('totalPrice').innerText = total.toFixed(2);
          document.getElementById('calcResult').classList.remove('hidden');
          window.tempOrder = { url: document.getElementById('calcUrl')?.value || '', price, weight, total };
        };
      }
      const toNewOrder = document.getElementById('toNewOrderBtn');
      if (toNewOrder) toNewOrder.onclick = () => { if (window.tempOrder) switchTab('neworder'); else alert('Сначала рассчитайте стоимость'); };
    }

    // ==================== РЕНДЕР НОВОГО ЗАКАЗА ====================
    async function renderNewOrder() {
      const d = window.tempOrder || { url: '', price: 520, weight: 1, total: 0 };
      return `
        <div class="space-y-4">
          <div class="bg-white/10 backdrop-blur-md rounded-xl p-5 shadow-lg">
            <h2 class="text-xl font-bold mb-4">✨ Новый заказ</h2>
            <label class="text-white/70 text-sm">Ссылка на товар</label>
            <input type="text" id="orderUrl" class="w-full mt-1 p-3 rounded-xl bg-white/20 text-white border border-white/30" value="${d.url}">
            <label class="text-white/70 text-sm block mt-3">Цена (¥)</label>
            <input type="number" id="orderPrice" class="w-full mt-1 p-3 rounded-xl bg-white/20 text-white border border-white/30" value="${d.price}">
            <label class="text-white/70 text-sm block mt-3">Вес (кг)</label>
            <input type="number" id="orderWeight" class="w-full mt-1 p-3 rounded-xl bg-white/20 text-white border border-white/30" value="${d.weight}" step="0.1">
            <p class="mt-4 text-lg">Итого: <span id="orderTotal" class="font-bold text-cyan-400">${d.total}</span> ❄️</p>
            <button id="createOrderFinal" class="mt-5 w-full bg-green-600 py-3 rounded-xl font-bold">Оформить заказ (75% предоплата)</button>
          </div>
          ${renderFooter()}
        </div>
      `;
    }

    function attachNewOrderHandlers() {
      const priceInp = document.getElementById('orderPrice'), weightInp = document.getElementById('orderWeight'), totalSpan = document.getElementById('orderTotal');
      const update = () => {
        let price = parseFloat(priceInp?.value || 520), weight = parseFloat(weightInp?.value || 1);
        let total = (price * 0.45) + (weight * 12);
        if (totalSpan) totalSpan.innerText = total.toFixed(2);
        window.tempOrder = { url: document.getElementById('orderUrl')?.value || '', price, weight, total };
      };
      priceInp?.addEventListener('input', update); weightInp?.addEventListener('input', update);
      const createBtn = document.getElementById('createOrderFinal');
      if (createBtn) {
        createBtn.onclick = async () => {
          if (!window.tempOrder || !userId) return alert('Ошибка: нет данных заказа или авторизации');
          try {
            const { data, error } = await supabaseClient.from('orders').insert({
              user_id: userId,
              source_url: window.tempOrder.url,
              weight_estimated: window.tempOrder.weight,
              price_original: window.tempOrder.price,
              price_byn: window.tempOrder.price * 0.45,
              delivery_cost_estimated: window.tempOrder.weight * 12,
              prepayment_amount: window.tempOrder.total * 0.75,
              status: 'pending'
            }).select();
            if (error) throw error;
            alert(`Заказ создан! Номер: ${data[0].id}. Сумма предоплаты: ${(window.tempOrder.total * 0.75).toFixed(2)} ❄️`);
            window.tempOrder = null;
            switchTab('home');
          } catch (err) {
            alert('Ошибка создания заказа: ' + err.message);
          }
        };
      }
    }

    // ==================== РЕНДЕР ПРОФИЛЯ ====================
    async function renderProfile() {
      const bal = await loadBalance();
      let adminButton = '';
      if (isOwner) {
        adminButton = `<button id="adminPanelBtn" class="mt-3 bg-purple-600 hover:bg-purple-700 px-4 py-2 rounded-full text-sm">⚙️ Админ-панель</button>`;
      }
      return `
        <div class="space-y-4">
          <div class="bg-white/10 backdrop-blur-md rounded-2xl p-5 text-center shadow-lg">
            <div class="avatar mx-auto w-24 h-24 text-4xl flex items-center justify-center bg-white/20 rounded-full mb-3">${userName.charAt(0)}</div>
            <h2 class="text-xl font-bold">${userName}</h2>
            <p class="text-white/70 mt-1">Баланс: <span class="text-cyan-400 font-bold">${bal} ❄️</span></p>
            <button id="myOrdersBtn" class="mt-5 bg-white/20 hover:bg-white/30 px-6 py-2 rounded-full">📋 Мои заказы</button>
            ${adminButton}
            <button id="logoutBtn" class="mt-4 w-full bg-red-500/20 hover:bg-red-500/30 py-2 rounded-full">Выйти</button>
          </div>
          ${renderFooter()}
        </div>
      `;
    }

    function attachProfileHandlers() {
      document.getElementById('myOrdersBtn').onclick = () => { currentSubScreen = 'myOrders'; renderCurrentScreen(); };
      if (isOwner) {
        const adminBtn = document.getElementById('adminPanelBtn');
        if (adminBtn) adminBtn.onclick = () => switchTab('admin');
      }
      document.getElementById('logoutBtn').onclick = () => tg.close();
    }

    // ==================== РЕНДЕР ЗАКАЗОВ (подэкран в профиле) ====================
    async function renderOrders() {
      if (!userId) return '<p class="text-center mt-10">Авторизуйтесь</p>';
      try {
        const { data, error } = await supabaseClient.from('orders').select('*').eq('user_id', userId).order('created_at', { ascending: false });
        if (error) throw error;
        if (!data || data.length === 0) return '<p class="text-center mt-10">У вас пока нет заказов</p>';
        return `
          <button id="backToProfileBtn" class="global-back-btn">← Назад</button>
          <div class="space-y-3">
            ${data.map(order => `
              <div class="order-card">
                <div class="flex justify-between items-start">
                  <div>
                    <p class="font-bold text-white">Заказ #${order.id.slice(0,8)}</p>
                    <p class="text-white/70 text-xs">Вес: ${order.weight_estimated} кг</p>
                    <p class="text-cyan-400 text-sm mt-1">${order.prepayment_amount} ❄️</p>
                    ${order.tracking_number_cn ? `<p class="text-white/70 text-xs mt-2">📦 Трек: ${order.tracking_number_cn}</p>` : ''}
                    ${order.photo_reports && order.photo_reports.length ? `<div class="mt-2 flex gap-2">${order.photo_reports.map(url => `<img src="${url}" class="w-16 h-16 object-cover rounded">`).join('')}</div>` : ''}
                  </div>
                  <span class="status-badge ${getStatusClass(order.status)}">${getStatusText(order.status)}</span>
                </div>
              </div>
            `).join('')}
          </div>
        `;
      } catch (err) {
        console.error(err);
        return '<p class="text-center mt-10 text-red-400">Ошибка загрузки заказов</p>';
      }
    }

    function attachOrdersHandlers() {
      const backBtn = document.getElementById('backToProfileBtn');
      if (backBtn) backBtn.onclick = () => { currentSubScreen = null; renderCurrentScreen(); };
    }

    // ==================== ФУНКЦИИ СТАТУСОВ ====================
    function getStatusText(status) {
      const map = {
        'pending': 'Ожидает оплаты',
        'paid': 'Оплачен (75%)',
        'bought': 'Выкуплен',
        'on_sklad_cn': 'На складе в Китае',
        'in_transit': 'В пути',
        'in_belarus': 'В Беларуси',
        'delivered': 'Доставлен',
        'cancelled': 'Отменён'
      };
      return map[status] || status;
    }

    function getStatusClass(status) {
      const map = {
        'pending': 'status-pending',
        'paid': 'status-paid',
        'bought': 'status-bought',
        'on_sklad_cn': 'status-on_sklad_cn',
        'in_transit': 'status-in_transit',
        'in_belarus': 'status-in_belarus',
        'delivered': 'status-delivered',
        'cancelled': 'status-cancelled'
      };
      return map[status] || 'status-pending';
    }

    // ==================== ОБНОВЛЁННАЯ renderCurrentScreen ====================
    async function renderCurrentScreen() {
      const contentDiv = document.getElementById('content');
      
      // Подэкраны
      if (currentSubScreen === 'myOrders') {
        contentDiv.innerHTML = await renderOrders();
        attachOrdersHandlers();
        return;
      }
      
      // Основные табы
      if (currentTab === 'home') {
        contentDiv.innerHTML = await renderHome();
        attachHomeHandlers();
      } else if (currentTab === 'calculator') {
        contentDiv.innerHTML = await renderCalculator();
        attachCalculatorHandlers();
      } else if (currentTab === 'neworder') {
        contentDiv.innerHTML = await renderNewOrder();
        attachNewOrderHandlers();
      } else if (currentTab === 'catalogs') {
        contentDiv.innerHTML = await renderCatalogs();
        attachCatalogsHandlers();
      } else if (currentTab === 'profile') {
        contentDiv.innerHTML = await renderProfile();
        attachProfileHandlers();
      } else if (currentTab === 'admin' && isOwner) {
        contentDiv.innerHTML = await renderAdmin();
        attachAdminHandlers();
      } else {
        contentDiv.innerHTML = '<div class="text-center py-10">Страница не найдена</div>';
      }
      
      // Показываем/скрываем кнопку "Назад"
      const backBtn = document.getElementById('globalBackBtn');
      if (backBtn) {
        if (currentTab === 'home' && !currentSubScreen) {
          backBtn.style.display = 'none';
        } else {
          backBtn.style.display = 'flex';
        }
      }
    }



    // ==================== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ====================
    function renderFooter() {
      return `
        <div class="mt-8 text-center text-white/40 text-xs">
          <p>ICE LOGIX © 2026</p>
          <div class="flex justify-center gap-3 mt-1">
            <span class="cursor-pointer hover:text-white/60">О сервисе</span>
            <span class="cursor-pointer hover:text-white/60">Поддержка</span>
            <span class="cursor-pointer hover:text-white/60">Политика</span>
          </div>
        </div>
      `;
    }

    // Заглушка для отправки уведомлений (в будущем заменим на реальную отправку через бота)
    async function sendNotification(userId, message, orderId = null) {
      console.log(`🔔 Уведомление для ${userId}: ${message} (заказ: ${orderId})`);
      // Здесь будет вызов API бота для отправки push-уведомления
    }

    // ==================== ПРИСВОЕНИЕ НАЧАЛЬНЫХ ЗНАЧЕНИЙ ГЛОБАЛЬНЫМ ПЕРЕМЕННЫМ ====================
    // Сами переменные должны быть объявлены ранее (в начале файла) как let adminOrdersFilter и т.д.
    // Здесь мы просто задаём им стартовые значения.
    adminOrdersFilter = 'all';
    adminOrdersPage = 1;
    adminOrdersTotalPages = 1;

    // ==================== ЗАПУСК ПРИЛОЖЕНИЯ ====================
    init();
  </script>
