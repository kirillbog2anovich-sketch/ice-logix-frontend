<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>ICE LOGIX</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    body { background: #0F172A; }
    .status-badge { padding: 4px 8px; border-radius: 20px; font-size: 12px; font-weight: bold; }
    .status-pending { background: #f59e0b; color: #000; }
    .status-paid { background: #10b981; color: #fff; }
    .status-shipped { background: #3b82f6; color: #fff; }
    .status-delivered { background: #8b5cf6; color: #fff; }
    .status-cancelled { background: #ef4444; color: #fff; }
  </style>
</head>
<body class="text-white">
  <div id="app" class="min-h-screen p-4 pb-20 bg-gradient-to-b from-slate-900 to-black">
    <div class="text-center py-10" id="loading">Загрузка...</div>
  </div>

  <script>
    // --- Ждём загрузку всех зависимостей ---
    function waitForLibraries(callback) {
      if (window.Telegram && window.Telegram.WebApp && window.supabase) {
        callback();
      } else {
        setTimeout(() => waitForLibraries(callback), 100);
      }
    }

    waitForLibraries(() => {
      // --- Конфигурация ---
      const OWNER_IDS = [6107097715, 804027583];

      // --- Telegram WebApp ---
      const tg = window.Telegram.WebApp;
      tg.ready();
      tg.expand();

      const user = tg.initDataUnsafe?.user;
      const userId = user ? user.id : null;
      const userName = user ? (user.first_name || user.username) : 'Гость';
      const isOwner = userId && OWNER_IDS.includes(userId);

      // --- Supabase ---
      const SUPABASE_URL = 'https://vrvwdagjpttvfvjanbwq.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZydndkYWdqcHR0dmZ2amFuYndxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NTc4MzgsImV4cCI6MjA5MTIzMzgzOH0.P9GQSW6NLN1BhR66PX-LP4ysZBXFeWIXRYIRvhRjo1c';
      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      const STORAGE_BUCKET = 'order_photos';

      const appDiv = document.getElementById('app');
      
      // --- Функция загрузки баланса ---
      async function loadBalance() {
        if (!userId) return 0;
        try {
          const { data, error } = await supabase
            .from('users')
            .select('ices_balance')
            .eq('user_id', userId)
            .maybeSingle();
          if (error) throw error;
          return data ? data.ices_balance : 0;
        } catch (err) {
          console.error(err);
          return 0;
        }
      }

      // --- Функция получения статуса ---
      function getStatusText(status) {
        const statuses = {
          'pending': 'Ожидает оплаты',
          'paid': 'Оплачен (75%)',
          'bought': 'Выкуплен',
          'on_sklad_cn': 'На складе в Китае',
          'in_transit': 'В пути',
          'in_belarus': 'В Беларуси',
          'delivered': 'Доставлен',
          'cancelled': 'Отменён'
        };
        return statuses[status] || status;
      }

      function getStatusClass(status) {
        const classes = {
          'pending': 'status-pending',
          'paid': 'status-paid',
          'bought': 'status-paid',
          'on_sklad_cn': 'status-paid',
          'in_transit': 'status-shipped',
          'in_belarus': 'status-shipped',
          'delivered': 'status-delivered',
          'cancelled': 'status-cancelled'
        };
        return classes[status] || 'status-pending';
      }

      // --- Загрузка фото в Storage ---
      async function uploadPhoto(orderId, file) {
        const fileName = `${orderId}/${Date.now()}_${file.name}`;
        const { data, error } = await supabase.storage
          .from(STORAGE_BUCKET)
          .upload(fileName, file);
        if (error) throw error;
        // Получаем публичную ссылку
        const { data: urlData } = supabase.storage
          .from(STORAGE_BUCKET)
          .getPublicUrl(fileName);
        return urlData.publicUrl;
      }

      // --- Сохранение ссылок на фото в таблице orders ---
      async function addPhotoToOrder(orderId, photoUrl) {
        // Сначала получаем текущие фото
        const { data: order, error: fetchError } = await supabase
          .from('orders')
          .select('photo_reports')
          .eq('id', orderId)
          .single();
        if (fetchError) throw fetchError;
        
        const currentPhotos = order?.photo_reports || [];
        const updatedPhotos = [...currentPhotos, photoUrl];
        
        const { error: updateError } = await supabase
          .from('orders')
          .update({ photo_reports: updatedPhotos })
          .eq('id', orderId);
        if (updateError) throw updateError;
      }

      // --- Рендер главной страницы ---
      async function renderHome() {
        const balance = await loadBalance();
        return `
          <div class="bg-white/10 backdrop-blur-md rounded-2xl p-4">
            <div class="flex justify-between items-center">
              <div>
                <p class="text-sm text-white/70">Привет,</p>
                <h1 class="text-xl font-bold">${userName}</h1>
              </div>
              <div class="text-right">
                <p class="text-sm text-white/70">Баланс</p>
                <p class="text-xl font-bold text-cyan-400">${balance} ❄️</p>
              </div>
            </div>
          </div>
          <div class="mt-4">
            <h2 class="text-white text-lg font-bold mb-2">❄️ Находки дня</h2>
            <div class="flex gap-3 overflow-x-auto pb-2">
              <div class="bg-white/10 backdrop-blur-md rounded-xl p-3 w-40 shrink-0">
                <div class="w-full h-32 bg-slate-700 rounded-lg"></div>
                <p class="text-white font-bold mt-2">Nike Dunk Low</p>
                <p class="text-cyan-400 text-sm">520 ❄️</p>
                <button class="mt-2 w-full bg-cyan-500 text-white py-1 rounded-lg text-sm">Хочу!</button>
              </div>
              <div class="bg-white/10 backdrop-blur-md rounded-xl p-3 w-40 shrink-0">
                <div class="w-full h-32 bg-slate-700 rounded-lg"></div>
                <p class="text-white font-bold mt-2">Jordan 1 Retro</p>
                <p class="text-cyan-400 text-sm">780 ❄️</p>
                <button class="mt-2 w-full bg-cyan-500 text-white py-1 rounded-lg text-sm">Хочу!</button>
              </div>
            </div>
          </div>
          <div class="grid grid-cols-2 gap-3 mt-4">
            <div class="bg-white/10 backdrop-blur-md rounded-xl p-3">
              <p class="text-white/70 text-xs">Курс ¥</p>
              <p class="text-white text-xl font-bold">0.45 BYN</p>
            </div>
            <div class="bg-white/10 backdrop-blur-md rounded-xl p-3">
              <p class="text-white/70 text-xs">Поставка</p>
              <p class="text-white text-xl font-bold">8 дн</p>
            </div>
          </div>
          <div class="mt-6 p-4 bg-white/10 backdrop-blur-md rounded-xl">
            <h2 class="text-white text-lg font-bold mb-3">🧮 Калькулятор стоимости</h2>
            <label class="text-white/70 text-sm">Ссылка на товар</label>
            <input type="text" id="productUrl" class="w-full mt-1 p-2 rounded-lg bg-white/20 text-white border border-white/30" placeholder="https://poizon.com/...">
            <label class="text-white/70 text-sm block mt-3">Вес (кг)</label>
            <input type="range" id="weightSlider" min="0.1" max="30" step="0.1" value="1" class="w-full mt-1">
            <div class="flex justify-between text-white/70 text-sm mt-1">
              <span>0.1 кг</span>
              <span id="weightValue">1.0 кг</span>
              <span>30 кг</span>
            </div>
            <button id="calcBtn" class="mt-4 w-full bg-cyan-500 text-white py-2 rounded-lg">Рассчитать</button>
            <div id="calcResult" class="mt-4 hidden">
              <p class="text-white">Примерная стоимость: <span id="totalPrice" class="font-bold text-cyan-400">0</span> ❄️</p>
              <p class="text-white/70 text-xs mt-1">*Окончательная цена после взвешивания на складе</p>
              <button id="createOrderBtn" class="mt-3 w-full bg-blue-600 text-white py-2 rounded-lg">Оформить заказ (75% предоплата)</button>
            </div>
          </div>
          <div class="mt-4 flex gap-2">
            <button id="myOrdersBtn" class="flex-1 bg-white/10 py-2 rounded-lg">📦 Мои заказы</button>
            ${isOwner ? '<button id="adminBtn" class="flex-1 bg-white/10 py-2 rounded-lg">⚙️ Админка</button>' : ''}
          </div>
        `;
      }

      // --- Рендер списка заказов пользователя (с фото) ---
      async function renderMyOrders() {
        if (!userId) return '<p class="text-center mt-10">Авторизуйтесь</p>';
        try {
          const { data, error } = await supabase
            .from('orders')
            .select('*')
            .eq('user_id', userId)
            .order('created_at', { ascending: false });
          if (error) throw error;
          if (!data || data.length === 0) return '<p class="text-center mt-10 text-white/70">У вас пока нет заказов</p>';
          return `
            <button id="backHomeBtn" class="mb-4 bg-white/10 px-4 py-2 rounded-lg">← Назад</button>
            <div class="space-y-3">
              ${data.map(order => `
                <div class="bg-white/10 backdrop-blur-md rounded-xl p-4">
                  <div class="flex justify-between items-start">
                    <div>
                      <p class="text-white font-bold">Заказ #${order.id.slice(0, 8)}</p>
                      <p class="text-white/70 text-xs">Вес: ${order.weight_estimated} кг</p>
                      <p class="text-cyan-400 text-sm mt-1">${order.prepayment_amount} ❄️</p>
                      ${order.tracking_number_cn ? `<p class="text-white/70 text-xs mt-2">📦 Трек: ${order.tracking_number_cn}</p>` : ''}
                      ${order.photo_reports && order.photo_reports.length > 0 ? `
                        <div class="mt-2">
                          <p class="text-white/70 text-xs mb-1">📸 Фотоотчёт:</p>
                          <div class="flex gap-2 overflow-x-auto">
                            ${order.photo_reports.map(url => `<img src="${url}" class="w-20 h-20 object-cover rounded-lg" />`).join('')}
                          </div>
                        </div>
                      ` : ''}
                    </div>
                    <span class="status-badge ${getStatusClass(order.status)}">${getStatusText(order.status)}</span>
                  </div>
                </div>
              `).join('')}
            </div>
          `;
        } catch (err) {
          return '<p class="text-center mt-10 text-red-400">Ошибка загрузки</p>';
        }
      }

      // --- Рендер админки (с загрузкой фото) ---
      async function renderAdmin() {
        if (!isOwner) return '<p class="text-center mt-10">Доступ запрещён</p>';
        try {
          const { data, error } = await supabase
            .from('orders')
            .select('*')
            .order('created_at', { ascending: false });
          if (error) throw error;
          if (!data || data.length === 0) return '<p class="text-center mt-10 text-white/70">Нет заказов</p>';
          return `
            <button id="backHomeBtn" class="mb-4 bg-white/10 px-4 py-2 rounded-lg">← Назад</button>
            <div class="space-y-3">
              ${data.map(order => `
                <div class="bg-white/10 backdrop-blur-md rounded-xl p-4">
                  <div class="flex justify-between items-start flex-wrap gap-2">
                    <div class="flex-1">
                      <p class="text-white font-bold">Заказ #${order.id.slice(0, 8)}</p>
                      <p class="text-white/70 text-xs">Пользователь: ${order.user_id}</p>
                      <p class="text-white/70 text-xs">Вес: ${order.weight_estimated} кг</p>
                      <p class="text-cyan-400 text-sm">${order.prepayment_amount} ❄️</p>
                      <div class="mt-2">
                        <label class="text-white/70 text-xs">Трек-номер:</label>
                        <input type="text" id="tracking_${order.id}" value="${order.tracking_number_cn || ''}" class="tracking-input w-full mt-1 p-1 rounded bg-white/20 text-white text-sm border border-white/30" placeholder="Введите трек-номер">
                      </div>
                      <div class="mt-2">
                        <label class="text-white/70 text-xs">Фотоотчёт:</label>
                        <input type="file" id="photo_${order.id}" class="photo-input w-full mt-1 p-1 text-white/70 text-sm" accept="image/*">
                        <div id="photo_preview_${order.id}" class="flex gap-2 mt-2 overflow-x-auto">
                          ${order.photo_reports && order.photo_reports.length > 0 ? order.photo_reports.map(url => `<img src="${url}" class="w-16 h-16 object-cover rounded-lg" />`).join('') : ''}
                        </div>
                      </div>
                    </div>
                    <div class="flex flex-col gap-2">
                      <select class="status-select bg-slate-800 text-white rounded-lg px-2 py-1 text-sm" data-order-id="${order.id}">
                        <option value="pending" ${order.status === 'pending' ? 'selected' : ''}>Ожидает оплаты</option>
                        <option value="paid" ${order.status === 'paid' ? 'selected' : ''}>Оплачен (75%)</option>
                        <option value="bought" ${order.status === 'bought' ? 'selected' : ''}>Выкуплен</option>
                        <option value="on_sklad_cn" ${order.status === 'on_sklad_cn' ? 'selected' : ''}>На складе в Китае</option>
                        <option value="in_transit" ${order.status === 'in_transit' ? 'selected' : ''}>В пути</option>
                        <option value="in_belarus" ${order.status === 'in_belarus' ? 'selected' : ''}>В Беларуси</option>
                        <option value="delivered" ${order.status === 'delivered' ? 'selected' : ''}>Доставлен</option>
                        <option value="cancelled" ${order.status === 'cancelled' ? 'selected' : ''}>Отменён</option>
                      </select>
                      <button class="update-status-btn bg-cyan-500 text-white px-3 py-1 rounded-lg text-sm" data-order-id="${order.id}">Обновить статус</button>
                      <button class="update-tracking-btn bg-emerald-500 text-white px-3 py-1 rounded-lg text-sm" data-order-id="${order.id}">Сохранить трек</button>
                      <button class="upload-photo-btn bg-purple-500 text-white px-3 py-1 rounded-lg text-sm" data-order-id="${order.id}">Загрузить фото</button>
                    </div>
                  </div>
                </div>
              `).join('')}
            </div>
          `;
        } catch (err) {
          console.error(err);
          return '<p class="text-center mt-10 text-red-400">Ошибка загрузки</p>';
        }
      }

      // --- Обработка навигации ---
      async function showScreen(screen) {
        let html = '';
        if (screen === 'home') {
          html = await renderHome();
        } else if (screen === 'myOrders') {
          html = await renderMyOrders();
        } else if (screen === 'admin') {
          html = await renderAdmin();
        }
        appDiv.innerHTML = html;
        
        // Привязываем обработчики после рендера
        if (screen === 'home') {
          const calcBtn = document.getElementById('calcBtn');
          const weightSlider = document.getElementById('weightSlider');
          const weightValue = document.getElementById('weightValue');
          const productUrl = document.getElementById('productUrl');
          const calcResult = document.getElementById('calcResult');
          const totalPriceSpan = document.getElementById('totalPrice');
          const createOrderBtn = document.getElementById('createOrderBtn');
          const myOrdersBtn = document.getElementById('myOrdersBtn');
          const adminBtn = document.getElementById('adminBtn');
          
          if (weightSlider && weightValue) {
            weightSlider.addEventListener('input', () => {
              weightValue.innerText = parseFloat(weightSlider.value).toFixed(1) + ' кг';
            });
          }
          
          if (calcBtn) {
            calcBtn.addEventListener('click', () => {
              const url = productUrl ? productUrl.value.trim() : '';
              if (!url) {
                alert('Вставьте ссылку на товар');
                return;
              }
              const weight = parseFloat(weightSlider ? weightSlider.value : 1);
              const total = (520 * 0.45) + (weight * 12);
              if (totalPriceSpan) totalPriceSpan.innerText = total.toFixed(2);
              if (calcResult) calcResult.classList.remove('hidden');
              window.tempOrder = { url, weight, total };
              alert('Расчёт выполнен');
            });
          }
          
          if (createOrderBtn) {
            createOrderBtn.addEventListener('click', async () => {
              if (!window.tempOrder) {
                alert('Сначала рассчитайте стоимость');
                return;
              }
              const { url, weight, total } = window.tempOrder;
              if (!userId) {
                alert('Ошибка авторизации');
                return;
              }
              try {
                const { data, error } = await supabase
                  .from('orders')
                  .insert({
                    user_id: userId,
                    source_url: url,
                    weight_estimated: weight,
                    price_original: 520,
                    price_byn: 520 * 0.45,
                    delivery_cost_estimated: weight * 12,
                    prepayment_amount: total * 0.75,
                    status: 'pending'
                  })
                  .select();
                if (error) throw error;
                alert(`Заказ создан! Номер: ${data[0].id}. Сумма: ${(total * 0.75).toFixed(2)} ❄️`);
                if (productUrl) productUrl.value = '';
                if (weightSlider) weightSlider.value = 1;
                if (weightValue) weightValue.innerText = '1.0 кг';
                if (calcResult) calcResult.classList.add('hidden');
                window.tempOrder = null;
              } catch (err) {
                alert('Ошибка: ' + err.message);
              }
            });
          }
          
          if (myOrdersBtn) myOrdersBtn.onclick = () => showScreen('myOrders');
          if (adminBtn) adminBtn.onclick = () => showScreen('admin');
        }
        
        if (screen === 'myOrders') {
          const backBtn = document.getElementById('backHomeBtn');
          if (backBtn) backBtn.onclick = () => showScreen('home');
        }
        
        if (screen === 'admin') {
          const backBtn = document.getElementById('backHomeBtn');
          if (backBtn) backBtn.onclick = () => showScreen('home');
          
          // Обновление статуса
          document.querySelectorAll('.update-status-btn').forEach(btn => {
            btn.onclick = async () => {
              const orderId = btn.getAttribute('data-order-id');
              const select = document.querySelector(`.status-select[data-order-id="${orderId}"]`);
              const newStatus = select.value;
              try {
                await supabase.from('orders').update({ status: newStatus }).eq('id', orderId);
                alert('Статус обновлён');
                await showScreen('admin');
              } catch (err) {
                alert('Ошибка: ' + err.message);
              }
            };
          });
          
          // Сохранение трек-номера
          document.querySelectorAll('.update-tracking-btn').forEach(btn => {
            btn.onclick = async () => {
              const orderId = btn.getAttribute('data-order-id');
              const trackingInput = document.getElementById(`tracking_${orderId}`);
              const trackingNumber = trackingInput ? trackingInput.value.trim() : '';
              console.log('Сохраняем трек для заказа', orderId, 'номер:', trackingNumber);
              try {
                const { error } = await supabase
                  .from('orders')
                  .update({ tracking_number_cn: trackingNumber })
                  .eq('id', orderId);
                if (error) throw error;
                alert('Трек-номер сохранён');
                await showScreen('admin');
              } catch (err) {
                console.error(err);
                alert('Ошибка: ' + err.message);
              }
            };
          });
          
          // Загрузка фото
          document.querySelectorAll('.upload-photo-btn').forEach(btn => {
            btn.onclick = async () => {
              const orderId = btn.getAttribute('data-order-id');
              const fileInput = document.getElementById(`photo_${orderId}`);
              const file = fileInput?.files[0];
              if (!file) {
                alert('Выберите файл');
                return;
              }
              try {
                const photoUrl = await uploadPhoto(orderId, file);
                await addPhotoToOrder(orderId, photoUrl);
                alert('Фото загружено');
                await showScreen('admin');
              } catch (err) {
                console.error(err);
                alert('Ошибка загрузки фото: ' + err.message);
              }
            };
          });
        }
      }
      
      // --- Старт ---
      showScreen('home');
    });
  </script>
</body>
</html>
